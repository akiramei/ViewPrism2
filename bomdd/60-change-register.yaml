bomdd:
  product: ViewPrism2
  experiment: "loop-v4-repair-lifecycle ＋ 後続 ECO 群(post-delivery)"
  layer: Change Register

# 変更台帳(ECO Register)
# ─────────────────────────────────────────────────────────────
# 目的: 個別 Markdown(60-change-order*.md)に散在する ECO の状態・影響BOM・
#       検証結果を一枚の構造化索引にし、PLM が本文推定でなく台帳から読めるようにする。
#
# 出所規律(捏造しない):
#   - 本台帳は各 ECO 本文(body)から「記録済みの事実」だけを転記したもの。
#   - golden の最終権威は 50-as-built.yaml の golden_approvals。ここでは再裁定しない。
#   - 本文に記載が無い項目は値を埋めず "未確認" と書く(推定で補完しない)。
#
# status 語彙:
#   staged       = 起票 + E-BOM(30)同期のみ。spec/M-BOM/CP の全面同期と実装は後段(製造/M4)。
#   applied       = 文書/spec/E-BOM の改訂を適用(コード製造を伴わない doc-only / spec_correction を含む)。
#   implemented   = コード/surface を製造済(隔離工場 or メイン直接)。
#   superseded    = 後続 ECO により決定が差し戻された(superseded_by 参照)。
#
# golden 語彙:
#   n/a          = 表示/挙動変更がなく golden 不要、または doc-only。
#   approved     = 当該 golden CP を承認済(承認者 maintainer)。
#   pending      = golden 再ウォークスルー/承認 待ち。
#   round1-fixed = golden 第1回を実施し所見を是正済(後続回が残る場合あり)。

# ライフサイクル証拠スキーマ(ECO-061 受入条件1・2・6):
#   status 遷移は git 履歴証拠(遷移コミット自身が携行する trailer — 案a・自己参照回避)と
#   validate_bom.py E14〜E19 で突合する。許可遷移の正本: change-management.md §4。
#   staged→implemented は「BomDD-ECO-Fix: ECO-NNN」、implemented→applied は
#   「BomDD-ECO-Accept: ECO-NNN」trailer を遷移コミットに必須とする(commit-msg hook が強制)。
lifecycle_evidence:
  scheme: trailer-v1
  applies_from: ECO-061   # これ以降の ECO に状態不変条件検査を適用
  legacy: >
    ECO-001..ECO-060 はコミットメッセージ prefix 規約(起票/decide/fix/accept)期の記録であり、
    trailer 証拠を持たないため遡及検査を明示免除する(黙って適用除外しない — ECO-061 受入条件6。
    移行は行わない: 履歴の書換はハッシュ再発行となり凍結規律に反する)。

active_scope:
  baseline_commit: 486a5c5          # HEAD(ECO-015 製造。旧 8e91b3b=2026-07-03 GitHub push 時の email 書換で再ハッシュ)
  active_charter: 00-charter-v4.md  # loop-v4-repair-lifecycle
  bom_version: "v4.0"
  frozen_oracle_tag: loop-v4-r1     # S-01〜S-31
  eco_range: ECO-001 .. ECO-016
  open_eco: [ECO-007]               # ECO-007 タグタブ視覚 golden(CP-UI-G6)待ち。ECO-010/011/012 は画像タブ製造フェーズ(staged)
  manifest_ref: 00-manifest.yaml
  note: >
    ECO-001/002 は Loop V1(BOM v1.x)期の変更。ECO-003 以降は Loop V4 完了個体
    (BOM v4.0・loop-v4-r1)への post-delivery 変更。ECO-016 は文書/BOM 構造のみの
    surface 部品体系化で、全期間スキーマ不変・S-01〜S-31 凍結。
    ハッシュ注記(2026-07-03): GitHub 初 push 時に全履歴の author/committer email を noreply へ書き換えた
    (GH007 回避)ため全コミットハッシュが再採番された。本台帳の active_scope と最新 ECO(027)は post-rewrite の
    現行ハッシュへ更新済。過去 ECO 本文中の commits/baseline ハッシュは pre-rewrite のスナップショット(タグ名
    loop-v*-r* が安定アンカー)。

