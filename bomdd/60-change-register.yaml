  eco_range: ECO-001 .. ECO-016
  open_eco: [ECO-015]               # golden 待ち
  manifest_ref: 00-manifest.yaml
  note: >
    ECO-001/002 は Loop V1(BOM v1.x)期の変更。ECO-003 以降は Loop V4 完了個体
    (BOM v4.0・loop-v4-r1)への post-delivery 変更。ECO-016 は文書/BOM 構造のみの
    surface 部品体系化で、全期間スキーマ不変・S-01〜S-31 凍結。

