      GF-TAGCTRL-01 設定ドロワーがスクロールしない(製造時からの潜在レイアウトバグ・タグ制御追加で顕在化)=
      ScrollViewer が非有界高さを受領。drawer Border を Grid の `*` 行(Row=1)へ直接置き有界化+ScrollViewer.Padding
      を内容 StackPanel の Margin へ移動(Avalonia の ScrollViewer.Padding は Extent 非算入で下端切れ)。ヘッドレス実測で
      Viewport<Extent(=スクロール可)・下端到達を確認。
      GF-TAGCTRL-02 マッピングモーダルがモック非準拠+下部欠け=ヘッダ(タグアイコンバッジ+タイトル+説明+X)/行カード
      (アクション固定色アイコンバッジ・モック順 forceLeft→forceRight→spread→skip→leftEmpty→rightEmpty)/常時 docked
      フッター(補足+既定に戻す+完了 cta)へリワーク。即時適用ライブ反映は維持・完了=閉じる・既定に戻す=全アクション
      未割り当て(新 ResetTagControlMappingCommand)。行文言は凍結挙動に忠実な現行を維持。
      GF-TAGCTRL-03 フッター補足文の右端ハードクリップ=横 StackPanel でテキストに無限幅→折り返し不能。icon+text(*)
      の Grid へ改め折り返し可能化+文言 1 行短縮(ja「未割り当ては無効。1タグを複数アクションへ割当可。」)。実測で希望
