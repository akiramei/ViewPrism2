  - id: ECO-022
    title: "画像ビューアー タグ制御モード(フェーズ2・仕様§5・予約アクション6種+マッピング永続化+設定モーダル)"
    type: 新規Core計算核(配置エンジン) + 永続化拡張 + 新surface(設定ドロワートグル+マッピングモーダル)
    status: implemented
    golden: approved
    golden_detail: >
      golden G-11 第1回(2026-07-01・maintainer 実機)= 一連の GF を是正し受入。#1 設定ドロワースクロール OK・
      #2 マッピングモーダル(モック準拠)OK・#3 配置パリティ OK(タグ タブでタグ追加→画像タブ候補表示→
