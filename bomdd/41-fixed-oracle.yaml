bomdd:
  product: ViewPrism2
  experiment: "loop-v4-repair-lifecycle(v4.0 — S-26〜S-30 追加。S-01〜S-25 は loop-v1-r1/v2-r1/v3-r1 凍結のまま不変=回帰検査)"
  layer: Fixed Oracle          # ★設計者のみ。製造装置に渡さない

# 規律: 仕様化済み契約だけを合否に入れる。製造開始前に凍結し、収束ループ中は不変。
# Control Plan のベクタ(工場開示)と重なるが、本オラクルは複合シナリオ+隠しケースを含む別집合。

fixed_oracle:
  frozen_since: "tag:loop-v1-r1(2026-06-11、S-01〜S-12)/ tag:loop-v2-r1(2026-06-13、S-13〜S-18)/ tag:loop-v3-r1(2026-06-13、S-19〜S-25)/ tag:loop-v4-r1(2026-06-14、S-26〜S-30 追加凍結。V4 収束ループ中は全 30 ケース不変)"
  self_test: |
    凍結前セルフテスト: 各ケースの期待値が 20-spec.md の節番号から導出できることを設計者が逐条確認(2026-06-11 実施)。
    期待値が仕様から書けないケースは発見されなかった(全件 spec_ref 付き)。
    実行治具は工場が納品する tests/ViewPrism2.Tests の公開 API を設計者が直接呼ぶ追加テストとして実装する。
    v2.0 追記(2026-06-13): S-13〜S-18 の期待値を 20-spec v2.0(G2/G2' 通過版)の §2.9・§2.6 から逐条導出
    できることを確認。実行治具は 32-mbom M-VIEWERCORE-017/M-UI-019/M-SET-010 の公開契約
    (SpreadPairCalculator/PageTurnCalculator/ScrollPositionTracker/SpreadHeightCalculator/ViewerModeMemory/
    ConditionSummaryFormatter/SettingsStore)に対する追加テストとして tests/ViewPrism2.Oracle へ実装する
    (V1 と同方式 — 工場非開示)。
    v3.0 追記(2026-06-13): S-19〜S-24 の期待値を 20-spec v3.0(G2/G2' 通過版)の §2.10 から逐条導出できることを
    確認。pHash(S-19)は決定性・縮退の手計算値(単色=0x8000000000000000)・距離関係の性質ベース、類似度%変換
    (S-20)は §2.10.2 の期待値ベクタ、マージ(S-23)は §2.10.5 の規則、物理非破壊(S-24)は EQ-003 のスナップショット
    で凍結。実行治具は 32-mbom M-PHASH-020/M-SIMSEARCH-021/M-MERGE-022 の公開契約(PerceptualHash/HammingDistance/
    SimilarityScore/SimilaritySearchService/MergeCalculator/MergeService)に対する追加テストとして tests/ViewPrism2.Oracle
    へ実装する。S-24 は一時フォルダの実画像ファイルを操作前後でスナップショット比較(工場非開示)。
    v4.0 追記(2026-06-14): S-26〜S-30 の期待値を 20-spec v4.0(G2/G2' 通過版)の §2.11(状態機械 T1〜T8)から逐条
    導出できることを確認。S-26=復元/完全削除の物理非破壊(EQ-003 スナップショット・INV-009 第 2 の実アクション)、
    S-27=criteria の AND/status 対象/空条件非実行/安定順、S-28=relink のタグ安全ガード(候補=pending∪untagged-normal・
    タグ付き拒否)と missing 側 ID 不変、S-29=復元の存在分岐(存在=Normal/不在=Missing)、S-30=完全削除の CASCADE・
    deleted 限定で凍結。実行治具は 32-mbom M-CRITERIA-024/M-RELINK-025/M-TRASH-026 の公開契約(CriteriaMatcher/
    CriteriaSearchService/RelinkService/TrashService/TrashTransition/IFilePresenceProbe)に対する追加テストとして
    tests/ViewPrism2.Oracle へ**製造納品後に**実装する(V1〜V3 と同方式 — 工場非開示)。S-26 は一時フォルダの実画像を
    操作前後でスナップショット比較・S-29 は IFilePresenceProbe を注入して存在/不在を制御。**V4 はスキーマ変更なし**の
    ため S-05(マイグレーション同値)は不変で緑のまま=回帰の一部。
    v3.1 追記(2026-06-14・A/B 同等性契約のオラクル分離 — capability-discipline.md): 各ケースに scope を付与。
    cross-factory(S-19/20/21/22/23/24/25)= CPOL-103 を満たす任意工場が満たすべき横断ゲート、
    this-build(S-19b)= factory-04 レシピの係数レベル値の回帰専用(横断ゲートにしない)。S-19 を「決定性・
    順序・分類」の横断契約へ是正し、単色 exact 16hex を S-19b へ分離。**S-25=順位等価オラクル新設**
    (実 PHashImageReader 経由・近傍が無関係より上位=EQ-RANK)で、factory-B の正しさを pHash 値に依存せず
    判定できる前提を整えた。実装は tests/ViewPrism2.Oracle の S19/S19b/S25(scope トレイト付き)。
  equivalence_rules:
    - id: EQ-001
      compares: [エラーコード(ErrorCode enum), 状態遷移後の DB 行の値, 出力 id 集合(順不同), 整列出力の id 順序]
      ignores: [ID の具体値(pattern のみ検査), 日時の具体値(形式のみ検査), ログ文言, UI 通知の文言・形態]
      normalization: id 集合は整列して比較。パスは正規形へ変換して比較
      rationale: ID・日時は生成時刻依存で BOM は値を固定していない(形式のみ仕様化)
    - id: EQ-002
      compares: [サムネイル出力の寸法(±1px)・エンコード形式]
      ignores: [バイト列・画質・メタデータの細部]
      normalization: 出力を再デコードして寸法・形式を取得
      rationale: 画質はライブラリ実装依存で仕様化していない(寸法・形式のみ契約)
    - id: EQ-003
      compares: [物理ファイルのバイト列(SHA-256)・LastWriteTimeUtc・フォルダ内ファイル集合]
      ignores: [DB 上の論理状態(別途 EQ-001 で比較)・アクセス時刻]
      normalization: 操作前後でフォルダをスナップショット(各ファイルの SHA-256・mtime・相対パス集合)して比較
      rationale: INV-009(物理非破壊)の実証。マージ等の実アクションがユーザー画像を改変しないことを操作前後の不変で検査する(L3 物理差分)
    - id: EQ-RANK
      compares: [類似検索結果の順位(membership=近傍が結果に含まれる・ordering=近傍が無関係より上位)]
      ignores: [pHash の 16hex 値・exact 距離値・exact 類似度%・無関係の借界的な出入り]
      normalization: 既知の類似構造(近傍=同一構造の再エンコード/微小変化・無関係=異構造)を持つ実画像集合で検索し、近傍集合が上位を占めるかで比較
      rationale: A/B 同等性契約(capability-discipline.md)。CPOL-103 で pHash はビット一致不要のため、横断の正しさは「順位等価」で測る。factory-B(別 decode/縮小方針)が当方と異なる pHash 値を出しても、近傍が無関係より上位なら正しいと判定する(S-25)

  cases:
    - id: S-01
      scenario: "リネーム追跡 E2E: フォルダ登録→画像 3 枚スキャン→1 枚にタグ 2 種+ノート→ファイル名変更→再スキャン→候補確認→再リンク確定"
      contract_expectation: "再スキャン後: 旧行=missing+新行=pending(candidate=旧行 id)。確定後: 旧 image_id のまま relative_path 更新・status=normal・タグ 2 種とノート残存・pending 行消滅・candidate_link_id=NULL"
      spec_ref: §2.1(規則 3a・遷移表・REQ-017)
      equivalence_ref: EQ-001
      depth: unit〜L2
    - id: S-02
      scenario: "NodeGraph 構造遷移: textual タグの distinct 値を 0→1→2 件と増やしながら 3 回構築"
      contract_expectation: "0 件=タグ名ノードのみ / 1 件=一体型『タグ名: 値』+階層子がその配下 / 2 件=値ノード 2 個に階層子が複製。値は序数昇順"
      spec_ref: §2.4 REQ-035
      equivalence_ref: EQ-001
      depth: unit
    - id: S-03
      scenario: "条件評価複合: 画像 6 枚(タグ未付与/simple のみ/numeric '5'/'5.0'/'abc'/textual 'Red')に [exists(simple), between(1,5), equals('red')] を個別評価"
      contract_expectation: "between: '5'と'5.0' が成立・'abc' 不成立・未付与不成立。equals('red'): 'Red' 不成立(case-sensitive)。exists: simple のみ成立"
      spec_ref: §2.3 演算子表+エッジケース規則
      equivalence_ref: EQ-001
      depth: unit
    - id: S-04
      scenario: "ReDoS 耐性: regexp 条件にカタストロフィックパターン '(a+)+$' + 入力 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaa!' を 28 文字タグ値で評価"
      contract_expectation: "1 秒タイムアウト→条件不成立+警告 1 件。プロセスはハング・クラッシュしない"
      spec_ref: §2.3(K-REGEX)
      equivalence_ref: EQ-001
      depth: unit
    - id: S-05
      scenario: "マイグレーション同値: 初版 DDL 相当の空 DB に全マイグレーション適用 vs 新規作成 DB"
      contract_expectation: "PRAGMA table_info/foreign_key_list/index_list が全テーブルで一致。migrations 行数一致"
      spec_ref: §2.0・REQ-004
      equivalence_ref: EQ-001
      depth: L2
    - id: S-06
      scenario: "設定破損起動: settings.json に不正 JSON を書き込んで Load"
      contract_expectation: "既定値(ja/1200x800/列 4)で返り、例外なし。.bak 退避+正常ファイル再生成"
      spec_ref: §2.7 REQ-052
      equivalence_ref: EQ-001
      depth: unit
    - id: S-07
      scenario: "バッチ原子性: 3 画像へ numeric タグ(min=1,max=5)を value=3 で一括付与。うち 1 画像は事前に削除済み id を混入"
      contract_expectation: "全体ロールバック(0 件適用)+NotFound 系エラー。残り 2 画像にも付与されない"
      spec_ref: §2.2 REQ-027
      equivalence_ref: EQ-001
      depth: unit
    - id: S-08
      scenario: "整列安定性: 同名(大文字小文字違い)・同サイズの画像 4 枚を name asc → file_size desc → name asc の順で 3 回整列"
      contract_expectation: "各整列で同値グループ内は id 昇順。3 回目の出力は 1 回目と完全一致"
      spec_ref: §2.3 REQ-038
      equivalence_ref: EQ-001
      depth: unit
    - id: S-09
      scenario: "i18n フォールバック連鎖: locale=en で en 欠落キー(ja のみ存在)と両方欠落キーを解決"
      contract_expectation: "前者=ja 文言 / 後者=キー文字列。例外なし"
      spec_ref: §2.7 REQ-050
      equivalence_ref: EQ-001
      depth: unit
    - id: S-10
      scenario: "サムネイル境界: 100x50 png(小画像)と 256x256 ちょうどの jpg を生成"
      contract_expectation: "100x50 → 100x50 png(拡大なし)/ 256x256 → 256x256 jpg(scale=1.0)"
      spec_ref: §2.5 REQ-040(K-SKIA 丸め規則)
      equivalence_ref: EQ-002
      depth: L2
    - id: S-11
      scenario: "タグ削除の波及: ビュー条件・ビュー階層・子タグ・画像付与を持つタグを削除し、当該ビューを開いて NodeGraph 構築+条件評価"
      contract_expectation: "構築・評価とも例外なし。階層から該当ノード消滅、条件は tag_id=NULL となり評価から無視(警告)、子タグはルート化"
      spec_ref: §2.2 REQ-028・INV-008・§2.3 エッジケース
      equivalence_ref: EQ-001
      depth: unit
    - id: S-12
      scenario: "ホームタグ参照切れ: home_tag_id が指す階層ノードを削除後にビューを開く"
      contract_expectation: "ルートから開始。エラー表示なし"
      spec_ref: §2.4 REQ-037
      equivalence_ref: EQ-001
      depth: unit

    # ---- v2.0(loop-v2-viewer)— tag loop-v2-r1 で凍結 ----
    - id: S-13
      scenario: "見開き読書 E2E(右開き・奇数枚数): total=7・index=0 から『次へ』(doublePage)を末尾まで送り、SHIFT で 1 戻す"
      contract_expectation: "ペア遷移: (R=0,L=1)→(R=2,L=3)→(R=4,L=5)→(R=6,L=空白)。末尾でさらに次へ→変化なし(停止)。SHIFT 前へ 1 → index=5 で (R=5,L=6)(偶奇ずれの維持・再アラインなし)"
      spec_ref: §2.9 REQ-056(ペアリング)・REQ-057(送り・境界・停止)
      equivalence_ref: EQ-001
      depth: unit
    - id: S-14
      scenario: "空白ページ開始の複合: total=6・startWithEmptyPage=ON・右開きで index=0 から次へ×3、左開きへ切替えて先頭から同様"
      contract_expectation: "右開き: index0=(L=0,R=空白)→次へで index=1(0→1 特殊送り)=(R=1,L=2)→index=3=(R=3,L=4)→index=5=(R=5,L=空白)。左開き: index0=(R=0,L=空白)→以後同型(L/R 鏡像)。index>0 では特殊配置なし"
      spec_ref: §2.9 REQ-056(空白開始は index 0 のみ・進行方向側)・REQ-057(0→1 送り)
      equivalence_ref: EQ-001
      depth: unit
    - id: S-15
      scenario: "モード別位置記憶の操作列: 起動 index=5 → scroll で 20 へ移動 → spread-right へ切替 → 2 回送る(step2) → normal へ切替 → scroll へ戻る"
      contract_expectation: "spread 切替時=5(初期値=起動 index)→送って 9 → normal 切替時=5(normal の記憶は初期値のまま)→ scroll 復帰=20(scroll の記憶)。各モードの記憶が独立(共通 index 引き継ぎは違反)"
      spec_ref: §2.9 REQ-054(モード別記憶・初期値=起動 index)
      equivalence_ref: EQ-001
      depth: unit
    - id: S-16
      scenario: "スクロール中央追跡の境界: 等高画像 3 枚(gap 0)で 2 枚が表示中心から完全等距離になるオフセット+先頭・最下端"
      contract_expectation: "等距離 → 若い index を現在位置とする。先頭(offset=0)→ index 0 / 最下端 → 最終 index。負 offset・範囲外は発生しない前提(クランプは呼び出し側)"
      spec_ref: §2.9 REQ-055(中央最近傍・同距離タイブレーク)
      equivalence_ref: EQ-001
      depth: unit
    - id: S-17
      scenario: "ビューア設定の永続化と破損耐性: 全 7 項目を非既定値で保存→再読込。次に settings.json の ViewerCustomGapPx を 9999・ViewerMode を 'xyz' に書き換えて再読込"
      contract_expectation: "ラウンドトリップ: 全 7 項目一致。破損後: customGapPx=0(既定)・mode='normal'(既定)へ項目単位でフォールバックし他項目は保持。例外なし。v1.3 形式(Viewer* キーなし)も全既定値で読める"
      spec_ref: §2.9 REQ-059・§2.7 REQ-052(破損耐性)
      equivalence_ref: EQ-001
      depth: unit
    - id: S-18
      scenario: "条件サマリ整形(GF-05 再発防止): textual equals 値='男'・values=['男','女']・range(10,20)・range(10,なし)・不正 JSON の 5 入力を ja で整形"
      contract_expectation: "『値が一致: 男』『いずれか: 男, 女』『範囲: 10〜20』『10 以上』、不正 JSON=空文字列(例外なし)。全出力に '\\u' と '{' が含まれない(エスケープ・生 JSON 非露出)"
      spec_ref: §2.6 REQ-060(e)(i18n テンプレート書式)
      equivalence_ref: EQ-001
      depth: unit

    # ---- v3.0(loop-v3-similarity)— tag loop-v3-r1 で凍結 ----
    # scope 分類(capability-discipline.md・A/B 同等性契約のオラクル分離):
    #   cross-factory = 任意の conformant 工場が満たすべき横断ゲート(A/B の正しさ判定に使う)
    #   this-build    = factory-04 採用レシピの係数レベル値の回帰専用(A/B 横断ゲートにしない — CPOL-103)
    - id: S-19
      scope: cross-factory
      scenario: "pHash の横断契約: 決定性・同一内容距離0・近傍/遠傍の分類と順序(合成 BGRA)。値レベルは S-19b へ分離"
      contract_expectation: "決定性=同一ピクセル→同一ハッシュ。同一内容→距離0。dist(近傍)<dist(遠傍)かつ score(近傍)≥70(類似分類)・score(遠傍)<50(非類似分類)。**exact 距離値・16hex は凍結しない**(実装で変わってよい)"
      spec_ref: §2.10.1(OC-14・CPOL-103)
      equivalence_ref: EQ-001
      depth: unit
    - id: S-19b
      scope: this-build
      scenario: "このビルドの pHash 係数レベル exact 値(A/B 横断ゲートにしない): 単色画像の縮退"
      contract_expectation: "単色=非 DC 係数 0→DC 位置のみ bit1=0x8000000000000000(当方レシピ=orthonormal DCT-II・DC 除外中央値・行優先・CHEAT-01 量子化の出力)。**このビルドの回帰専用**。factory-B 等は満たす必要なし(CPOL-103)"
      spec_ref: §2.10.1(K-PHASH・ADR-0008)
      equivalence_ref: EQ-001
      depth: unit
    - id: S-20
      scope: cross-factory
      scenario: "距離→類似度%変換: 距離 0,3,5,7,10,12,15,20,25,26,27,40,64 を変換し、閾値判定の境界を確認"
      contract_expectation: "順に 100,94,90,82,70,62,50,30,10,10,9,6,0(単調非増加)。閾値 70 ⇔ 距離 10 以内(d=10→70 を含む≧判定で類似)"
      spec_ref: §2.10.2(OC-15)
      equivalence_ref: EQ-001
      depth: unit
    - id: S-21
      scope: cross-factory   # エンジン論理(候補抽出・閾値・ソート)。pHash は注入で工場非依存
      scenario: "類似検索エンジン E2E: 1 コレクションに normal 5 枚(基準に近い 2・中間 1・遠い 2)+別コレクション 1(近い)+deleted/missing/pending 各 1(近い・キャッシュ値あり)。基準=normal 1 枚・閾値 70 で検索"
      contract_expectation: "結果=同一コレクションの normal 候補のうち類似度≧70 のみ、類似度降順・同値 id 昇順。別コレクション・基準自身・deleted/missing/pending はキャッシュ値があっても除外(フィルタ先行)。類似度ちょうど 70 の候補は含む"
      spec_ref: §2.10.4(OC-16・REQ-053)
      equivalence_ref: EQ-001
      depth: unit
    - id: S-22
      scope: cross-factory
      scenario: "特徴量・類似度キャッシュ: A,B の pHash を保存しペア類似度をキャッシュ → (1)B のファイル内容変化(hash 変化)で B 特徴量を再計算 → (2)A-B を再検索 → (3)画像 A を DB 削除"
      contract_expectation: "(1)B 再計算時に B が関与する image_similarity 行(A-B 含む)が連鎖削除。(2)A-B は再計算され新値で保存。cache_key は (A,B)=(B,A)(id1<id2 正規化)で同一キーを指す。(3)A 削除で A 関与の image_features/image_similarity 行が CASCADE 削除"
      spec_ref: §2.10.3(OC-18)
      equivalence_ref: EQ-001
      depth: unit〜L2
    - id: S-23
      scope: cross-factory
      scenario: "マージ E2E(タグ集約・多元・status・原子): マージ先 T(simple s / textual t=NULL / numeric n=5)+マージ元 A(t='赤', n=3, simple u)・B(t='青', simple s)。id 昇順 A<B。T へ A,B をマージし、別途タグ集約途中失敗を注入したケースも検査"
