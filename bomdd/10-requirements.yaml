      受入: UI 拒否+無傷・非 dirty は DB ガード委譲を unit(CP-UI-G6 unit 部)、Core 防御を unit exact(S-39・CP-VIEW-012)。
    rationale_precision: ok
    classification_hint: core
    external_source: "ViewPrismUI docs/decisions/TAG-008-tag-definition-deletion.md(`d386471` U-a 追補)/ docs/screens/tag_tab.md"
