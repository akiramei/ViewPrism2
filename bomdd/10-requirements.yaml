  # ============================================================
  - id: REQ-074
    statement: "作業スペースは名前付き・永続のユーザー管理画像集合で、雑多な作業(集めて吟味してマージ等)の場を提供する。同時にデフォルト作業スペースは厳密に 1 つ。『＋(追加)』はデフォルトを回転する: 新しい空デフォルトを作成し、いまのデフォルトを時刻名(yyyy/MM/dd HH:mm)で『保存済みスペース』へ降格する。デフォルトは画像タブ作業モード『追加』の自動追加先で、リネーム・削除できない。デフォルト以外はリネーム可(空白は『スペース』へフォールバック)。所属は集合(重複なし)で、件数・一覧は status=normal のみを対象とする(deleted/missing は除外)。作業タブ(第3タブ)はサイドバーでスペースを選択し、中央で現スペースの画像をグリッド/リストで閲覧(ソート可)する"
    rationale: |
      作業タブモック(ViewPrism2 作業タブ.html)の DCLogic(workspaces/currentWs/isDefault/addWorkspace/commitRename)。
      ECO-017 が画像タブ作業モードの workTargets を「セッション内蓄積のみ・受け渡し先は別ループ」と繰延した、その消費先。
      デフォルト 1 つ不変条件(INV-W1)は自動追加先の一意性を保つ。件数 normal 限定(INV-W2)はソフト削除(INV-009)との整合。
      受入: デフォルト回転(常に 1 つ・旧は時刻名降格)・リネーム(デフォルト不可・空フォールバック)・件数 normal 限定を
      固定フィクスチャで exact 検査(unit・CP-WORKSPACE-028)。
    rationale_precision: ok
    classification_hint: core
    external_source: "ViewPrismUI:資料/画像タブ/ViewPrism2 作業タブ.html / bomdd/ui/work-tab/"
    counterexamples:
      - "『＋』後にデフォルトが 0 個または 2 個になる(自動追加先が定まらない/重複する)"
      - "デフォルトをリネームできてしまい、自動追加先の素性が不安定になる"
      - "件数に deleted 画像が混じり、ソフト削除した画像がまだ在るように見える"

  - id: REQ-075
    statement: "作業スペースへの画像の追加・移動は所属(workspace_images)の論理操作のみで、画像レコード・物理ファイル・image_id・付与タグに一切触れない(INV-009 物理非破壊・INV-001 ID 不変)。受け渡し(画像タブ作業『追加』)はデフォルトスペースへ和集合追加する。移動(スペース間)は元スペースから除去し移動先へ和集合追加する単一トランザクション(原子・失敗時ロールバック)。同一スペースへの移動は拒否する。完全削除(E-TRASH-038)された画像は FK CASCADE で所属からも消えるが、ソフト削除(deleted)では所属は残し件数/一覧から status で除外する(復元で戻る)"
    rationale: |
      作業スペースは画像の参照集合であり、画像の実体やタグを変えない(コレクション/ビューと同じ非破壊の閲覧単位)。
      移動の原子性(INV-W5)は中途半端な所属(両スペースに在る/どちらにも無い)を防ぐ。ソフト削除で所属を残すのは
      復元(RestoreAsync)で元の文脈へ戻すため。受入: add/move の論理操作のみ・物理非破壊・移動原子・同一スペース拒否・
      deleted 除外を固定フィクスチャで exact 検査(unit・CP-WORKSPACE-028)。
    rationale_precision: ok
    classification_hint: core
    external_source: "ViewPrism2 作業タブ.html(moveSelectedTo / context の deleted 除外)/ INV-009 物理非破壊"
    counterexamples:
      - "スペースへの追加が画像をコピー・移動する物理操作になる(INV-009 違反。所属の論理操作のはず)"
      - "移動が非原子で、失敗時に元スペースから消えたまま移動先にも入らない"
      - "ソフト削除で所属レコードまで消し、復元しても元のスペースに戻らない"
