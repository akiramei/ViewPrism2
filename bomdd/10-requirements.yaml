      V1 で表示モード/選択コレクションを永続化した CR-5/6 と同方針)。customGapPx の範囲は原典 UI の
      スライダー範囲(0-100)を契約化。受入: 保存→再起動→復元のラウンドトリップと範囲外値の既定化を
      unit で exact 検査(REQ-052 の既存検査に追加)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "見開き右開きに設定しても、ビューアを開き直すたびに normal へ戻る"
      - "settings.json に customGapPx: 9999 が残っていると画像が画面外へ離れて表示される"

  - id: REQ-060
    statement: "V1 golden 所見(GF-01〜05)を是正する: (a)タグ作成/編集ダイアログは高さ固定とし、候補値リストはリスト内部のみスクロールする(候補値追加でウィンドウが伸長しない)(b)グリッド表示のセル選択で行背景の選択視覚を表示しない(セルの強調枠+選択順バッジのみ。リスト表示モードの行選択視覚は正として維持)(c)階層エディタのホームタグトグルは家アイコンで表示する(★は使用しない)(d)タグパレットの選択中タグを明確に強調し、階層エディタの「ルートに追加」「子に追加」ボタンに対象タグ名を表示する(例:『「風景」をルートに追加』)(e)ノード条件サマリは表示用に整形し(例: 値が一致: 男)、JSON の Unicode エスケープ(\\u7537 等)や生 JSON を画面に露出しない(保存値の JSON 形式は REQ-035 の契約のまま不変)"
