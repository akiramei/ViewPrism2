  - id: REQ-040
    statement: "サムネイルは長辺 256px(アスペクト比保持、元画像より拡大しない)で生成し、PNG 入力は PNG、それ以外は JPEG 品質 80 で出力する。キャッシュは %APPDATA%/ViewPrism2/thumbnails/ に画像絶対パスの MD5 をファイル名として保存し、存在すれば再生成しない。生成失敗時はキャッシュへ記録せず(次回表示時に再試行)プレースホルダを表示し、読み取り不能なキャッシュファイルは削除して再生成する"
    rationale: |
      原典 ipc/images/thumbnails/index.ts:11-45(fit:'inside', withoutEnlargement, PNG=圧縮9/JPEG=80、MD5(path))。
      受入: 出力寸法(長辺 256 以下・比率維持±1px)、フォーマット、キャッシュヒット時の再生成なしを L2 検査。
      画質そのものは golden 不要(寸法・形式のみ検査)。
    rationale_precision: ok
    classification_hint: surface
    external_source: "SkiaSharp / ImageSharp の resize API 仕様(Phase 3 の ADR で確定)"
    counterexamples:
