      マージは破壊的に見えるため非破壊である旨の明示が信頼上重要(物理非破壊 woven 制約の UI 表現)。
      復元/完全削除(RVP-STATUS-003/004)は状態遷移が広がるため後続ループ(charter スコープ外)。
      受入: マージ対象選択・統合タグプレビューの ViewModel は unit、画面とトラッシュ一覧は golden(G-9)+承認者。
