  - id: REQ-057
    statement: "見開きモードのページ送り: 送りステップは SHIFT 押下時 1、通常時はページ送りモード(doublePage=2(既定)/singlePage=1)に従う。キーボードは右開きで →=前へ・←=次へ(進行方向反転)、左開きで →=次へ・←=前へ。ページクリックは進行方向側(右開き=左ページ、左開き=右ページ)で次へ、反対側で前へ(空白ページ部分のクリックも同様に送る)。境界規則: 前へは現在-step が負なら先頭(0)へ移動、次へは現在+step が末尾を超える場合は末尾(総数-1)へ移動し、既に末尾なら何もしない。空白ページ開始 ON かつ現在インデックス 0 から 2 ページ送り設定で次へ送るときはインデックス 1 へ進む(以後のペアが(1,2)(3,4)…と偶奇が揃う)"
    rationale: |
      原典 ImageViewer.tsx:86-207(キーボード規則・step 計算・境界・空白開始特殊送り)、SpreadMode.tsx:595-698
      (クリック送り — キーボードと同一規則)。受入: 送り規則を unit で exact 検査(テストベクタ: 右開き/左開き ×
      doublePage/singlePage × SHIFT 有無 × 先頭/中間/末尾近傍/末尾 × 空白開始 ON・OFF)、操作感は golden+承認者。
    rationale_precision: ok
    classification_hint: surface
    external_source: "原典 ImageViewer.tsx / SpreadMode.tsx(送り規則)"
    counterexamples:
      - "右開きで →キーを押すと次のページへ進み、紙の本と逆の操作感になる"
      - "末尾近傍で 2 ページ送りすると末尾を飛び越してエラー、または先頭へループする"
      - "空白ページ開始 ON で先頭から送ると 2 進んでしまい、以後すべての見開きペアの偶奇がずれる"

  - id: REQ-058
    statement: "ビューア共通表示設定: (a)リサイズモード resizeMode = matchLargerHeight(見開きペアの高い方の画像高さへ両者を統一)/matchSmallerHeight(低い方へ統一)/noResize(原寸。ただし表示領域を超える場合は領域内に収める)、既定 noResize。統一高さは表示領域高さの 90% を上限とする。適用対象は見開きモードのみ。(b)垂直揃え alignMode = top/middle/bottom、既定 middle。適用対象は見開きモードのみ(原典仕様書はスクロールも対象と記すが実装は見開きのみ — 実装準拠で確定)。(c)画像間ギャップ gapMode = tight(間隔 0、見開きでは左右画像を中央境界へ寄せる)/loose(customGapPx の間隔、既定 0px)、既定 tight。適用対象は見開きの左右間とスクロールの画像間。normal モードは V1 のフィット表示(REQ-044)を維持し、これらの設定の対象外とする"
    rationale: |
      原典 viewerUtils.ts:9-31(高さ計算 max/min)、SpreadMode.tsx:547-569(表示領域 90% 上限)、
      768-822(tight 時の中央寄せ: 左ページ=右端揃え・右ページ=左端揃え)、viewerUtils.ts:67-84
      (scroll の gap / spread の gap)。scroll コンテナに alignItems 適用なし(viewerUtils.ts:67-74)=
      alignMode はスクロール実装に存在しない → viewer-spec §3.2 の「スクロールも対象」は未実装につき
      採用しない(実装準拠、00-charter-v2.md の原典互換方針)。アスペクト比は全設定で常に維持する。
      受入: 高さ統一計算(max/min・90% 上限・アスペクト比維持)は unit(テストベクタ: 高さ違いペア・
