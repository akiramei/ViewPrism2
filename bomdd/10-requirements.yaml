bomdd:
  product: ViewPrism2
  experiment: "loop-v3-similarity(REQ-001〜053=loop-v1-core / REQ-054〜060=loop-v2-viewer / REQ-061〜067=loop-v3-similarity。台帳は同一ファイルを改訂継続)"
  layer: Requirements

# 根拠精度の規律(playbook §2):
#   rationale は「受入の深さと許容差を決められる精度」まで掘る。
#   出典: 原典 view-prism のリバース調査(2026-06-11)。証拠は 20-spec.md のトレース表参照。
#   原典で未実装(スキーマのみ存在等)の要素は要求に含めない(20-spec.md §6 カバレッジ監査で分類)。

requirements:
  # ============================================================
  # 基盤(DB・ID・日時) REQ-001〜
  # ============================================================
  - id: REQ-001
    statement: "全エンティティの主キーは UUIDv4(小文字 hex、ハイフン区切り 36 文字)の TEXT で採番する"
    rationale: |
      原典は uuidv4() による採番(image-repository.ts:742、tag-repository.ts:113)。
      連番でないため工場・スレッド間で衝突せず、移行オラクル作成時も ID を pattern(正規表現)で検査できる。
      受入: ID は ^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$ に一致(unit/exact)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "大文字 UUID が混入し、文字列比較で同一エンティティが別物と判定される"

  - id: REQ-002
    statement: "全日時カラムは ISO 8601 拡張形式の UTC 文字列(YYYY-MM-DDTHH:mm:ss.fffZ、ミリ秒3桁、literal Z)で格納する"
    rationale: |
      原典は new Date().toISOString() で統一(manager.ts:65 ほか)。文字列ソートが時系列ソートと一致するため
      modified_at DESC 等のクエリが正しく動く。受入: 形式は正規表現で exact 検査(unit)。非 Z・ローカル時刻は不合格。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "ローカルタイムゾーンで格納され、「最近使ったビュー」の並びが時系列と食い違う"
      - "小数秒の桁数が揺れて文字列ソートが時系列と一致しなくなる"

  - id: REQ-003
    statement: "SQLite データベースは journal_mode=WAL、foreign_keys=ON で開く"
    rationale: |
      原典 manager.ts:126-129。FK 制約はタグ削除カスケード(REQ-028)の前提。WAL は読み書き並行性のため。
      受入: PRAGMA 値の照会で exact(L2 メタデータ検査)。
    rationale_precision: ok
    classification_hint: surface
    external_source: "SQLite PRAGMA 仕様 https://www.sqlite.org/pragma.html"
    counterexamples:
      - "foreign_keys が OFF のままタグ削除し、孤児 image_tags 行が残る"

  - id: REQ-004
    statement: "スキーマ変更はマイグレーション基盤で管理する: migrations テーブル(id TEXT PK, executed_at)に適用履歴を記録し、新規 DB は最新スキーマで作成して全マイグレーション ID を適用済みとしてマークする"
    rationale: |
      原典 manager.ts:52-87,137-144 と同方式。未適用分のみを ID 順に適用し、各マイグレーションはトランザクション内で実行。
      受入: (a)新規 DB 作成後の migrations 行数 = 定義済みマイグレーション数、(b)旧スキーマ DB に適用後のスキーマが新規作成 DB と一致(L2)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "新規 DB でマイグレーションが再実行され ALTER TABLE が重複エラーになる"

  - id: REQ-005
    statement: "DB ファイルはユーザーデータ領域 %APPDATA%/ViewPrism2/data/viewprism.db に配置する"
    rationale: |
      原典は app.getPath('userData')/data/viewprism.db(main.ts:63-64)。.NET では Environment.SpecialFolder.ApplicationData 配下。
      受入: 初回起動後のファイル存在(L1)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "実行ファイルと同じフォルダに DB が作られ、Program Files 配下で書き込み拒否になる"

  # ============================================================
  # 同期フォルダ・スキャン REQ-010〜
  # ============================================================
  - id: REQ-010
    statement: "ユーザーは同期フォルダを登録・編集・削除・無効化できる(name、path、include_subfolders 既定 true、exclude_patterns、is_active 既定 true)。path はシステム内で一意(大文字小文字無視)で、重複登録は明示エラーで拒否する。name の重複は許可する"
    rationale: |
      原典 sync_folders テーブル(manager.ts:293-302)。path は絶対パス、削除時は配下の images が CASCADE 削除される
      (FK ON DELETE CASCADE、manager.ts:189)。exclude_patterns は原典の解釈実装が未確認(unknown)のため、
      V1 では「ファイル名の完全一致(大文字小文字無視)」と意図的に確定する(glob/regex は対象外)。
      受入: CRUD 各操作後の DB 状態と重複パス拒否を exact 検査(unit)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "同期フォルダ削除後も images 行が残り、ビューに幽霊画像が表示される"

  - id: REQ-011
    statement: "対応画像形式は拡張子 .jpg/.jpeg/.png/.gif/.bmp/.webp の 6 種で、拡張子を小文字に正規化して判定する(マジックバイト検査はしない)"
    rationale: |
      原典 scanner.ts:10,522。判定が拡張子のみであることは仕様(高速性優先)。
      受入: 大文字拡張子(.JPG)が登録され、対象外(.txt、.svg)が無視されることを unit で exact 検査。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - ".JPG(大文字)がスキャン対象から漏れる"
      - "拡張子だけ .jpg の非画像ファイルでサムネイル生成がクラッシュし、スキャン全体が停止する"

  - id: REQ-012
    statement: "スキャンは増分方式とする: (a)新規ファイルは登録、(b)DB に normal で存在するが物理に無いファイルは missing へ、(c)同一相対パスで内容が変わったファイルはハッシュ・サイズ・更新日時を更新、(d)新規ファイルのハッシュが同一フォルダ内の missing 画像と一致する場合は pending(candidate_link_id 付き)で登録する。一致する missing 画像が複数ある場合は id 昇順の先頭を candidate_link_id とする"
    rationale: |
      原典 scanner.ts:114-472、file-verifier.ts:201-217。タグ等の関連は image_id に紐づくため、
      ファイル移動・リネームを安易に新規+削除と扱うとタグが失われる。それを防ぐ pending/再リンクが本質。
      判定の優先順序は 20-spec.md §2.1 の番号付き規則に従う(同時成立時の曖昧さを排除)。
      読み取り不能ファイル(ロック等)は DB を変更せずスキップし警告ログ、次回スキャンで再試行する。
      受入: 4 ケースそれぞれの前後 DB 状態を固定フィクスチャで exact 検査(unit〜L2)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "ファイルをリネームしただけでタグが全て失われる(missing+新規扱い)"
      - "別フォルダの同一ハッシュ画像が再リンク候補になり、無関係なタグが移植される"

  - id: REQ-013
    statement: "ファイルハッシュは SHA-256(ファイル全体、出力は小文字 hex 64 文字)とする"
    rationale: |
      原典 file-verifier.ts:125-141。再リンク判定(REQ-012)と重複検出の基礎。全体ハッシュであることが
      部分一致誤判定を防ぐ。受入: 既知バイト列のハッシュ値を exact 検査(unit、テストベクタ: 空ファイル =
      e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "先頭 N バイトのみのハッシュで、異なる画像が同一と判定され誤リンクされる"

  - id: REQ-014
    statement: "images.relative_path は同期フォルダ起点の相対パスで、区切りはスラッシュ(/)に統一し、先頭・末尾にスラッシュを付けない。パス比較は大文字小文字を区別しない"
    rationale: |
      原典 file-verifier.ts:77-94、比較は SQLite LOWER()(Windows ファイルシステムが case-insensitive のため)。
      受入: バックスラッシュ入力が正規化されること、大文字小文字違いのパスが同一視されることを unit で exact 検査。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "区切り文字の混在で同一ファイルが二重登録される"

  - id: REQ-015
    statement: "スキャン完了時(異常終了時も含む)に sync_folders.last_scan を現在時刻で更新し、スキャン結果サマリ(追加/欠落/保留/更新の各件数)を返す"
    rationale: |
      原典 scanner.ts:430-436(finally 句)、464-471。受入: スキャン後の last_scan 更新と件数の exact 検査(unit)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "スキャン中の例外で last_scan が更新されず、毎回フルスキャン相当になる"

  - id: REQ-016
    statement: "画像ステータスは normal/missing/deleted/pending の 4 値とし、一覧・ビュー・グリッド・NodeGraph の値抽出は常に normal のみを対象にする。deleted は V1 では予約値とし、deleted へ遷移させる操作は実装しない(遷移の全列挙は 20-spec.md §2.1 の遷移表)"
    rationale: |
      原典 shared/types/images.ts:7、image-repository.ts:50,107,162(既定検索が normal のみ)、611,679(deleted 除外)。
      missing=物理消失(再リンク待ち)、deleted=論理削除、pending=再リンク候補確定待ち。
      受入: 各ステータスの画像を用意し、既定一覧に normal のみ現れることを exact 検査(unit)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "missing 画像がグリッドに表示され、開くとエラーになる"

  - id: REQ-017
    statement: "ユーザーは missing 画像に対する再リンク候補(同一フォルダ内・ハッシュ一致の pending 画像)を確認し、確定すると missing 側レコードが pending 側のパス情報で上書きされて normal に戻り、pending 側レコードは削除される。候補が複数ある場合は relative_path 昇順で提示し、各候補に相対パス・サイズ・更新日時を表示する"
    rationale: |
      原典 file-verifier.ts:387-439、image-repository.ts:581-736。候補は同一 sync_folder_id 内に限定
      (フォルダが違えば同一ハッシュでも別ファイルと扱う)。受入: 再リンク前後の DB 状態
      (タグ関連が image_id ごと保持されること)を exact 検査(unit)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "再リンク後に元 image_id が変わり、タグ・ビュー条件の参照が切れる"

  # ============================================================
  # タグ REQ-020〜
  # ============================================================
  - id: REQ-020
    statement: "タグは simple(値なし)/textual(文字列値)/numeric(数値)の 3 種類とし、image_tags.value には simple=NULL、textual=文字列、numeric=数値の文字列表現を格納する"
    rationale: |
      原典 shared/types/tags.ts:20-38、tag-repository.ts:299-359。numeric の比較は数値として行う
      (格納は TEXT、比較時に REAL へ変換)。受入: 3 種それぞれの付与→取得ラウンドトリップを exact 検査(unit)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "numeric 値が文字列比較され '9' > '10' と判定される"

  - id: REQ-021
    statement: "タグ名はシステム全体で一意(大文字小文字は区別する)。重複名での作成・改名は一意制約違反として明示的なエラー(DuplicateTagName)を返す"
    rationale: |
      原典 migration009(UNIQUE 制約)、DuplicateTagNameError(tag-repository.ts:188-192)。
      SQLite の UNIQUE 既定照合(BINARY)に従い case-sensitive。空文字・空白のみの名前は拒否する。
      受入: 重複作成がエラーコードで拒否されることを exact 検査(unit)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "重複タグが作成でき、タグ選択 UI に同名が 2 つ並ぶ"

  - id: REQ-022
    statement: "タグは parent_id による単一親の階層を持てる。親タグ削除時、子タグの parent_id は NULL になる(子は削除しない)。自分自身・子孫を親に指定する循環は拒否する"
    rationale: |
      原典 manager.ts:204(FK)。循環防止は原典に明示実装が無い(unknown)が、無いと階層表示が無限ループする
      ため本実装では要求化する(原典からの意図的差分)。受入: 循環指定の拒否と親削除時の SET NULL を exact 検査(unit)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "A→B→A の親子を設定でき、タグツリー描画が無限ループする"

  - id: REQ-023
    statement: "タグは color(#RRGGBB 形式、NULL 可)と description(NULL 可)を持つ。color は形式バリデーションを行い、不正形式は拒否する"
    rationale: |
      原典 manager.ts:199-201、ColorPicker.tsx:17-71(プリセットは #RRGGBB)。
      受入: 正常形式の保存と不正形式(例 'red'、'#GGG')の拒否を exact 検査(unit)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "CSS 色名が保存され、描画側のパースが失敗して既定色にフォールバックしない"

  - id: REQ-024
    statement: "textual タグは定義済み値リスト(predefined_values、文字列配列、順序保持)を任意で持てる。値の付与は定義済みリストに限定しない(自由入力可)"
    rationale: |
      原典 textual_tag_settings(manager.ts:207-212)、推奨であって強制でない(tag-repository.test.ts:51-70)。
      順序はユーザーが D&D で並べ替えるため保持必須。受入: 配列順序のラウンドトリップを exact 検査(unit)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "定義済み値の並びが保存のたびに辞書順に戻る"

  - id: REQ-025
    statement: "numeric タグは min/max/step/unit(いずれも NULL 可)の設定を持てる。min/max が設定されている場合、範囲外の値の付与は拒否する"
    rationale: |
      原典 numeric_tag_settings(manager.ts:214-222)。範囲バリデーションは原典で明示実装が未確認(unknown)だが、
      設定の存在意義から本実装では要求化する(原典からの意図的差分)。
      受入: 境界値(min ちょうど=可、min-step=不可)を exact 検査(unit)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "min=1,max=5 の評価タグに 100 が付与できる"

  - id: REQ-026
    statement: "画像へのタグ付与は UPSERT 動作とする: 同一(image_id, tag_id)への再付与は値の上書きであり、重複行は作らない"
    rationale: |
      原典 INSERT OR REPLACE(tag-repository.ts:477-485)、PK(image_id, tag_id)。
      受入: 二重付与後の行数=1 と値上書きを exact 検査(unit)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "二重付与で UNIQUE 違反エラーがユーザーに露出する"

  - id: REQ-027
    statement: "複数画像への一括タグ付与・解除は単一トランザクションで行い、1 件でも失敗したら全体をロールバックする"
    rationale: |
      原典 tag-management.service.ts:160-200(withTransaction)。部分適用は「どこまで付いたか分からない」状態を生む。
      受入: 故意に失敗を混ぜたバッチで 0 件適用を exact 検査(unit)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "100 枚中 50 枚だけタグが付き、ユーザーが残りを特定できない"

  - id: REQ-028
    statement: "タグ削除時のカスケード規則: image_tags は削除(CASCADE)、view_conditions.tag_id は NULL 化(SET NULL)、view_tag_hierarchies の該当ノードは削除(CASCADE)、子タグの parent_id は NULL 化"
    rationale: |
      原典 manager.ts:204,231-232,261,277。FK 制約で DB レベルに固定する。
      受入: タグ削除後の 4 テーブルの状態を exact 検査(unit)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "タグ削除後もビュー階層に幽霊ノードが残り NodeGraph 構築が例外を投げる"

  - id: REQ-029
    statement: "タグ一覧は name 昇順(大文字小文字を無視した序数比較、同値時は id 昇順)で返し、各タグの使用数(distinct image_id 数)を取得できる"
    rationale: |
      原典 tag-repository.ts:252(ORDER BY name)、COUNT(DISTINCT image_id)。
      受入: 既知データでの並びと件数を exact 検査(unit)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "同一画像に同一タグの値違いが二重計上され使用数が水増しされる"

  # ============================================================
  # ビュー・NodeGraph REQ-030〜
  # ============================================================
  - id: REQ-030
    statement: "ユーザーはビュー(name 必須、description、is_favorite 既定 false、sort_field、sort_direction、display_columns、home_tag_id)を作成・更新・削除できる"
    rationale: |
      原典 views テーブル(manager.ts:236-248)。ビュー削除時は view_conditions/view_tag_hierarchies が CASCADE 削除。
      受入: CRUD 後の DB 状態を exact 検査(unit)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "ビュー削除後に view_conditions の孤児行が残る"

  - id: REQ-031
    statement: "ビュー条件の演算子は 5 種で、全条件を AND で評価する: exists(タグが付いている)、equals(値が完全一致)、between(数値が value 以上 value2 以下、両端含む)、regexp(値が正規表現にマッチ)、in(値が JSON 配列のいずれかに一致)。対象タグが付与されていない画像は、いずれの演算子でも条件不成立とする(exists は false)"
    rationale: |
      原典 view-search.service.ts:104-201。OR・group_id・field 条件はスキーマに存在するが原典で評価未実装のため
      V1 要求から除外(カバレッジ監査で out-of-scope 宣言)。between は数値変換後の比較で両端含む。
      エッジケースを確定する: simple タグ(value=NULL)への equals/regexp/in は不成立(UI は simple タグに exists
      のみ提示)。数値変換できない値(空文字含む)は equals/between の数値比較で不成立。value が NULL の非 exists
      条件は評価から除外(無視)し警告ログ。regexp は .NET の System.Text.RegularExpressions(マッチタイムアウト
      1 秒)とし、不正パターン・タイムアウトは条件不成立+警告(ログ+非モーダル通知)。例外でクラッシュしない。
      原典は JS RegExp — 方言差は K-BOM で管理。
      受入: 演算子ごとのテストベクタ(境界値・エッジケース含む)で exact 検査(unit)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "between が上端を含まず、min=1,max=5 の検索で 5 が漏れる"
      - "JS の正規表現方言(例 (?<name>) 以外の独自構文)を移植して .NET Regex が例外を投げる"

  - id: REQ-032
    statement: "views.modified_at はビュー本体の更新だけでなく、所属する条件・タグ階層の変更時にも現在時刻へ更新する"
    rationale: |
      原典 view-repository.ts:307。「最近使ったビュー」(REQ-033)の並びの根拠。
      受入: 条件変更→modified_at 更新を exact 検査(unit)。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
