  - id: REQ-081
    statement: "ファイル一覧は、アクティブなビューの display_columns をリスト表示ではテーブル列として描画し、リスト・アイコン(グリッド)両表示形式で **display_columns を軸にソートする**。ソート対象=アクティブなビューの表示列(基本情報+タグ)で、リスト/アイコンで対象集合は同一・導線 UI だけ表示形式に合わせて変える。ソート状態(sortCol/sortDir)は**表示形式(grid/list)を跨いで共有**する。旧・名前/更新日/サイズ固定ソートメニュー(sort_field)はブラウズから廃止する。リストの列型別セル描画: 基本情報 size=『X.X MB』/『X KB』(1MB 未満は KB)・modified_date=日付、num=★×値+数値(金色・未設定は淡色『未設定』)、text=値チップ(タグ色の淡塗り+境界・未設定は『—』)、simple=色ドット+ラベル(付与)/オフ表示(未付与)。名前は固定列(先頭・削除/移動不可・『固定』バッジ)。リストは列ヘッダーがソート入口(別列クリックで昇順開始・同列再クリックで昇順⇄降順)でアクティブ列を強調+方向矢印、ツールバーに要約チップ(方向矢印+『<列名>（方向）』+✕)を出し✕でクリア。アイコンはヘッダーが無いため単一『並び替え』メニュー(候補=ビューの表示列・種別チップ+タグ色ドット・アクティブ強調+方向矢印・下部に昇順/降順)へ集約し、ボタンに現在のソート列名バッジ(未ソート=『なし』)を出す。アイコンタイルはソート中かつ名前以外のとき名前に加えソート項目(列名+当該列値・型別描画)を表示し、未ソート/名前ソート時は名前だけを表示する。ソートの不変条件(描画から独立した決定論ロジックとして unit 検査可能): 未設定タグの行は方向に関わらず常に末尾(空値末尾。ただし simple は空扱いにせず有無順=付与を先)、型別比較は 数値タグ/basic size=数値順・テキストタグ/basic name・date=localeCompare('ja')・simple=有無順、同値のタイブレークは名前の昇順で安定化する。『表示列』ポップオーバーで列を追加/削除/並べ替え(view_edit と同一の列ピッカー・display_columns をビュー定義へ書き戻す・除去列がソート中ならソート解除)。FS軸で同階層にfolderと画像がある場合はtype-primary(folder群→画像群)を不変とし、両群を個別sort後に連結する。folderは列値を新設せず名前を現在方向で比較し、画像は選択列・方向で比較する。スキャン中は両群ともIMG-015の取込順appendを優先し、明示sortは完了時に適用する"
    rationale: |
      ECO-025 β。ViewPrismUI:資料/画像タブ/ViewPrism2 ファイル一覧v2 (standalone).html / docs/screens/file_list.md v2(`3e820b8`・リスト/アイコンのソート単一権威)。
      V1 のリスト描画(DisplayColumnParser・REQ-042)は kind が basic|tag の 2 値のみで型別セル描画も列ヘッダーソートも無かった。
      **v2(FL-003)でソートを刷新**: ソート対象をリスト/アイコンとも「アクティブなビューの表示列」に統一し、旧・名前/更新日/サイズ
      固定メニュー(sort_field/E-SORT-004 由来のブラウズ・ソート導線)を廃止。ソート状態は表示形式間で共有。リスト=ヘッダー+チップ、
      アイコン=単一『並び替え』メニュー+タイルのソート項目表示(net-new)。ソート比較器は選択ロジックと同じ『描画から独立した決定論
      ロジック』規律で unit 検査可能(ViewColumnSorter)。列ピッカーは REQ-080 と同一モデル(DRY は golden 後)。
      なお ECO-025 暫定(アイコンに名前/更新日/サイズ固定メニュー)は v2 で superseded。
      ECO-070案AでFS folder行を補完: type-primaryでfolder先を固定し、folder群は名前+現在方向、画像群は選択列+方向で
      個別sortする。folder size/date/tag集約値は作らず、スキャン中はIMG-015取込順を優先する。CAD=ViewPrismUI 0f303a4。
      受入: 型別セル描画・リスト/アイコンのソート導線・タイルのソート項目・状態(未設定・ソートなし・共有)を golden(承認者 maintainer)、
      ソート比較器(空値末尾・型別比較・安定タイブレーク)を固定フィクスチャで unit exact 検査。
    rationale_precision: ok
