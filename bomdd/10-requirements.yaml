      - "picker が作成済みタグを出さず手入力を要求する(割当 UI の不成立)"
      - "マッピング変更がトグル ON のページ構成に反映されない(REQ-076 との結線欠落)"

  # 表示列モデル(ビュー編集 / ファイル一覧)REQ-079〜081 — ECO-025(CADモック由来・段階 α/β)
  # 既存: display_columns は V1 からスキーマ/Core/描画(REQ-030/042・CP-VIEW-012)に存在。
