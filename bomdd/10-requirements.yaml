  - id: REQ-094
    statement: "ビュー軸のブラウズに表示モード2値「すべて/未分類」を設ける(既定=すべて)。すべて=REQ-036の累積フィルタ(意味論不変)。未分類(最深配置)=選択ノードNの表示集合を display(N)=matched(N)−⋃matched(c)(c=NodeGraph上のNの直下の子ノード全部・matchedはREQ-036のパス条件評価)とする — 直下の子だけで十分(子孫の条件列は子の条件列の上位集合)。ルートの未分類=階層のどのトップノードにもマッチしない画像(未分類発見器)。階層チップの件数はモードに追随(未分類では各子チップの件数=その子自身の未分類件数)。textualタグ名ノード(値ノード2件以上)の未分類直下表示はほぼ0件(一貫した帰結として仕様)。未分類0件時は専用空状態(汎用の画像0件表示と区別)。タグ編集の選択母集合・ビューアー順も表示中の集合に一致。UI=ビュー軸選択時のみツールバー(表示軸セレクタ直後)にテキストセグメント(内容幅+余白・日英ともラベルが切れない=GF-084-01)・FS軸では非表示・狭幅収納(IMG-014)の対象外=畳まない/非表示にしない。記憶=ビュー毎の最終選択モードを settings.json の viewDisplayModes(view_id→all|unclassified・値等価辞書)へ記憶しビュー軸選択時に復元・列挙外/欠落は既定すべて。ビュー定義(DB)には持たせず、コレクションパッケージ(REQ-093)/スナップショット(REQ-092)では搬送しない(デバイスローカル)"
    rationale: |
      ECO-084 起票+起票前相談での maintainer 裁定 3 点(2026-07-14): 方式=案B改(トグル+settings記憶・
      DBマイグレーションなし/パッケージ形式不変)・ルート意味論=未分類発見器・概念語=すべて/未分類。
      CAD=ViewPrismUI docs/screens/image_tab.md「表示モード」節+動くモック(gate①承認 bf6d4cf)。
      直下の子のみの減算で足りるのは条件列の上位集合性質(仕様§2.4)による。件数のモード追随は
      表示とチップの数字の一致(一貫性)を優先する gate① 論点(a)の裁定。
    rationale_precision: ok
    classification_hint: core+surface
    external_source: "ViewPrismUI docs/screens/image_tab.md 表示モード節+visualContract VC-IMG-1〜5(`bf6d4cf`/`abd6cc2`/`4838972`) / ECO-084"
