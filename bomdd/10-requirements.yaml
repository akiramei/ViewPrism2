  - id: REQ-035
    statement: "タグ階層から NodeGraph を構築する: simple タグ→単一ノード、textual タグ→タグ名ノード+その配下に値ノード群(status=normal の画像に付与された distinct 値。predefined_values 外の自由入力値も含む)、値が 1 つだけの場合は『タグ名: 値』の一体型ノードに統合、numeric タグ→単一ノード。子ノードは position 昇順に並べる。NodeGraph は表示のたびにタグ付け状態から再構築する(キャッシュする場合はタグ付け・階層変更で無効化)"
    rationale: |
      原典 src/lib/nodeGraph/utils.ts:20-219(6 ノード型、mergeTextTagWithSingleValue)。
      値ノードの並びは distinct 値の昇順(序数)。値抽出の対象は REQ-016 に従い status=normal のみ。
      distinct 値が 0 件の textual タグ名ノードも表示・選択可能とし、選択時は exists 条件として評価する
      (結果が 0 件なら空状態表示)。受入: 階層+タグ付け状態の固定フィクスチャから期待ノードツリーを
      exact 検査(unit)。一体型統合の閾値(値 0/1/2 件)は境界テスト必須。
    rationale_precision: ok
    classification_hint: core
    counterexamples:
      - "値が 0 件の textual タグで値ノードが空のまま展開され、クリックすると空フォルダ地獄になる"
      - "値が 1→2 件に増えた瞬間のノード構造変化で選択状態が壊れる"

  - id: REQ-036
    statement: "NodeGraph 上でノードを選択すると、ルートからそのノードまでのパス上の全ノードの条件を AND 結合して画像を絞り込む: simple/textual タグ名ノード=exists、値ノード・一体型ノード=equals(その値)、numeric ノード=condition_type に応じた条件"
    rationale: |
      原典 utils.ts:228-308(buildConditionsFromPath)。「タグ階層をフォルダのように辿る」中核体験。
