    external_source: "ViewPrismUI:資料/画像タブ/ViewPrism2 ファイル一覧v2 (standalone).html / docs/screens/file_list.md v2(`3e820b8`) / review_points FL-003 / 既存 REQ-042・DisplayColumnParser"
    counterexamples:
