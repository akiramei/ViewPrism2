      - "値タグ衝突でマージ先の値がマージ元の値に上書きされ、保持すべき値が失われる"
      - "タグ集約の途中で失敗し、マージ先に一部タグだけ付いてマージ元が deleted のまま残る(部分適用)"

  - id: REQ-067
    statement: "マージ UI: 類似検索結果または複数選択からマージ先(1 枚)とマージ元(1 枚以上)を指定し、マージを実行できる。実行前にマージ先と整理対象(マージ元)をトレイのサムネイル一覧で視認できる。マージ先の指定は解除できる(整理対象は保持し、マージ先のみ未設定へ戻る — 実行は不活性化。ECO-056/整理マージ v2 A-2 裁定 2026-07-06)。統合後タグの事前プレビューと物理非破壊の機能個別の明示は提供しない(ECO-052 裁定 b — 誤マージ保護は完了パネル+補償 Undo(REQ 系 ECO-044)が担い、物理非破壊は INV-009 のプロダクト全体原則として L3 物理差分で機械実証する)。マージで deleted になった画像が『見えないまま消える』ことを避けるため、最小のトラッシュ(deleted 画像一覧)表示を提供する(一覧と件数のみ。復元・完全削除の操作は後続ループ)"
    rationale: |
      原典 ImageMergeModal.tsx(マージ先/元の選択 UI)、TrashModal.tsx(deleted 一覧 — V3 は閲覧のみ移植)。
