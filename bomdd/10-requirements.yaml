      - "検索ボタン連打で複数検索が並行し、最後に開始した検索でなく最後に完了した検索が結果を上書きする"
      - "停止を結果0件として表示し『類似画像がありません』と誤案内する"
      - "進捗が百分率だけで基準画像準備中と候補比較中を区別できず、停止したように見える"
      - "cancel時に正常生成済みcacheまで破棄し、次回検索で同じdecode/pHashをやり直す"

  - id: REQ-090
    statement: "整理の画像検索は同一原画像に由来する電子的変種を中心に、見た目が近い候補を連続的な一致度で提示する。内部では同一ファイル(SHA-256一致)、画像内容一致(規定どおり正規化した表示画素一致)、実質同一(再圧縮・解像度変更・回転鏡像・軽微な色/余白差)、部分重複(trim・一部切出し)、類似(題材/構図は近いが表情・文字・物体等の局所内容が異なる)、非類似を区別する。pHashは高速候補抽出と大局スコアに維持するが、距離0を100%・最終重複判定へ直接変換しない。候補へ幾何対応・対応領域・位置合わせ後のRGBA局所差を評価する重複関係検証を適用し、pHash距離0だけで画像内容一致・実質同一・100%を確定しない。100%を表示できるのはEXIF方向・sRGB・alpha等を規定どおり正規化した表示画素が一致する場合だけとする。利用者向け結果はpHash大局スコアと関係分類から独立した詳細検証の連続スコアの小さい方を一致度N%として一つだけ表示し、関係語彙を併記しない。関係ごとの固定一致度帯は設けず、見た目が近い表情差は内部関係が類似のまま70%以上になり得る。検索設定の50〜100%は表示結果と同じ一致度軸へ適用し、70%検索に70%未満の結果を含めない。pHash粗候補gateは内部固定で表示しない。部分重複・類似は自動削除または重複groupへ自動投入しない。候補順位は表示一致度降順とし、同一原画像由来候補を可能な限り上位にする"
    rationale: |
      ECO-067 gate①案A修正採用。CAD=ViewPrismUI IMG-021 `bb9623b`。現行pHash-onlyは32x32 grayscaleの
      低周波64bitへ縮退するため、表情等の局所差がある非同一画像でも距離0→100になり得る。pHash精度の
      単純調整でなく候補抽出と重複関係検証を分離し、削除事故のcostから最終判定をprecision優先にする。
      第0段はbyte/正規化画素exact、第1段pHash、第2段は64x64 D4位置合わせ・crop重複・RGBA差の平均/変更面積/
      強差面積/局所block最大/差分総量の上位6/64 block集中率。具体閾値は商用画像を使わない
      CP-DUPQUALITY-030自作fixtureで固定する。
      GF-067-01で、関係語彙だけでは同じ実質同一内の差が失われ、広め/標準/絞るでは70%/80%の検索条件を
      再現できないと実機観測。CAD `b686b37` で関係+一致度%と数値候補しきい値へ補正した。
      GF-067-02で関係語彙+一致度%は判断軸が重複し、検索pHash%と結果検証器%も別軸で70%検索に48%結果が
      現れると判明。CAD `df560cf` で利用者向け表示/検索を検証器一致度%の単一軸へ統一した。
      GF-067-03で小面積の目口相当差分が全体meanへ希釈され実質同一になること、および部分重複の計算rangeが
      許容mean上限と不一致と判明。局所集中率を追加し、関係帯域写像をCoreの単一正本へ集約する。
      GF-067-04実機で固定帯域が同程度の表情差を99%または49%以下へ分断し、70%検索が1件へ激減。CAD
      `e6a8078`で利用者向け連続一致度と内部安全分類を分離し、GF-067-03の関係帯域写像を廃止した。
    rationale_precision: ok
    classification_hint: core+surface
    external_source: "ViewPrismUI IMG-021 (`bb9623b`, GF-067-01 `b686b37`, GF-067-02 `df560cf`, GF-067-04 `e6a8078`) / ECO-067"
    counterexamples:
      - "pHash距離0だけで表情違いを100%または重複と表示する"
      - "内部pHash scoreを一致率/重複確率として表示する"
      - "trim画像を完全重複として自動削除する"
      - "全体平均だけで局所的な目・口・文字・物体の置換を希釈し実質同一とする"
      - "一般意味embeddingだけで同一人物の別画像を重複判定する"

  - id: REQ-091
    statement: "ビューアcanvasのvertical mouse wheelは、下方向(Delta.Y<0)をlogical Next、上方向(Delta.Y>0)をlogical Prevとして扱う。normal Fitとspread-right/spread-leftは常にpage turnし、端では停止する。normal Width/Originalは画像内panを優先し、現在方向へpan可能ならpage turnせず、event開始時点で既に上端/下端にいる状態からさらに外向きへ回したeventだけPrev/Nextへ送る。端へ到達させた同じeventでは送らない。下端からwheel Nextした切替先は先頭、上端からwheel Prevした切替先は末尾へ着地する。切替先がviewport内なら先頭=末尾とし、この着地点規則をbutton/key/seekへ適用しない。scroll mode、設定drawer、タグ制御mapping modalは自身のcontent scrollを維持し、裏のviewerを送らない。horizontal wheelは無視する。wheelは既存Next/Prevへ委譲し、spreadのpageTurnMode、SHIFT、空白開始、右/左開き配置、tag-control plan、端停止を独自再実装しない。Ctrl+wheel zoom、Home/End、数字キーmode切替、wheel設定永続キーは追加しない"
    rationale: |
      ECO-071案A裁定(maintainer 2026-07-12)、golden着地点補正。CAD=ViewPrismUI IMG-022 `153c366`(初回`ec01a73`)。
      Loop V2 M-BOMはnormal/spread wheelを明示非搭載としていたが、連続scroll以外でもwheelで読み進めたい要求を受理した。
      normal Width/OriginalのScrollViewer、scroll mode、設定drawer、mapping modalを一律に横取りすると既存pan/scrollを壊すため、
      ViewerBodyのtunnel段階でevent前offsetを見てcontext-awareに分岐する。送り計算は既存Next/Prevを単一正本として維持する。
      goldenで上端からPrevした前画像が先頭へ戻る不連続を観測したため、wheel入力文脈だけを非同期load/layout確定後まで保持して
      Next先頭/Prev末尾へ着地する。受入はmode/fit/offset/delta/landingの決定表をCP-UI-G4/G8 unit、provider routingとoverlay/体感をCP-UI-G8 goldenで確認する。
    rationale_precision: ok
    classification_hint: surface
    external_source: "ViewPrismUI docs/screens/image_viewer.md/review_points.md IMG-022 (`153c366`、初回`ec01a73`) / ECO-071"
