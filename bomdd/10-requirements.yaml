  - id: REQ-080
    statement: "タグタブの『ビュー管理』行から『ビューを編集』モーダルを開き、ビュー名・説明・表示列(display_columns)を編集できる。表示列エディタは列ピッカーとし、選択済み列を順序表示(各行に上下移動・削除・ソースチップ[基本情報=グレー/タグ=青]・タグ列は色ドット)、追加元カード(基本情報=破線カード/ビュー内タグ=実線カード+種別チップ+色ドット)をクリックで末尾追加(上限到達・重複は無視)、件数バッジ『合計 N 列 / 最大 M』は上限到達で青からアンバーへ変わり追加元カードを不活性(not-allowed・淡色)にする。名前(c_name)は先頭固定・移動/削除不可・『固定』バッジ(VE-001)。追加元に基本情報/タグが無いとき各セクションに案内、端の列で上下矢印を不活性表示する。保存で display_columns をビュー定義へ書き戻し(VE-003)、画像タブ ファイル一覧へ即反映する"
