  - id: REQ-057
    statement: "見開きモードのページ送り: 送りステップは SHIFT 押下時 1、通常時はページ送りモード(doublePage=2(既定)/singlePage=1)に従う。キーボードは右開きで →=前へ・←=次へ(進行方向反転)、左開きで →=次へ・←=前へ。ページクリックは進行方向側(右開き=左ページ、左開き=右ページ)で次へ、反対側で前へ(空白ページ部分のクリックも同様に送る)。境界規則: 前へは現在-step が負なら先頭(0)へ移動、次へは現在+step が末尾を超える場合は末尾(総数-1)へ移動し、既に末尾なら何もしない。空白ページ開始 ON かつ現在インデックス 0 から 2 ページ送り設定で次へ送るときはインデックス 1 へ進む(以後のペアが(1,2)(3,4)…と偶奇が揃う)"
