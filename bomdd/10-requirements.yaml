  - id: REQ-084
    statement: "類似検索は回転(90/180/270°)・鏡像(左右/上下反転・転置/反転置)された同一ソース画像を検出する。実現方式: pHash 特徴量の計算時に、正規化済み 32×32 格子の 8 オリエンテーション変種(順序固定: identity/rotate90/rotate180/rotate270/flipH/flipV/transpose/transverse = 二面体群 D4)それぞれの pHash を算出し image_features(phash_variants)へ併せて永続化する。ペア類似度は「序数比較で小さい id の identity pHash × 大きい id の全 8 変種のハミング距離の最小値」を距離として REQ-062 の変換に与える(対称・決定的・identity 同士の距離を上回らない=既存検出の単調拡張)。変種を持たない特徴量(旧レコード・変種非対応 reader)との比較は identity 同士の距離のみとし、現行 reader が変種対応の場合は変種欠落の特徴量を stale として再計算する(REQ-063 の無効化条件へ追加)。pHash レシピ(REQ-061)・距離→類似度%変換(REQ-062)・閾値と検索 UI(REQ-064/065)は不変"
    rationale: |
      ECO-048 裁定=案 A(maintainer 2026-07-06): 回転・鏡像のみの最小拡張。移植元は ../SimilarPic の検証済み
      8 オリエンテーション方式(112 ケース実測)を BCL のみで再実装(ORB/多特徴量は defer 継続 — charter-v3 裁定 2 不変)。
      変種は 32×32 格子の添字置換のみ(再デコード・再リサイズなし)=決定的(INV-012)。hash_adapter は不変:
      identity pHash の絶対値・decode 経路を動かす変更ではないため P-09 世代交代に該当しない(this-build golden とも整合)。
      旧レコードの自動アップグレードは「変種欠落=stale」の無効化条件で行う(既存の連鎖無効化に乗る)。
      受入: 変種契約は S-40 unit exact・検索は CP-SIM-017(実 decode 経路の回転/鏡像 E2E+対称性・旧レコード互換)。
    rationale_precision: ok
    classification_hint: core
    external_source: "../SimilarPic(検証済みアルゴリズム・2026-07-06)/ ECO-048 §4 案 A"
    counterexamples:
      - "90° 回転した重複画像が類似検索に出ない(ECO-048 の症状そのもの)"
      - "変種比較の役割が非対称で (A,B) と (B,A) の類似度が食い違い、ペア正規化キャッシュ(REQ-063)と矛盾する"
      - "変種導入で identity 同士の既存スコアが下がる(単調拡張の破れ)"
      - "変種なしの旧レコードとの比較で例外・誤スコアが出る(後方互換の破れ)"

  - id: REQ-085
    statement: "表示系は EXIF Orientation(1〜8)を適用して画像を正立で扱う: ①サムネイルは正立化した画像から生成する ②ビューアのフルサイズ表示は正立化した画像を表示する ③解像度メタデータ(GetDimensions)は Orientation 5〜8 で幅・高さを入替えた実効寸法を返す。適用は表示系に限り、pHash 入力・SHA-256・スキャンは従来どおり非適用とする(向き耐性は REQ-084 の 8 変種が担う — adapter 世代交代 P-09 を誘発しない)。サムネイルキャッシュは生成規則の世代を識別できる形(キャッシュファイル名の世代サフィックス)とし、EXIF 適用世代への移行後は旧世代キャッシュを参照しない(旧ファイルは孤児として無害・掃除は別途)"
    rationale: |
      ECO-049 裁定=案 B(maintainer 2026-07-06)。V1 沈黙次元裁定(spec §4「適用しない・後続ループ候補」)の解除。
      症状= EXIF Orientation=6 のスマホ撮影画像がサムネ・ビューアで横倒し(ECO-048 golden 準備中の実機所見)。
      V1 裁定の根拠「原典も未適用」はコード上の意(exifreader 未利用)で、原典 Electron は Chromium の
      image-orientation: from-image 既定により表示は正立だった可能性が高い(移植等価性の隠れ回帰の疑い)。
      実装は SkiaSharp の SKCodec.EncodedOrigin(新規依存なし)+ D4 の 8 方位変換(REQ-084 と同じ変換族)。
      サムネの正立化は縮小後の小画像に適用してよい(アスペクト比保持=一様スケールは D4 変換と可換)。
      受入: 8 方位の正立変換契約と実効寸法= S-41 unit exact・サムネ/寸法 E2E= CP-THUMB-007・ビューア= golden。
    rationale_precision: ok
    classification_hint: surface
    external_source: "EXIF 2.32 Orientation(tag 0x0112)/ SkiaSharp SKCodec.EncodedOrigin / ../SimilarPic ExifOrientation.cs(8 方位マップの知見のみ — System.Drawing 依存のため直接移植せず)"
    counterexamples:
      - "EXIF=6 のスマホ画像がサムネ・ビューアで横倒しに表示される(ECO-049 の症状そのもの)"
      - "旧世代サムネキャッシュが参照され続け、EXIF 画像だけ横倒しのまま残る(世代移行漏れ — キーがパス MD5 のみで内容・規則の世代を含まない既知制約)"
      - "pHash 入力まで正立化して adapter 世代交代(P-09)が意図せず発動し、全特徴量再計算と ThisBuildGolden 再凍結を誘発する"
      - "Orientation 5〜8 の画像で解像度表示が W/H 逆のまま(実効寸法でない)"

  - id: REQ-086
    statement: "初回スキャン中のコレクションは、SHA-256計算と判定を完了しDB batch commitに成功したstatus=normal画像をbatch単位で段階的に公開する。公開中は取込順で末尾へ追加し、sort条件の変更は保持するが一覧を再配列しない。スキャン完了時に最新sort条件を全公開画像へ一度適用する。公開済み画像への通常操作と条件検索は利用可能だが、類似画像検索はスキャン完了まで実行せず『スキャン完了後に利用できます』と理由を表示する。進捗windowを閉じても処理と公開を継続し、画像タブ内のスキャン中表示を完了まで維持する。サムネイルは遅延生成のままで公開条件に含めない"
    rationale: |
      ECO-060案A裁定(maintainer 2026-07-11)。実HDD約260,000件の初回スキャンはECO-059後も35分で、
      UI callerは解放されたが画像一覧は完了まで利用不能だった。ECO-059の最大512変更transactionを
      公開境界として再利用すれば、images.hash NOT NULL・再リンク・条件検索・feature freshnessを変えずに
      time-to-first-useを短縮できる。CAD原器=ViewPrismUI `1ffed5bbdbb50dd313ddb5f2c11f4c57e3da559f`。
      metadata-first、hash NULL/特殊値、hash_state、遅延SHAは本要求に含めない。再スキャン差分・キャンセル・
      失敗再試行・競合の詳細はCAD IMG-017で未設計のため別要求とする。
    rationale_precision: ok
    classification_hint: surface
    external_source: "ViewPrismUI docs/screens/image_tab.md/review_points.md/integrated_ui_spec.md(`1ffed5bbdbb50dd313ddb5f2c11f4c57e3da559f`)"
    counterexamples:
      - "全ファイル列挙と全ハッシュ完了まで画像が1件も表示されない(ECO-060の元症状)"
      - "commit前または失敗したbatchの画像を表示し、再読込で消える"
      - "スキャン中にsortを逐次適用して既存項目が動き続ける"
      - "スキャン中の部分母集合で類似検索を実行し、不完全結果を正常結果として表示する"
      - "進捗windowを閉じるとスキャンまたは段階公開が止まる"

  - id: REQ-087
    statement: "類似画像検索はコレクション全体を無条件に走査せず、検索実行時点の閲覧コンテキストを明示候補集合として用いる。画像タブのファイルシステム軸はマージ先画像と同一の親 relative path を持つ直下画像のみ(サブフォルダを含めず、タグチップの一時表示フィルタは候補へ影響させない)。検索時点の現在フォルダ外にマージ先がある場合は候補 0 件とする。タグビュー軸は検索時点の view root+現在 node path の条件を満たす条件一致母集合とし、対象画像から leaf を逆算しない。候補は表示モード(REQ-094)に追随しない=未分類モード中もノードの matched 全体(下位に分類済みの画像を含む)が母集合(ECO-085 裁定 2026-07-14)。作業タブは現在の作業スペース内だけを候補とする。Core は明示候補に対しても status=normal・基準自身除外・同一コレクション境界を防御し、候補スコープの除外を特徴量生成・類似度キャッシュ照会より先に行う。REQ-064 の閾値・順序・非同期、REQ-084 の変種、REQ-063 のキャッシュ意味論は不変"
    rationale: |
      ECO-062 裁定(maintainer 2026-07-11、ViewPrismUI IMG-018 `eef89bb`)。実 HDD 約262,046件の
      コレクションで、表示フォルダ約701件からの初回検索もコレクション全 normal 画像を直列 pHash 生成し
      長時間化した(ECO-060 golden 後の分離所見)。FS は排他的な親フォルダが一意だが、NodeGraph は画像が
      複数 leaf に一致可能なため、両軸を「検索実行時点の閲覧コンテキスト」で統一する。
      受入: 明示候補外/別collection/非normalは reader・similarity cache 非接触、FS 親 path 完全一致、
      view current node、workspace 先行限定、巨大 collection+小 scope の reader 呼出数が scope 件数比例を unit exact。
    rationale_precision: ok
    classification_hint: core+surface
    external_source: "ViewPrismUI docs/screens/image_tab.md/review_points.md IMG-018 (`eef89bb`) / ECO-062"
    counterexamples:
      - "表示フォルダが数百件でもコレクション26万件すべてのpHashを生成し、検索が終わらない"
      - "a/ と a2/ を前方一致で同一フォルダ扱いし、別フォルダ候補が混入する"
      - "タグチップの一時絞り込みで候補まで狭まり、同一フォルダの類似画像を見落とす"
      - "作業スペース外の画像を計算した後で結果だけ除外し、計算量がコレクション件数に比例する"

  - id: REQ-088
