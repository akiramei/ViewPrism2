  - id: REQ-046
    statement: "タグ付与パネル: 画像タブの「タグ編集」モードで右パネルに表示し、選択画像の現在タグ一覧(個別解除可)と全タグからの追加(検索可)を提供する。「適用」で選択画像全件へ一括付与。textual タグは候補値ドロップダウン+自由入力で値を指定、numeric タグは値入力ダイアログで「全画像に同じ値」(固定値)または「選択順に連番」(開始値+i)を選択して適用する。選択 0 件時はプレースホルダを表示する"
    rationale: |
