      - "ファイル更新後も古いサムネイルが表示され続ける(キャッシュキーがパスのみ依存)— 原典同様の既知制約として許容"

  - id: REQ-041
    statement: "グリッド表示: 列数は 3/4/5/6 から選択(既定 4)、セルは正方形サムネイル+ファイル名、クリックで選択(Ctrl+クリックで個別トグルの複数選択、選択順の番号を表示)、ダブルクリックでビューア(REQ-044)を起動する(タグ編集モード中はダブルクリック無効)。画像 0 件時は中央に空状態メッセージを表示する。大量件数(目安 100 件以上)でも UI 仮想化によりスクロールが滑らかであること"
