  - id: REQ-056
    statement: "見開きモードのページ配置: 右開き(spread-right)は右ページ=現在インデックス・左ページ=現在+1、左開き(spread-left)は左ページ=現在インデックス・右ページ=現在+1 とする。ペアの 2 枚目が末尾を超える場合、その側は空白ページを表示する。空白ページ開始(startWithEmptyPage、既定 OFF)が ON のとき、現在インデックス 0 では最初の画像を進行方向側(右開き=左ページ、左開き=右ページ)に配置し反対側を空白ページとする"
