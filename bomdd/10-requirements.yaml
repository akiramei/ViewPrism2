      日本式コミックは P1 が見開きの左側(=右開きで currentIndex の次)に来るため、この配置が読書順と一致する。
      受入: ペアリング計算を unit で exact 検査(テストベクタ: 先頭/末尾/奇数・偶数枚数/空白開始 ON・OFF ×
