      - "結果が類似度順でなく id 順に並び、最も似た画像が下に埋もれる"

  - id: REQ-066
    statement: "画像マージは論理操作とする: マージ先(保持する画像)1 枚とマージ元(統合される画像)1 枚以上(いずれも status=normal が前提・同一指定や重複は拒否)を指定し、(a)マージ元のタグをマージ先へ集約(union)する。両方に同一タグがある場合はマージ先の値を保持し、マージ先の値が NULL/空でマージ元に値があればマージ元の値を採用する(RVP-MERGE-002=マージ先優先・§裁定記録 3)。マージ元が複数の場合は id 昇順で処理し、マージ先が NULL/空のタグに最初に非空値を与えたマージ元の値を採用する(以降は上書きしない)。simple タグは存在の union のみ。(b)マージ元の status を deleted にする。(c)物理画像ファイルは一切移動・削除・変更しない(INV-009 woven 安全制約)。マージ元の image_tags は削除しない(deleted ステータスで一覧から除外されるのみ)。全操作は単一トランザクションで行い、失敗時は全ロールバックする"
    rationale: |
      原典 ImageMergeModal.tsx・image-merge.service.ts(タグ ID union→マージ先付与→マージ元 status=deleted、物理非破壊)、
      CPOL-009(論理操作として保存)、RVP-MERGE-001/002。値タグ衝突は原典で曖昧(image_tags PK=(image_id,tag_id) で
      同タグ複数値不可)→ §裁定記録 3 で「マージ先優先」確定。タグ集約は REQ-026(UPSERT)/REQ-027(原子バッチ)の意味論に従う。
      物理非破壊は本ループで L3 物理差分 CP により実証(マージ前後でファイルのバイト・mtime 不変)。
      受入: タグ union(衝突=マージ先優先・NULL 補完)・status 遷移・原子性・物理ファイル不変を固定フィクスチャで exact 検査(unit + L3 物理差分)。
    rationale_precision: ok
    classification_hint: core
    external_source: "原典 image-merge.service.ts / ImageMergeModal / CP-MERGE-001(L3 物理差分)"
    counterexamples:
      - "マージで物理画像ファイルが削除・移動され、元に戻せなくなる(INV-009 違反)"
      - "値タグ衝突でマージ先の値がマージ元の値に上書きされ、保持すべき値が失われる"
      - "タグ集約の途中で失敗し、マージ先に一部タグだけ付いてマージ元が deleted のまま残る(部分適用)"

  - id: REQ-067
    statement: "マージ UI: 類似検索結果または複数選択からマージ先(1 枚)とマージ元(1 枚以上)を指定し、マージを実行できる。実行前にマージ先・マージ元と統合後タグのプレビューを示し、物理ファイルは削除されない旨を明示する。マージで deleted になった画像が『見えないまま消える』ことを避けるため、最小のトラッシュ(deleted 画像一覧)表示を提供する(一覧と件数のみ。復元・完全削除の操作は後続ループ)"
    rationale: |
