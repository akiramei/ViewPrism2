    statement: "ビューアは表示モード normal(V1 既存)/scroll(縦連続)/spread-right(右開き見開き)/spread-left(左開き見開き)を持ち、ビューア内の操作 UI で切替できる。既定モードは normal。モードごとに最後に表示した画像インデックスを記憶し、モード切替時にそのモードの前回位置を復元する(記憶はビューアを開いている間のみ。閉じると破棄)。Esc と閉じるボタンは全モードで有効、画像外余白クリックで閉じる(REQ-044)は normal モードのみ有効とする(scroll/spread はページ送りクリックと衝突するため無効 — 移植版設計)"
    rationale: |
      原典 ImageViewer.tsx:27-84(modeIndexMapRef によるモード別位置記憶・切替時復元)、types.ts:16(ViewerMode 4 値)、
      ViewerContext.tsx:25-34(既定 normal)。原典はモーダル全面に見開きページが広がり余白が無く、背景クリック閉じるは
      事実上 normal のみ → 移植でも明示的に normal 限定と確定する(誤操作防止)。
      受入: モード別位置記憶のラウンドトリップ(切替→復元)と既定値は unit(ViewModel)、切替 UI と描画は golden+承認者。
    rationale_precision: ok
    classification_hint: surface
    external_source: "原典 ImageViewer.tsx(モード管理)/ K-AVALONIA(コントロール切替)"
    counterexamples:
      - "scroll で 50 枚目まで進み spread に切替えると先頭へ戻され、位置を見失う"
      - "spread 表示中に余白クリックでビューアが閉じ、ページ送りのつもりが閲覧終了になる"

  - id: REQ-055
    statement: "スクロールモード: 画像を一覧順(REQ-038 の整列結果)で縦一列に連続表示する。全件を一括読み込みせず、現在位置の前後ウィンドウを段階読み込みし、上端・下端への接近で読み込み範囲を拡張する。ユーザーのスクロール停止後、表示領域の垂直中央に最も近い画像を現在位置として追跡する(この位置がモード別位置記憶 REQ-054 とビューアの現在位置表示に反映される)。←→キーまたは現在位置の変更で対象画像の位置までスクロールする。画像間ギャップは gapMode(REQ-058)に従う"
    rationale: |
      原典 ScrollMode.tsx:33-59(初期ウィンドウ前10/後15)、414-427(端 1000px 接近で 15 件ずつ拡張)、
      431-441(停止 500ms 後に追跡)、283-329(中央最近傍の判定 = 画像矩形中心と表示領域中心の距離最小)、
      219-276(外部ナビゲーション時は該当画像へスクロール)。ウィンドウ幅・閾値の数値は原典の実装定数であり
      契約ではない(E-BOM で本実装の定数を確定し、変更可能な実装詳細とする)。中央最近傍の追跡規則のみ契約。
      受入: 中央最近傍の追跡規則・読み込みウィンドウの拡張(全件一括でないこと)は unit(ViewModel+疑似ビューポート)、
      スクロール描画・体感は golden+承認者。大量件数の挙動は探索プローブ対象。
    rationale_precision: ok
    classification_hint: surface
    external_source: "原典 ScrollMode.tsx / K-AVALONIA(ScrollViewer・仮想化)"
    counterexamples:
