  - id: REQ-034
    statement: "ビューはタグ階層(view_tag_hierarchies)を持つ: 各ノードは tag_id 必須、parent_id(NULL=ルート)、position(同一親内の表示順、0 起点昇順)、alias(表示名上書き)、condition_type(equals/range/pattern/values/NULL)と condition_value(JSON)を持つ。ノード移動時、自分自身・子孫への移動は拒否する"
