  - id: REQ-079
    statement: "ビューの表示列(display_columns)は順序付きの列配列で、基本情報キー(name/size/modified_date)と、そのビューのタグ階層メンバーシップに含まれるタグのキーから構成する。各列は kind(basic/num/text/simple)を持ち(basic=name/size/modified_date、タグ列は タグ型を num=数値/text=テキスト/simple=シンプル へ射影)、kind がセル描画とソート規則を決める。先頭列は常に name(c_name)で固定=削除・並べ替えの対象にせず(columns[0]==c_name を機械的に担保・両画面共通)、合計列数は 1 以上・最大(標準 5・固定で先行)以下とする。display_columns はビュー定義が所有し(コレクション×ビューのローカル上書きを持たない・ファイル一覧の表示列編集も同一の display_columns を書き戻す)、変更時は modified_at を更新する(閲覧では不変)。Ver1 の『種類(kind 列)』は廃止し、列ソースは基本情報とタグのみとする"
    rationale: |
      ECO-025。ViewPrismUI CAD(docs/screens/view_edit.md / file_list.md)+ モック(ビュー編集/ファイル一覧 standalone)。
      display_columns は原典 views テーブル由来で V1 からスキーマ/Core/描画(REQ-030/042)に存在するが、進化モデル
      (順序・kind・名前固定・最大5・基本∪ビュー内タグ・ビュー所有)は未確定だった。本 REQ が maintainer 裁定 VE-001(名前固定・
      モック是正でロック=安全/整合はモックより上位)・VE-002(最大5・固定で先行)・VE-003(ビュー所有・書き戻り)を確定する。
      DB マイグレーションは不要(既存 display_columns TEXT/JSON へ前方互換直列化・CP-DB-006 スキーマ同値不変)。
      受入: ラウンドトリップ(basic+tag 列)は unit(CP-VIEW-012 既存)、名前固定/上限/母集合の不変条件は列ピッカー unit。
    rationale_precision: ok
    classification_hint: core
    external_source: "ViewPrismUI:docs/screens/view_edit.md / file_list.md・資料/タグタブ|画像タブ の standalone モック / review_points.md VE-001〜003 / 既存 REQ-030・REQ-042・DisplayColumnParser"
    counterexamples:
