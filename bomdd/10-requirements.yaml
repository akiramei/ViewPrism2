      - "normal Width/Originalの途中でwheelが画像内panせず次画像へ飛ぶ"
      - "画像内panで下端へ到達させた同じwheel eventが同時に次画像へ送る"
      - "上端からwheel Prevして前画像へ戻ったとき、読み終えた末尾でなく先頭へ着地する"
      - "設定drawer/mapping modal上のwheelが裏のviewerも送る"
      - "spread-rightだけwheel方向を反転し、wheel下が前へ戻る"

  - id: REQ-092
    statement: "カタログDBスナップショット(バックアップA層)を提供する。役割分担の核文=DBスナップショットはライブラリ全体の時点復元を行い、マージしない(コレクション単位の非破壊統合はB層=論理パッケージが担う)。対象はviewprism2.db内の全データ(tags/views/workspaces/merge_operations/キャッシュ含む)。画像実体・サムネイルキャッシュ・settings.jsonは対象外で、作成/復元の両UIに「画像ファイルは含まれません」を明示する(M3)。作成=共有接続上のVACUUM INTOで一意な.partialへ出力→読み取り専用でquick_check+foreign_key_check→SHA-256チェックサム→検証成功後に正式名(snapshot-*.db)へアトミックリネーム+サイドカーメタ(app_version/created_at/checksum/size)。中断・検証失敗時に不完全ファイルが正式名にならず、.partialを残さない。一覧=作成日時/app_version/サイズ/検証状態を表示し、検証待ち(メタ欠落・サイズ不一致)は復元ボタン無効。復元(案A)=A-2確認ダイアログ(取り消し不可警告・再起動・自動ロールバック・画像非含有の明示)→復元直前検証(integrity_check+foreign_key_check+スナップショット内migrations IDが現行既知集合の部分集合であること。未知ID=より新しいアプリ由来は拒否)→復元予約(restore-pending.json)→自動再起動→次回起動のDB接続確立前にブートストラップが適用: 予約は読取時に削除(一回限り)→現行DBの安全スナップショット作成→現行退避→差し替え→差し替え先検証→失敗時は退避DBへ戻して通常起動継続。復元後の未適用migrationは既存MigrationRunnerが昇順適用する。入口=設定▸データとバックアップ節E-1のスナップショット行カード[開く](SS-001再裁定2026-07-13=M5・ECO-077。行サマリ=最終作成yyyy/MM/dd HH:mm・N件のL8書式、0件はplaceholder最小=件数のみ・SS-004暫定)。保存先=アプリ共通設定(既定%APPDATA%/ViewPrism2/snapshots・変更可)。用語=「スナップショット作成/時点復元」(M1)。自動バックアップ・保持世代管理はUI非表示・将来ECO(M2)"
    rationale: |
      ECO-072起票(maintainer要求2026-07-12: タグ/階層ビュー/コレクションのバックアップ)+gate①裁定(案A採用・SS-001=(b)分置)。
      CAD=ViewPrismUI docs/screens/snapshot_export_import.md(`1fc5aaa38dd2`、SS-001裁定`77e4f50`)。
      WALモードのため稼働中の単純ファイルコピーは-wal/-shmと不整合になり得る。VACUUM INTOは稼働中DBから一貫した
      コンパクトなスナップショットを作れるが、出力は中断時に不完全になり得るため.partial→検証→アトミックリネームを契約化。
      単一共有SqliteConnection+SemaphoreSlimアーキテクチャのため稼働中差し替えは不可で、復元予約→再起動時差し替えを採用。
      互換性判定はスナップショットがmigrationsテーブルを内包するためサイドカー不要で機械判定できる。
      SS-003: 作成手順が検証込みのため作成フロー内で「検証待ち」は発生しない(外部持込ファイル等が発生源)。
    rationale_precision: ok
    classification_hint: core+surface
    external_source: "ViewPrismUI docs/screens/snapshot_export_import.md (`1fc5aaa38dd2`/`77e4f50`) / ECO-072"
    counterexamples:
      - "作成中断・検証失敗で .partial や不完全ファイルが正式名の snapshot-*.db として一覧に載る"
      - "検証待ちスナップショットの復元ボタンが活性"
      - "未知のmigration IDを含むスナップショットを復元してしまう"
      - "復元失敗後に退避DBへ戻らず起動不能になる"
      - "復元予約が失敗後も残り、起動のたびに復元を再試行する"
      - "スナップショット作成/復元が画像実体やサムネイルへ触れる"

  - id: REQ-093
    statement: "コレクション論理パッケージ(バックアップB層 V1)を提供する。核文=論理インポートはバックアップ時点のデータを現在のライブラリへ非破壊で統合する機能であり、過去のタグ体系を厳密に巻き戻すものではない(全体時点復元はREQ-092のA層)。transport=単一UTF-8 JSON(kind=collection・拡張子 .viewprism2-collection.json)。互換判定は format/formatVersion/minReaderVersion/features(未知の必須featureのみ拒否・未知の任意フィールドは無視)で行い、schema_migrations/app_versionを判定に使わない。書き出し=専用読み取り接続の単一読取トランザクション(同一時点)から、参照タグの依存閉包(祖先チェーン+型別設定)と画像参照(relative_path=/区切り正規形・fingerprint=既存SHA-256・file_size・作成/更新日時)をストリーミングで .partial へ→構造検証→アトミック確定。対象status=normal/missing。タグ値はstring|null(タグ定義が型の唯一の正・simple=null省略不可・numericはInvariantCulture正規形・書き出しで4/4.0/04.000の揺れを作らない)。取り込み=解析/プレビューはトランザクション外・実適用は単一トランザクション(例外/キャンセルで全ロールバック)・適用直前にタグ計画を現在のDB状態から再構築(プレビュー鮮度)。タグ照合5段=①永続マッピング(tag_import_mappings・検証省略なし)→②UUID一致(型変更=競合・クランプ禁止)→③意味定義完全一致(名前+型+型別設定+親の解決先)で自動マッピング+対応保存→④衝突なしはUUID維持で新規作成→⑤名前一致・意味定義不一致は競合(4択=中止/スキップ/別名で取込/既存へ割当=型互換のみ)。画像照合5状態=一致(id/パス+ハッシュ)/移動検出(パス不一致・一意ハッシュ=自動追随)/変更あり(パス一致・ハッシュ不一致=競合・明示のみ)/曖昧(複数一致=自動選択しない)/未解決=missing行として参照のみ登録(タグ着地・pending不可=スキャンで行削除・実体出現時は規則3a候補提示→修復画面確定でimage_id不変リンク)。マージは(image,tag)単位の追加型=追加はするが削除しない・同値=変更なし・値競合=現行維持。未解決が過半なら確認ゲート(EX-002=過半)。厳格拒否=重複プロパティ/重複ID/親循環/存在しないタグ参照/絶対パス・..・NUL/未知必須feature/不正numeric値。migration 008=tag_import_mappings+library_metadata(DB内ライブラリUUID)。入口=設定▸データとバックアップ節E-1の移送2行カード(SS-001再裁定2026-07-13=M5・ECO-077。[選ぶ…]→B-1・[ファイルを選ぶ…]→B-2=picker自動起動。⋯メニューは「設定でバックアップ・移送…」誘導1項目のみで実体を持たない)。コレクション文脈が無いため書き出し対象はB-1内で選択・取り込み先はB-2内で選択(gate①裁定=案A・既定未選択・選択まで「次へ」不活性=互換OKとAND。突き合わせ基準ルート=選択コレクションのフォルダ)。UI=B-1書き出し/B-2検証(互換NG別面)/B-3プレビュー&競合解決(実行は競合0のみ)/B-4結果レポート。用語=「書き出す/取り込む」(M1)・画像非含有明示(M3)・削除しない明示(M4)"
    rationale: |
      ECO-073起票+gate①裁定(参照のみ登録採用・2026-07-12)。仕様はmaintainer+外部アドバイザー事前議論で確定し、
      CAD=ViewPrismUI docs/screens/snapshot_export_import.md(`1fc5aaa38dd2`・B-1〜B-4)+captures(`b8389f9`)。
