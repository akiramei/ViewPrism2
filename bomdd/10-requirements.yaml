      原典: TaggingPanel.tsx(Current/Add タブ・適用ボタン)、NumericTagDialog.tsx:64-128(fixed/sequential)、
      ImageTagChip.tsx(値編集・解除)。付与・解除の意味論は REQ-026(UPSERT)/REQ-027(原子バッチ)に従う。
      候補値ドロップダウン+自由入力は REQ-024(候補値は入力補助)の UI 化(原典は手入力のみ — 意図的差分)。
      受入: ViewModel ロジック(適用対象計算・連番 startValue+i・解除・numeric 範囲検証の伝搬)は unit、
