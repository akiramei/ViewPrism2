      歴代 golden が外観 approved となり、ECO-052 裁定 b(maintainer 2026-07-06)で as-built を追認・要求を改訂:
      **ViewPrism2 はあらゆる機能が物理ファイルシステムに非破壊(INV-009 woven)であり、機能個別の
      非破壊通知は行わない**(例外: ゴミ箱の完全削除=「元に戻せません」の不可逆警告とセットの確認は
      G-10 裁定どおり存続 — あれは不可逆性の警告であって非破壊通知ではない)。
      事前タグプレビューは補償 Undo(ECO-044)の登場で保護価値が低下し撤回(見比べ表示+実行前サムネイル
      +事後 Undo が代替)。統合意味論は OC-17・非破壊実証は L3 CP-MERGE-001 で機械担保(不変)。
      受入: マージ対象選択の ViewModel は unit、画面とトラッシュ一覧は golden(G-9)+承認者。
    rationale_precision: ok
    classification_hint: surface
    external_source: "原典 ImageMergeModal / TrashModal / K-DESIGN"
