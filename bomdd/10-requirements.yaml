  - id: REQ-065
    statement: "類似検索 UI: 一覧/グリッドで画像 1 枚を選択して起動し、閾値スライダー(50〜100、既定 70)を提供する。検索方式は pHash のみとし、detailed/高精度モードの選択肢は表示しない(将来拡張 — RVP-REPAIR-005/§裁定記録 4)。結果は類似画像を類似度%付きで類似度降順に一覧表示し、各結果を選択できる。検索中は進捗を表示し、結果 0 件時は空状態を表示する。選択した類似画像群はマージ(REQ-066/067)の対象にできる"
    rationale: |
      原典 SimilarImageSearchModal.tsx(モード・閾値・進捗・大量件数警告)、RepairModal.tsx(criteria/similar 切替 — V3 は similar のみ)。
      原典は simple/detailed の選択を出すが、本実装は pHash-only に確定(§裁定記録 2/4)しモード選択 UI を出さない(効かない設定の誤解防止)。
      閾値範囲・既定は原典準拠。受入: 結果整列・選択・空状態の ViewModel ロジックは unit、画面は golden(G-9)+承認者。
