      GF-02: "実機の真因はホバー(:pointerover)で行が反応すること(maintainer 第2報・エクスプローラー特大アイコン比較)。cellFrame.selected は枠のみで静的には正だが、Fluent テーマの :pointerover/:selected が行 ListBoxItem のテンプレート部品(PART_ContentPresenter)に背景を適用(テンプレート定義値より Style が高優先)。修正(Run3 適用=A 経路): (1)OnCellPressed で e.Handled=true(行選択バブリング抑止) (2)アプリスコープの :pointerover/:selected /template/ ContentPresenter#PART_ContentPresenter スタイルで Background=Transparent 上書き。ホバー・選択はセルのみ反応"
      GF-V2-01: "見開きの開き方向トグル(右開き/左開きの 2 ボタン)に選択状態の視覚がなく現在方向が不明(Run1 CHEAT-05・maintainer G-8 所見)。修正(Run3 適用): view-prism 準拠でコントロールバーを単一/縦スクロール/右開き/左開きの上位 4 トグルに再構成(『見開き』抽象廃止=仕様 ViewerMode 4 値に一致)、active な 1 つだけ filled(アクセント背景+白文字)で一目瞭然"
    gf02_design_decision:
      date: 2026-06-13
      decision: "A(スタイルパッチ=行リスト維持+行選択視覚の確実な無効化)を GF-02 正式是正として採用。B(ItemsRepeater+UniformGridLayout で『行』を撤廃する真のアイコンビュー)は別 ECO/技術スパイクへ分離(承認者 maintainer 裁定)"
      rationale: "maintainer 指摘: 画像グリッドに『行』概念は本来不要で B が抽象として理想。ただし Avalonia.Controls.ItemsRepeater は Avalonia 12 でコア非同梱の別パッケージ(12.0.0・retired/archived after 12.0)で 12.0.4 本体に公開型なし。GF-02 是正と同ランで BOM 昇格は事故リスク大。行リストは FMEA-013 回避の実績ある既定。→ A で承認を取り、B はスパイク先行で実証してから昇格(K-AVALONIA に明文化済み)"
    verification_constraint: "GF-01/02/V2-01 は視覚要件。工場・設計者ともヘッドレスでは目視確認不可 → 最終検証は maintainer の golden 再承認(Run3 ビルド後)= 2026-06-13 全 OK で充足"
    note: "ビューア機能(G-8)+表示視覚 3 点(GF-01/02/V2-01)とも承認済み"

