bomdd:
  product: ViewPrism2
  experiment: loop-v1-core
  layer: Metrics

# 二軸品質(method-v1 §6): 決定性(工場間ばらつき)と正しさ(受入)は独立に測る。
# 本ループは単一工場(チャーター: 実用適用)のため、ばらつき測定は対象外。

metrics:
  factory_runs: 5                  # Run1 骨格+純粋コア / Run2 DB+スキャン+サービス / Run3 表面 / Run4 収束再製造 / Run5 ECO-002 golden 収束
  fixed_oracle:
    cases: 12                      # S-01〜S-12(tag loop-v1-r1 で凍結、ループ中不変)
    after_run3: "12/12 PASS"
    after_run4: "11/12 → 治具修理(JIG-001)後 12/12 PASS。製品起因の乖離 0"
    after_run5: "20/20 PASS(テスト数。回帰ゼロ・凍結不変)"
  self_acceptance:
    tests_final: 234               # unit/L2/L3(Run5 で +44。オラクル治具 20 は別)
    build_warnings: 0              # TreatWarningsAsErrors
    regressions_across_runs: 0
  interventions: 0                 # 製造中の設計者介入(隔離は全 Run で維持。質問往復ゼロ)
  cheats:
    total: 71                      # Run1: 13 / Run2: 21 / Run3: 18 / Run4: 14 / Run5: 5
    blocker: 0                     # Run5 CHEAT-R01 は工場自己申告 blocker → 裁定で friction(設計側帰属: 影響分析 under-inclusion)へ再分類(51-cheat-log)
    friction: 10                   # 裁定済み(51-cheat-log.md)
    minor: 61
    distribution: "核(ドメインロジック)の挙動乖離 0。表面(UI 構成・未規定次元)・契約転記漏れ・実装基盤(Dapper materialization)に集中"
  targeted_fix_success:            # 収束ループの狙い撃ち補正が 1 回で受入緑になったか
    run4_targets: [シェルのタブ化, タグタブ3ペイン, タグ付与パネル(REQ-046), ビューア起動経路, 階層バッチ保存]
    result: "5/5 — fresh re-run 1 回で全受入緑(自己受入+オラクル)"
  new_unspecified_found_in_convergence: 2   # views.description 契約欠落(CHEAT-053)/ view_conditions 編集 UI の行き先(CHEAT-056)
  jig_defects: 1                   # JIG-001: オラクル S-05 フィクスチャの現行コード結合(偽陽性)→ 凍結スナップショット化で修理
  nfr:
    NFR-001: "PASS — 条件評価 1,000 画像×3 条件、200ms 制限を大幅充足(CP-NFR-001、3 回中央値)"
  golden_approved: [CP-UI-G1, CP-UI-G2, CP-UI-G3, CP-UI-G4, CP-UI-G5, CP-UI-G6, CP-UI-G7]   # 全 7 件(2026-06-12。第1回の指摘は ECO-002 で全解消 → 再判定で承認)
  golden_pending: []                # なし — チャーター完了定義充足(50-as-built charter_completion)
  loop_v1_status: "完了(2026-06-12)"
  golden_findings_deferred: [GF-01 ダイアログ高さ伸長, GF-02 グリッド行背景色, GF-03 ホームタグ★アイコン, GF-04 パレット選択視覚, GF-05 条件サマリの \u エスケープ露出]   # V2 申し送り(50-as-built)
  probes_pending: [P-01, P-02, P-03, P-04]   # 探索プローブ(golden 承認と併せて実施可)
  eco:
    - id: ECO-001
      type: documentation
      changed_artifacts: 2          # 20-spec.md §2.1 / 30-ebom.yaml E-SCAN-005
      remanufacture: 0              # 製造物無変更(コード/オラクル/テスト/golden)
      regressions: 0
      origin: reverse-input(porting-spec RVP-SCAN-003 との突き合わせ)
      note: "仕様プローズ忠実度の是正。実装・固定オラクル S-01 は当初から正しい"
    - id: ECO-002
      type: golden-convergence
      change_requests: 8            # CR-1〜8(golden G1 指摘 4+表面全数突き合わせ 4)
      defects: 4                    # DF-1〜4(G4/G5/G6/G7)
      changed_bom_artifacts: 5      # 20/10/30/31/33(v1.3)
      remanufacture_units: "表面のみ(App+Settings)。核・スキーマ・凍結オラクル不変"
      regressions: 0                # 凍結オラクル 20/20・既存 unit 190 全緑維持
      change_miss: 0                # 新規 unit 44 全緑
      unnecessary_modification: 0   # diff 監査済み(逸脱 4 ファイルは全件申告・裁定済み)
      impact_prediction: "under-inclusion 1(DF-2 根因が E-DB-010 — 欠陥系 ECO への予測の弱さとして教訓化)"
      cheats_run5: 5                # 裁定後 blocker 0 / friction 2 / minor 3
      root_causes_found: "DF-2: Dapper×空 image_tags の COUNT 列 BLOB 化 / DF-4: Avalonia ClickCount の環境依存"
      pending: "golden CP-UI-G1〜G7 再判定(承認者 maintainer)"

# ── Loop V2(loop-v2-viewer)メトリクス ──
metrics_v2:
  experiment: loop-v2-viewer
  factory_runs: 2                  # Run1(factory-02): 全 4 単位 / Run2(factory-03): scroll 仮想化 収束再製造
  fixed_oracle:
    cases: 18                      # S-01〜18(S-13〜18 を tag loop-v2-r1 で追加凍結。S-01〜12 は loop-v1-r1 不変)
    facts: 31                      # テスト数(S-01〜12=20 + S-13〜18=11)
    after_run2: "31/31 PASS(全 18 シナリオ。回帰ゼロ・凍結不変)"
    designer_implemented: "S-13〜18 は設計者が Phase 5 で実装(工場非開示の凍結シナリオ・製造コード公開 API 直叩き)"
  self_acceptance:
    tests_final: 290               # unit/L2/L3(V1 234 + V2 新規 56。オラクル治具 31 は別)
    build_warnings: 0              # TreatWarningsAsErrors
    regressions_across_runs: 0     # 既存 234 を 1 件も変更・削除せず全緑
  interventions: 0                 # 製造中の設計者介入ゼロ(隔離維持。G3 ドライランも質問ゼロ)
  cheats:
    total: 14                      # Run1: 8 / Run2: 6
    blocker: 0
    friction: 2                    # CHEAT-03(Run1 scroll 非仮想化 → Run2 で是正)/ CHEAT-04(Run2 位置追跡の View 結線変更)
    minor: 12
    distribution: "核(計算核 M-VIEWERCORE-017)の挙動乖離 0。表面(仮想化方式・コントロールバー形態・アイコン・i18n 新規キー)と実装定数に集中"
  convergence:
    trigger: "CHEAT-03(Run1 friction): scroll が ItemsControl 直置き(非仮想化)"
    probe_first: "P-05 先行測定(ユーザー裁定)で FMEA-016 顕在化(全件フルサイズ Bitmap 常駐・1,000 枚 8〜48GB)と判明"
    bom_fix: "K-AVALONIA/M-UI-018 に scroll 仮想化必須を明文化(コーチングでなく BOM へ)"
    run2_result: "fresh factory-03 で scroll のみ再製造 → ListBox+VirtualizingStackPanel+ContainerClearing→Release。1 回で受入緑(build/unit 290+V1 オラクル 20 回帰ゼロ・メモリ総枚数非比例=REQ-055 充足)"
  targeted_fix_success:
    run2_targets: [scroll 仮想化(ItemsControl 直置き廃止・画面外 Dispose/キャンセル)]
    result: "1/1 — fresh re-run 1 回で受入緑(P-05 round-2 で構造的解消を確認)"
  new_unspecified_found_in_convergence: 0   # BOM は scroll 段階読み込みを既に指定済み。Run1 は仕様欠落でなく製造ミス
  nfr:
    NFR-001: "維持(変更なし — 評価器 unchanged)"
    NFR-002: "維持(グローバル例外ハンドラ unchanged)"
  golden_approved: []                       # golden 承認待ち
  golden_pending: [CP-UI-G8, "CP-UI-G1(GF-02)", "CP-UI-G6(GF-01/03/04/05)"]   # 承認者 maintainer の実機目視
  probes:
    P-05: "観測済み(round1 顕在化 / round2 解消)— 42-exploratory-probes.yaml"
    P-06: "未実施(操作感。golden 実機ウォークスルーと併せて観測可)"
  loop_v2_status: "製造・固定オラクル受入 完了。golden 承認待ち(maintainer)。50-as-built は golden_pending で登録"
