    GF-V4-02: "golden G-10 再(maintainer 実機): ビューアで読み込み失敗する画像が修復一覧に出ない=status=normal のまま(再スキャンしていない)。原典 view-prism 確認(RepairModal=findByStatusInFolder('missing')・物理検証なし。検出は再起動/コレクション展開のスキャン依存。auto-repair count=missing ごとに hash+拡張子+サイズで候補探索し**ちょうど 1 件**の数)。**是正**: WindowService.ShowRepairAsync が修復を開く前にコレクションをスキャン(missing 化+リネーム後を pending 登録)+ RepairViewModel が『N 件のリンク切れ(M 件が自動修復可能)』を表示(§2.11.5 追記)。build 0・Tests 380(+1)・Oracle 73 回帰ゼロ。defer: コレクション展開時の自動検出(グリッド反映)は修復を開いた時のスキャンで代替・必要なら後続"
    GF-V4-03: "golden G-10 再(maintainer 実機): 再リンク候補(右・Pending∪Normal)は出るのに、左の『検索』ボタンを押すと検索結果が空。原因=左検索は単体 status=Normal 限定(§2.11.1/裁定4・INV-010 整合)で、候補(リネーム後の pending)を漏らす不一致。maintainer 選択『検索を再リンク候補探索に統一』(原典 AdvancedRepairModal=検索結果が候補)。**是正**: 検索ボタン=選択中 missing の再リンク候補(Pending∪Normal)を現在のフォーム条件で再探索(RefreshCandidatesAsync)。Normal 限定の別検索結果リスト(SearchResults/CriteriaResultViewModel)を廃止・RepairViewModel から CriteriaSearchService 依存も除去。検索は missing 選択中のみ活性。build 0・Tests 379(標準検索 3 テスト→統一検索 2 テストへ置換)・Oracle 73 回帰ゼロ。criteria エンジン(CriteriaSearchService/CriteriaMatcher・S-27/CP-CRITERIA-019)は不変(relink 候補探索で継続使用)"
    GF-V4-04: "golden 追加(クローズ後・maintainer 原典比較): 再リンク候補が相対パス+サイズのみで、原典 AdvancedRepairModal が出すサムネイル/ファイル名/更新時刻を欠き再リンク可否を判断できない。**二層の後退** — (1) REQ-017 ポーティングが候補表示を『パス/サイズ/mtime』テキスト3項目で要件化しサムネイル+ファイル名見出しを脱漏(原典の *データ契約/挙動* は捉えたが *表示契約* を要件化せず)、(2) V4 表面化で VM が ModifiedText を計算済みなのに XAML が bind せず更新時刻も脱落(旧 RelinkWindow より後退)。**構造的真因**: 表示パリティは固定オラクル(論理)で捕捉不能→100% golden 依存だが golden 過去2回は挙動所見に集中し候補カードの情報密度を原典と突合せず。**是正**: 候補カードを5要素(サムネイル+ファイル名+パス+サイズ+更新時刻)に。既存 ThumbnailImage(SimilarSearch/Trash と同経路)流用・RepairViewModel が collection root 解決で絶対パス供給(TrashViewModel 同パターン)。§2.11.5 に表示パリティ契約を明記。Tests 381(+2)・Oracle 73 PASS+2 skip 回帰ゼロ・compile-clean"
