  golden_findings_v4:
    GF-V4-01: "golden G-10 第1回(maintainer 実機): 復元・完全削除・物理非破壊は OK。**criteria/relink が NG** — missing 選択時に候補が自動探索されず SHA-256 手入力が必要で実用不可。原典 view-prism 確認(searchForRelink + NewUI RepairModal)= criteria は真偽フラグで値を選択 missing から自動導出・既定 useHash/useExtension/useSize・自動実行。**是正**: RepairViewModel が missing 選択時に hash+拡張子+サイズを criteria へ自動事前入力し候補を手入力なしで提示(§2.11.5 追記)。build 0・Tests 379(+1)・Oracle 73 回帰ゼロ。golden 再ウォークスルー待ち"
