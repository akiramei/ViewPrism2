      id: ROUTE22-CORE
      name: タグ制御配置核を製造する(純粋計算・unit 受入とセット)
      input: [M-TAGCTRL-028]
      output: [src/ViewPrism2.Core/Services/Viewer/(ViewerTagAction/TagActionResolver/TagControlLayoutCalculator/TagControlNavigator), tests(CP-TAGCTRL-024 全ベクタ緑・OFF-identity 含む)]
