  regression_guard: "既存の意味論を変更しない。既存 unit/Oracle テスト(S-01〜S-31)の修正・削除は禁止。**enableTagControl=OFF 経路はフェーズ1 と完全同一(OFF-identity)を壊さない**。既存テスト期待値変更が要ると判断したら変更せず blocked とし C6 報告(例外: CP-SET-009 の ECO-022 ベクタ追加は新規テストで対応)。**スキーマ変更禁止**=永続化は settings.json(migration 追加不可)"
  steps:
