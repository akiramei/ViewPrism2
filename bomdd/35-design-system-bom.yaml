bomdd:
  product: ViewPrism2
  experiment: "loop-v4-repair-lifecycle 横断(単一ループに紐づかない補助台帳)"
  layer: Design System BOM

# ─────────────────────────────────────────────────────────────
# [disposition: shared-component-sub-bom / candidate — PLM は本ファイルを画面部品と同列の E-BOM として扱わない]
#
#   状態(2026-06-22 時点):
#     - shared_surface_components / kbom_design_knowledge の部品カタログは ViewPrism2 用に実在内容で記入済。
#     - 一方 source_cad_refs.ui_mock_ref・K-DESIGN の version/source・coverage_matrix・gates は
#       テンプレ既定(<...> プレースホルダ)のまま = まだ binding を張っていない。これは未記入欠陥ではなく
#       「共有 component sub-BOM として候補状態に置いている」ことの表明(全 lifecycle: candidate)。
#
#   正式採用する場合にやること(その時まで上記プレースホルダは意図的に未充足):
#     1. coverage_matrix を実 UI-BOM(bomdd/ui/ui-bom.json・bomdd/ui/image-tab/ui-bom.json)と突合して埋める。
#     2. E-DESIGN-028/K-DESIGN を材料(material)として維持し、SC-* を共有 component sub-BOM として screen surface から消費させる。
#     3. CP-DESIGN-* / gates(G-DS-001/002)を現行 BomDD の子レコード規則に合わせて key 化する。
#   ※ 現状のデザイン言語の実装来歴は ECO-009(タグタブ デザイン言語移植・Components.axaml/App.axaml)を参照。
#   正本宣言は 00-manifest.yaml の auxiliary.design_system_bom を参照。
# ─────────────────────────────────────────────────────────────

# Design System BOM(shared-component-sub-bom candidate):
# UI-CAD(HTML mock + UI-IR/UI-BOM) が要求している見た目・構造・操作言語を、
# design material(E-DESIGN-028/K-DESIGN)・shared surface component(SC-*)・screen surface(E-UI-*) の
# 3 層関係として明示する。
#
# 目的:
#   - 実機が素の Border/DockPanel/グリフ文字で薄く実装されるのを防ぐ
#   - Card / CTA / Chip / Badge / IconButton などを「装飾」ではなく共有 component 原器として扱う
#   - visual-gap-analysis(43) で CAD と実機の差分を部品欠落として帰属できるようにする
#
# 位置づけ:
#   独立した正式 BOM 層ではなく、E-BOM/K-BOM/Control Plan をまたぐ共有 component sub-BOM。
#   正式化する場合も Card/Chip/Button を画面機能部品と同列にせず、E-UI-* surface が消費する
#   SC-* 原器として coverage gate で管理する。

design_system_bom:
  root:
    ebom_item_ref: E-DESIGN-028
    kbom_pack_ref: K-DESIGN
    name: <UI design language / design system root>
    purpose: <Card/CTA/Chip/Badge/IconButton などを束ね、各 UI surface へ適用する設計言語の部品層>
    part_kind: shared-component-sub-bom
    lifecycle: candidate
    surface_layers:
      material: [E-DESIGN-028, K-DESIGN]
      shared_component: [SC-CARD-001, SC-CTA-BUTTON-001, SC-TYPE-CHIP-001, SC-CONDITION-CHIP-001, SC-VALUE-CHIP-001, SC-BADGE-001, SC-ICON-BUTTON-001, SC-SECTION-HEADER-001, SC-HELP-BOX-001, SC-DRAG-HANDLE-001, SC-COLUMN-PICKER-001, SC-SIMILARITY-SESSION-002]
      screen_surface: [E-UI-BROWSE-022, E-UI-AXIS-NAV-040, E-UI-MODE-041, E-UI-SHELL-021, E-UI-TAGASSIGN-029, E-UI-TAGS-026, E-UI-NODEGRAPH-025, E-UI-REPAIR-039, E-UI-SIMILARITY-035, E-UI-WORKSPACE-043]

  # ECO-025(表示列モデル・段階 α/β/β-2)で導入した共有部品。
  # 列ピッカー = 選択済み列(順序・上下移動/削除・ソースチップ・色ドット)+ 追加元カード(基本/ビュー内タグ・種別チップ)
  # + 件数バッジ(合計 N/最大 M・上限でアンバー+追加元不活性)+ 名前固定(先頭・「固定」バッジ)。
  # 消費 surface = E-UI-TAGS-026(ビュー編集モーダル・α)と E-UI-BROWSE-022(表示列ポップオーバー・β-2)。
  # disposition: isolate now, DRY later を完遂。両 surface が golden 済(maintainer 実機 2026-07-02)になった後、
  #              共通 VM ColumnPickerViewModel(App/ViewModels)へ DRY 統合済。ビューは各 surface の golden 承認レイアウトを保つ
  #              (α=追加元 2 カラム / β-2=単一マージ)= 同一 VM の別射影。ファイル全体 disposition は candidate のまま
  #              (PLM は 35 を E-BOM と同列に扱わない)だが、本部品は実体化済(realized)。
  column_picker_candidate:
    id: SC-COLUMN-PICKER-001
    name: 表示列ピッカー(選択済み列 + 追加元カード + 並べ替え + 上限バッジ + 名前固定)
    part_kind: shared-component-sub-bom
    lifecycle: candidate
    dry_status: realized   # ECO-025 M4: 両 surface golden 後に ColumnPickerViewModel へ統合済(DRY 完了)
    realized_by: "src/ViewPrism2.App/ViewModels/ColumnPickerViewModel.cs(+ Views/ColumnPickerView.axaml=β-2 / ViewEditDialog.axaml=α が合成消費)"
    introduced_by: ECO-025
    consumed_by: [E-UI-TAGS-026, E-UI-BROWSE-022]
    control_plan_refs: [CP-COLPICKER-025]
    dry_gate: "両 surface(ビュー編集モーダル α / 表示列ポップオーバー β-2)が golden 済み(2026-07-02)→ 統合完了(ECO-021 の isolate now, DRY later と同運用)"

  # ECO-066 M4: 画像/作業タブの整理surfaceが同じ検索session状態機械と表示意味論を消費する実体部品。
  similarity_search_session_candidate:
    id: SC-SIMILARITY-SESSION-002
    name: 類似画像検索セッション(設定↔進捗置換 + 探す↔停止CTA + lifecycle cancel)
    part_kind: shared-component-sub-bom
    lifecycle: realized
    realized_by: "src/ViewPrism2.App/ViewModels/SimilaritySearchSession.cs + ImageTabView.axaml/WorkTabView.axaml"
    introduced_by: ECO-066
    consumed_by: [E-UI-SIMILARITY-035, E-UI-WORKSPACE-043]
    states: [idle, preparing, comparing, cancelling, completed]
    visual_contract: "固定150px設定領域をphase/count/barへ置換し、同位置CTAを探す→停止→停止中へ切替。cancelは0件/失敗表示にしない"
    lifecycle_contract: "明示停止、整理終了、target/scope/mode/new search/window終了でcancel+generation無効化。first cancel=grid、re-search cancel=直前completed保持"
    result_contract: "ECO-067/GF-067-04: 設定と結果はmin(pHash大局score,連続detail score)のN%単一軸。結果badgeはN%だけで内部関係を併記せず、70%検索には70%以上だけを表示。exactのみ100"
    control_plan_refs: [CP-SIMSESSION-029, CP-DUPQUALITY-030, CP-UI-G1, CP-UI-G9]

  source_cad_refs:
    # ECO-032(a) 2026-07-03: テンプレート起こし時のプレースホルダ残置を実出所で補正。
    # 出所根拠: bomdd/ui/ui-ir.json meta.sources(M1/M2)+bomdd/ui/design-intent.md(M1/M2/M3 の DESIGN DIRECTION が本 BOM の基盤)。
    # M1=タグタブ3ペイン主画面。同系: M2=タグ作成ダイアログ / M3=配置タグ設定(いずれも ViewPrismUI:資料/タグタブ/)。
    # 注: ui-ir.json meta.sources の指す work/tag-tab/ は本リポの gitignore 対象(追跡外の作業コピー)につき、
    # 本欄は CAD 権威リポ(ViewPrismUI)の正本を repo: 記法で参照する(ref-v0.4 受理形3・workspace lint で解決)。
    ui_mock_ref: "ViewPrismUI:資料/タグタブ/ViewPrism2 タグ管理.dc.html"
    ui_ir_ref: bomdd/ui/ui-ir.json
    ui_bom_ref: bomdd/ui/ui-bom.json
    ui_trace_map_ref: bomdd/ui/ui-trace-map.json
    design_intent_ref: bomdd/ui/design-intent.md

  shared_surface_components:
    - id: SC-CARD-001
      name: Card
      purpose: <枠・余白・見出し・補助文を持つ UI のまとまり>
      design_language_role: container
      required_variants: [panel-card, row-card, dialog-card]
      required_states: [default, hover, selected, disabled]
      kbom_refs: [K-DESIGN-TOKENS-001]
      control_plan_refs: [CP-DESIGN-CARD-001]
      ui_bom_consumers: []
      lifecycle: candidate

    - id: SC-CTA-BUTTON-001
      name: CTAButton
      purpose: <主要操作を視覚的に強調するボタン>
      design_language_role: action
      required_variants: [primary, secondary, danger]
      required_states: [default, hover, pressed, disabled, loading]
      kbom_refs: [K-DESIGN-TOKENS-001]
      control_plan_refs: [CP-DESIGN-CTA-001]
      ui_bom_consumers: []
      lifecycle: candidate

    - id: SC-TYPE-CHIP-001
      name: TypeChip
      purpose: <型・カテゴリ・条件種別を色とラベルで示すチップ>
      design_language_role: semantic-marker
      required_variants: [green, amber, mono, danger, info]
      required_states: [default, selected, muted]
      kbom_refs: [K-DESIGN-CHIP-SEMANTICS-001]
      control_plan_refs: [CP-DESIGN-TYPE-CHIP-001]
      ui_bom_consumers: []
      lifecycle: candidate

    - id: SC-CONDITION-CHIP-001
      name: ConditionChip
      purpose: <条件式・フィルタ・階層条件を視覚的に表すチップ>
      design_language_role: semantic-condition
      required_variants: [value-match, range, regex, unset]
      required_states: [default, editing, invalid]
      kbom_refs: [K-DESIGN-CHIP-SEMANTICS-001]
      control_plan_refs: [CP-DESIGN-CONDITION-CHIP-001]
      ui_bom_consumers: []
      lifecycle: candidate

    - id: SC-VALUE-CHIP-001
      name: CandidateValueChip
      purpose: <候補値や選択肢をインラインに表示するチップ>
      design_language_role: data-token
      required_variants: [candidate-value, range-value]
      required_states: [default, selected, overflow]
      kbom_refs: [K-DESIGN-CHIP-SEMANTICS-001]
      control_plan_refs: [CP-DESIGN-VALUE-CHIP-001]
      ui_bom_consumers: []
      lifecycle: candidate

    - id: SC-BADGE-001
      name: Badge
      purpose: <件数・状態・凡例を短いラベルで示す>
      design_language_role: metadata
      required_variants: [count, status, legend, home]
      required_states: [default, muted, emphasized]
      kbom_refs: [K-DESIGN-TOKENS-001]
      control_plan_refs: [CP-DESIGN-BADGE-001]
      ui_bom_consumers: []
      lifecycle: candidate

    - id: SC-ICON-BUTTON-001
      name: IconButton
      purpose: <編集・設定・削除などを文字グリフではなくアイコンボタンとして提供する>
      design_language_role: secondary-action
      required_variants: [edit, settings, delete, drag, home]
      required_states: [default, hover, pressed, disabled]
      kbom_refs: [K-DESIGN-ICONS-001]
      control_plan_refs: [CP-DESIGN-ICON-BUTTON-001]
      ui_bom_consumers: []
      lifecycle: candidate

    - id: SC-SECTION-HEADER-001
      name: SectionHeader
      purpose: <節見出し・件数・凡例・ヘルプを一体で持つ領域ヘッダー>
      design_language_role: navigation-and-context
      required_variants: [plain, with-count, with-help, with-legend]
      required_states: [default]
      kbom_refs: [K-DESIGN-TOKENS-001]
      control_plan_refs: [CP-DESIGN-SECTION-HEADER-001]
      ui_bom_consumers: []
      lifecycle: candidate

    - id: SC-HELP-BOX-001
      name: HelpBox
      purpose: <操作ヒント・ドラッグヒント・空状態説明を表示する>
      design_language_role: guidance
      required_variants: [hint, empty-state, warning]
      required_states: [default, dismissed]
      kbom_refs: [K-DESIGN-TOKENS-001]
      control_plan_refs: [CP-DESIGN-HELP-BOX-001]
      ui_bom_consumers: []
      lifecycle: candidate

    - id: SC-DRAG-HANDLE-001
      name: DragHandle
      purpose: <ドラッグ可能性を示し、操作 affordance を与える>
      design_language_role: affordance
      required_variants: [handle, reorder, drop-target]
      required_states: [default, dragging, drop-allowed, drop-denied]
      kbom_refs: [K-DESIGN-INTERACTION-001]
      control_plan_refs: [CP-DESIGN-DRAG-HANDLE-001]
      ui_bom_consumers: []
      lifecycle: candidate

  kbom_design_knowledge:
    - id: K-DESIGN-TOKENS-001
      name: Design Tokens
      knowledge_kind: design-system
      version: <commit/tag/version>
      source: <mock / Figma / token file / design note>
      managed_knowledge:
        - <spacing scale>
        - <radius scale>
        - <color roles for surface, border, muted, primary, danger>
        - <typography scale>
      risk_if_implicit: <工場が素の Border/DockPanel や任意配色で実装し、CAD のカード/CTA/チップ言語が消える>

    - id: K-DESIGN-CHIP-SEMANTICS-001
      name: Chip Semantics
      knowledge_kind: design-system
      version: <commit/tag/version>
      source: <mock / Figma / design note>
      managed_knowledge:
        - <green chip = value-match / positive category>
        - <amber chip = range / attention category>
        - <mono chip = regex / technical condition>
      risk_if_implicit: <条件が muted text になり、型・意味・優先度が視覚から失われる>

    - id: K-DESIGN-ICONS-001
      name: Icon Set and Actions
      knowledge_kind: design-system
      version: <commit/tag/version>
      source: <icon library / design note>
      managed_knowledge:
        - <edit/settings/delete/home/drag のアイコンとラベル>
        - <グリフ文字だけで代替しない>
      risk_if_implicit: <実機が ✎/⚙/✕ などの文字だけになり、CAD の操作言語と乖離する>

    - id: K-DESIGN-INTERACTION-001
      name: Interaction Affordances
      knowledge_kind: design-system
      version: <commit/tag/version>
      source: <mock / design note>
      managed_knowledge:
        - <ドラッグ可能なものには DragHandle または drop hint を表示>
        - <配置可能 CTA は primary visual treatment>
      risk_if_implicit: <操作可能性が見えず、Tree/Palette が素の panel と text に退化する>

  coverage_matrix:
    - ui_bom_item_no: TMP-UI-CMP-0001
      ui_name: <例 パレット候補行>
      required_design_parts:
        - SC-CARD-001
        - SC-TYPE-CHIP-001
        - SC-VALUE-CHIP-001
        - SC-CTA-BUTTON-001
      implemented_design_parts: []
      coverage_status: missing          # covered | partial | missing | out-of-scope
      gap_if_missing: <候補値/範囲/CTA が消え、素テキスト行になる>
      owner: <E-BOM owner>

  gates:
    - id: G-DS-001
      name: Design system coverage gate
      rule: <UI-BOM の surface item は required_design_parts が covered または理由付き out-of-scope でなければ製造へ進めない>
      evidence: 35-design-system-bom.yaml coverage_matrix
    - id: G-DS-002
      name: Golden-in-the-loop visual gate
      rule: <実機スクリーンショットを CAD(M1/M2/M3 等)と反復突合し、S1 はゼロ、S2 は covered/out-of-scope 裁定済みにする>
      evidence: 43-visual-gap-analysis.md
