bomdd:
  product: ViewPrism2
  experiment: "loop-v2-viewer(v2.0 — M-VIEWERCORE-017/M-UI-018/M-UI-019 追加・M-SET-010 拡張・procurement exact ピン化(SB-F-01)。v1 単位の意味論は不変)"
  layer: M-BOM

# 受入3条件(method-v1 §3): 完全性 / 無矛盾性 / Control Plan 列
# FMEA は要求台帳の counterexamples を種に作成し、受入(CP)を狙い撃つ

mbom:
  manufacturing_units:
    - id: M-SLN-000
      ebom_refs: [E-DOMAIN-001]
      artifact:
        path: ViewPrism2.sln / Directory.Build.props / .editorconfig
        type: dotnet-solution
      interface_contract:
        structure: "src/ViewPrism2.Core, src/ViewPrism2.Infrastructure, src/ViewPrism2.App, tests/ViewPrism2.Tests(ADR-0002)"
        tfm: net10.0(App のみ net10.0 + UseWPF/UseWindowsForms なし、Avalonia)
        nullable: enable(全プロジェクト)
        warnings: TreatWarningsAsErrors=true
        di: Microsoft.Extensions.DependencyInjection で App 起動時に合成
      invariants:
        - 依存方向 App → Infrastructure → Core のみ(逆参照・飛び越し禁止)
      acceptance_refs: [CP-L1-SMOKE]
      fmea_refs: []

    - id: M-CORE-001
      ebom_refs: [E-DOMAIN-001, E-HASH-006]
      artifact:
        path: src/ViewPrism2.Core(Models/, Common/)
        type: dotnet-classlib
      interface_contract:
        entities: "ImageRecord, Tag, TagType(enum Simple/Textual/Numeric), TextualTagSettings, NumericTagSettings, ImageTag, SyncFolder, View, ViewCondition, ConditionOperator(enum Exists/Equals/Between/Regexp/In), HierarchyNode, NodeGraph 型(GraphNode, NodeKind), ImageStatus(enum Normal/Missing/Deleted/Pending), ScanSummary, AppSettings"
        ids: "static IdGenerator.NewId() → Guid.NewGuid().ToString(\"D\")(小文字 36 字)"
        clock: "IClock 抽象(UtcNowIso(): string、形式 yyyy-MM-ddTHH:mm:ss.fffZ)— テストで差し替え可能に"
        hash: "FileHasher.ComputeSha256(Stream) → 小文字 hex 64 字"
        path: "PathNormalizer.ToRelative(root, fullPath) → 正規形 / PathNormalizer.Equals(a,b) → case-insensitive"
        format: "ByteSizeFormatter.Format(long) → \"1023 B\" / \"1.0 KB\"(1024 進・小数 1 桁・GB 上限)"
        errors: "Result<T> + ErrorCode(enum: DuplicateTagName, DuplicateFolderPath, ValidationError, NotFound, CircularReference, ScanInProgress, IoError, InvalidRegex)"
      invariants:
        - INV-001 / INV-002 / INV-005 / INV-007(エンティティ生成時に強制)
        - 日時文字列は IClock 経由でのみ生成(DateTime.Now 直呼び禁止)
      acceptance_refs: [CP-UTIL-005]
      fmea_refs: [FMEA-010]

    - id: M-EVAL-002
      ebom_refs: [E-EVAL-002]
      artifact:
        path: src/ViewPrism2.Core/Services/ConditionEvaluator.cs
        type: dotnet-classlib
      interface_contract:
        signature: "IReadOnlySet<string> Evaluate(IEnumerable<ImageWithTags> images, IReadOnlyList<ViewCondition> conditions)  // OC-1"
        semantics: "仕様 §2.3 演算子表+エッジケース規則の完全実装。status=Normal 以外は入力前に除外済みでも再度除外(防御)"
        warnings: "無視した条件・不正 regex は IReadOnlyList<EvalWarning> として併せて返す(UI 通知用)"
      invariants:
        - INV-007 数値比較は double.TryParse(InvariantCulture)
        - 例外を外へ漏らさない
      acceptance_refs: [CP-EVAL-001, CP-NFR-001]
      fmea_refs: [FMEA-001, FMEA-006]

    - id: M-GRAPH-003
      ebom_refs: [E-GRAPH-003]
      artifact:
        path: src/ViewPrism2.Core/Services/NodeGraphBuilder.cs(+PathConditionConverter)
        type: dotnet-classlib
      interface_contract:
        build: "GraphNode BuildGraph(IReadOnlyList<HierarchyNode> hierarchy, IReadOnlyDictionary<string,Tag> tags, ITagValueSource values)  // OC-2。values は status=Normal の distinct 値のみ返す契約"
        path2cond: "IReadOnlyList<ViewCondition> BuildConditions(IReadOnlyList<GraphNode> pathFromRoot)  // OC-3"
        home: "GraphNode? ResolveHome(GraphNode root, string? homeTagId)  // 解決不能なら null(呼び出し側がルートへ)"
      invariants:
        - INV-004 入力階層に循環があっても無限ループしない(検出して当該枝を打ち切り+警告)
        - INV-008 参照切れタグのノードはスキップ
        - INV-010 値抽出は ITagValueSource 契約により Normal のみ
      acceptance_refs: [CP-GRAPH-002]
      fmea_refs: [FMEA-008]

    - id: M-SORT-004
      ebom_refs: [E-SORT-004]
      artifact:
        path: src/ViewPrism2.Core/Services/ImageSorter.cs
        type: dotnet-classlib
      interface_contract:
        signature: "IReadOnlyList<ImageRecord> Sort(IEnumerable<ImageRecord> images, SortField field, SortDirection direction)  // OC-4"
        semantics: "name=OrdinalIgnoreCase / created_date・modified_date=序数(ISO 8601) / file_size=数値。二次キー id 昇順"
      invariants:
        - 安定: 同一入力で常に同一出力
      acceptance_refs: [CP-SORT-003]
      fmea_refs: []

    - id: M-SCAN-005
      ebom_refs: [E-SCAN-005, E-RELINK-007]
      artifact:
        path: src/ViewPrism2.Core/Services/ScanJudge.cs + src/ViewPrism2.Infrastructure/Scanning/ScanService.cs + RelinkService.cs
        type: dotnet-classlib
      interface_contract:
        judge: "ScanDecision Judge(FileFacts file, DbFacts db, bool isInitialScan)  // OC-5。純粋関数(I/O なし)。Decision = Skip | UpdateMeta | AddNormal | AddPending(candidateId)"
        scan: "Task<Result<ScanSummary>> ScanAsync(string folderId, IProgress<int>? progress, CancellationToken ct)  // 仕様 §2.1 手順 1〜6"
        relink_candidates: "Task<IReadOnlyList<RelinkCandidate>> GetCandidatesAsync(string missingImageId)  // relative_path 昇順"
        relink_commit: "Task<Result> CommitRelinkAsync(string missingImageId, string pendingImageId)  // id 不変・pending 行削除"
      invariants:
        - INV-009 ファイルへ書き込まない
        - 遷移は仕様 §2.1 遷移表のみ。スキャン二重起動は ErrorCode.ScanInProgress
        - 読み取り不能ファイルはスキップ+警告(summary.skipped へ計上)
      acceptance_refs: [CP-SCAN-004]
      fmea_refs: [FMEA-004, FMEA-011]

    - id: M-DB-007
      ebom_refs: [E-DB-010]
      artifact:
        path: src/ViewPrism2.Infrastructure/Database/(Schema.sql 相当の DDL 定数, MigrationRunner.cs, *Repository.cs)
        type: dotnet-classlib
      interface_contract:
        open: "DatabaseManager.Open(dbPath) — ディレクトリ作成→接続→PRAGMA→新規なら最新 DDL+全マイグレーション既適用マーク、既存なら未適用分を ID 昇順で適用(各々 1 トランザクション)"
        schema: "テーブル: images, tags, textual_tag_settings, numeric_tag_settings, image_tags, views, view_conditions, view_tag_hierarchies, sync_folders, migrations。列・FK・既定値は仕様 §2.0 準拠。path/relative_path は COLLATE NOCASE。sync_folders.path に UNIQUE"
        repositories: "IImageRepository, ITagRepository, IViewRepository, ISyncFolderRepository(インターフェースは Core 側)。タグ付与は INSERT INTO image_tags ... ON CONFLICT(image_id,tag_id) DO UPDATE SET value=excluded.value"
        cascade: "タグ削除→image_tags/階層ノード CASCADE・view_conditions.tag_id SET NULL・子タグ parent_id SET NULL(FK で実現、アプリ側で再実装しない)"
      invariants:
        - 接続は単一共有+SemaphoreSlim シリアル化(K-SQLITE)
        - migrations テーブル契約は REQ-004 のとおり
      acceptance_refs: [CP-DB-006]
      fmea_refs: [FMEA-003, FMEA-005]

    - id: M-THUMB-008
      ebom_refs: [E-THUMB-020]
      artifact:
        path: src/ViewPrism2.Infrastructure/Imaging/ThumbnailService.cs
        type: dotnet-classlib
      interface_contract:
        get: "Task<string?> GetOrCreateAsync(string absoluteImagePath)  // 戻り値=サムネイルファイルパス、失敗時 null(キャッシュ記録なし)"
        cache_key: "MD5(absoluteImagePath.ToLowerInvariant()) の hex + 元拡張子が .png なら .png、それ以外 .jpg"
        params: "K-SKIA の定型どおり(長辺 256・inside・拡大なし・PNG/JPEG q80)"
        resolution: "Task<(int w,int h)?> GetDimensionsAsync(path)  // SKCodec、フルデコードなし"
      invariants:
        - INV-009 元画像へ書き込まない
        - 読み取り不能キャッシュは削除して再生成
      acceptance_refs: [CP-THUMB-007]
      fmea_refs: [FMEA-012]

    - id: M-CACHE-009
      ebom_refs: [E-CACHE-011]
      artifact:
        path: src/ViewPrism2.Core/Services/ImageMemoryCache.cs
        type: dotnet-classlib
      interface_contract:
        signature: "Task<T> GetOrAddAsync<T>(string key, Func<Task<T>> loader)  // OC-6。容量 50・TTL 3 分・LRU。IClock 注入"
        metrics: "LoadCount プロパティ(受入用)"
      acceptance_refs: [CP-CACHE-008]
      fmea_refs: [FMEA-007]

    - id: M-SET-010
      ebom_refs: [E-SETTINGS-013]
      artifact:
        path: src/ViewPrism2.Infrastructure/Settings/SettingsStore.cs(+Core/Models AppSettings)
        type: dotnet-classlib
      interface_contract:
        schema: >-
          AppSettings { Locale="ja", WindowX/Y=null(OS 既定), WindowWidth=1200/Height=800/IsMaximized=false,
          DisplayMode="grid"(v1.3/CR-6), LastViewId=null, LastCollectionId=null(v1.3/CR-5),
          GridColumns=4([JsonIgnore]・v1.3/CR-1 廃止プロパティの互換温存) }
          — v2.0 追加(REQ-059): ViewerMode="normal"("normal"|"scroll"|"spread-right"|"spread-left"),
          ViewerResizeMode="noResize"("matchLargerHeight"|"matchSmallerHeight"|"noResize"),
          ViewerAlignMode="middle"("top"|"middle"|"bottom"), ViewerGapMode="tight"("tight"|"loose"),
          ViewerCustomGapPx=0(int 0〜100。範囲外・型不正の保存値は既定 0 として読む),
          ViewerPageTurnMode="doublePage"("doublePage"|"singlePage"), ViewerStartWithEmptyPage=false
        io: "Load(): 破損・欠落時は既定値(例外なし、破損時はバックアップ .bak に退避して再生成)。列挙系の不正文字列も項目単位で既定値へ / Save(): インデント付き JSON・UTF-8"
        path: "%APPDATA%/ViewPrism2/settings.json"
      acceptance_refs: [CP-SET-009]
      fmea_refs: [FMEA-009, FMEA-018]

    - id: M-I18N-011
      ebom_refs: [E-I18N-014, E-I18N-ASSETS-027]
      artifact:
        path: src/ViewPrism2.Core/Services/LocalizationService.cs + src/ViewPrism2.App/Assets/i18n/{ja,en}.json
        type: dotnet-classlib + assets
      interface_contract:
        resolve: "string T(string key, IReadOnlyDictionary<string,string>? args = null)  // OC-8。要求ロケール→ja→キー文字列"
        switch: "SetLocale(string locale) → CultureChanged イベント発火(UI が一斉再バインド)"
        assets: "K-I18N の規約・対象ネームスペースに従い原典から変換。V1 画面の新規キーは ja 正・en 併記"
      acceptance_refs: [CP-I18N-010, CP-UI-G5]
      fmea_refs: []

    - id: M-VIEWSVC-012
      ebom_refs: [E-VIEWSVC-009, E-TAGSVC-008]
      artifact:
        path: src/ViewPrism2.Core/Services/(TagService.cs, ViewService.cs)+ Infrastructure のリポジトリ呼び出し
        type: dotnet-classlib
      interface_contract:
        tags: "CRUD+Validate(color 形式・名前空白・numeric 範囲・循環)+TagImageAsync(UPSERT)+TagImagesAsync(原子バッチ)+UntagImagesAsync(冪等)+GetAllWithUsageAsync(name 昇順 OrdinalIgnoreCase+使用数)"
        views: "CRUD+条件/階層ノード CRUD+MoveNode(循環拒否)+TouchModified(本体・条件・階層の変更で modified_at 更新)+GetFavorites/GetRecent(limit=10 既定・同値 id 昇順)"
      invariants:
        - INV-003 / INV-004 / INV-006
      acceptance_refs: [CP-TAG-011, CP-VIEW-012]
      fmea_refs: [FMEA-002, FMEA-003]

    - id: M-UI-013
      ebom_refs: [E-UI-SHELL-021, E-UI-GRID-022, E-UI-DETAIL-023, E-UI-NODEGRAPH-025, E-UI-TAGS-026, E-DESIGN-028]
      artifact:
        path: src/ViewPrism2.App/(Views/, ViewModels/)
        type: avalonia-app
      interface_contract:
        shell: "v1.2(仕様 §2.6): 上部タブ『タグ』『画像』+『設定』。タグタブ=3 ペイン(ビュー管理/階層エディタ(バッチ保存)/タグパレット+作成ダイアログ)。画像タブ=左(フォルダ+ビュー+NodeGraph ツリー+全画像入口)/ツールバー(表示切替・列数・ソート・タグ編集モード)/中央グリッド・リスト/右パネル(詳細⇔タグ付与切替)"
        viewmodels: "選択(Ctrl トグル・選択順)・空状態・ノード選択→評価呼び出し・階層編集のダーティ追跡は ViewModel ロジックとして unit 検査可能に分離(OC 系を UI から呼ぶだけにする)"
        design: "K-DESIGN トークンのみ使用。文言は LocalizationService 経由のみ"
      acceptance_refs: [CP-UI-G1, CP-UI-G2, CP-UI-G3, CP-UI-G6, CP-L1-SMOKE]
      fmea_refs: [FMEA-013]

    - id: M-UI-016        # v1.2 追加(ずる裁定: タグ付与 UI)
      ebom_refs: [E-UI-TAGASSIGN-029]
      artifact:
        path: src/ViewPrism2.App/(ViewModels/TaggingPanelViewModel.cs, Views/ 内タグ付与パネル+数値値ダイアログ)
        type: avalonia-app
      interface_contract:
        panel: "TaggingPanelViewModel(selectedImages): CurrentTags(共通タグ+解除)/ AvailableTags(検索)/ ApplyAsync(原子バッチ)。選択 0 件はプレースホルダ"
        numeric: "NumericValueDialog: モード=固定値|連番(開始値+選択順 i)。min/max/step 検証をダイアログ内で実施し範囲外は適用前に拒否"
        textual: "候補値ドロップダウン(predefined_values 順)+自由入力"
      invariants:
        - 適用は TagService の原子バッチ API のみ経由(個別ループ禁止)
      acceptance_refs: [CP-TAGUI-013, CP-UI-G7]
      fmea_refs: [FMEA-014]

    - id: M-UI-014
      ebom_refs: [E-UI-VIEWER-024]
      artifact:
        path: src/ViewPrism2.App/(Views/ViewerWindow.axaml, ViewModels/ViewerViewModel.cs)
        type: avalonia-app
      interface_contract:
        nav: "ViewerViewModel(IReadOnlyList<ImageRecord> ordered, int startIndex): Next()/Prev() は端で停止、CurrentPositionText=\"n / total\"  // unit 検査対象"
        keys: "Right/PageDown=Next, Left/PageUp=Prev, Escape=Close(KeyBindings)"
        display: "ウィンドウフィット(縮小のみ)。ロードは ImageMemoryCache 経由"
      acceptance_refs: [CP-UI-G4]
      fmea_refs: [FMEA-002]

    # ---------- v2.0 追加(loop-v2-viewer) ----------
    - id: M-VIEWERCORE-017
      ebom_refs: [E-VIEWER-CALC-030]
      artifact:
        path: src/ViewPrism2.Core/Services/Viewer/(SpreadPairCalculator.cs, PageTurnCalculator.cs, ScrollPositionTracker.cs, SpreadHeightCalculator.cs, ViewerModeMemory.cs, ViewerSettingsModel.cs)
        type: dotnet-classlib
      interface_contract:
        pair: "SpreadPair SpreadPairCalculator.Calculate(int currentIndex, int totalCount, SpreadDirection direction, bool startWithEmptyPage)  // OC-9。SpreadPair { int? LeftIndex, int? RightIndex }(null=空白ページ)。仕様 §2.9 REQ-056 の規則を完全実装"
        turn: "int PageTurnCalculator.Next(int currentIndex, int totalCount, int step, bool startWithEmptyPage) / int Prev(int currentIndex, int step)  // OC-10。step は呼び出し側が SHIFT/pageTurnMode から解決(SHIFT=1 / doublePage=2 / singlePage=1)。境界規則・空白開始 0→1 規則は §2.9 REQ-057"
        track: "int ScrollPositionTracker.FindCurrent(IReadOnlyList<(double top, double height)> imageRects, double viewportHeight, double scrollOffset)  // OC-11。画像矩形中心と表示領域中心の距離最小・同距離は若い index"
        height: "double? SpreadHeightCalculator.Calculate(SKSizeI? left, SKSizeI? right, ResizeMode mode, double viewportHeight)  // OC-12。match 系のみ統一高さ(max/min・片側 null は単独高さ・viewportHeight*0.9 上限)。noResize は null(=統一なし)。SKSizeI 依存を避け独自 (int W,int H) 構造体でも可"
        memory: "ViewerModeMemory: ctor(initialIndex) で全モード初期化 / int Get(ViewerMode) / void Set(ViewerMode, int)  // OC-13"
        settings_model: "ViewerSettingsModel: AppSettings の Viewer* 7 項目との変換+列挙の文字列表現(K-I18N とは独立。enum⇔JSON 文字列)"
        purity: "全クラス純粋計算(I/O・Avalonia 型・DB 依存なし)。Core プロジェクト配置"
      invariants:
        - 仕様 §2.9 の規則のみ。端で停止(負値・総数超の index を返さない)
        - OC-9〜13 の入出力契約を公開 API とする(治具・固定オラクルが直接呼ぶ)
      acceptance_refs: [CP-VIEWER-014]
      fmea_refs: [FMEA-015, FMEA-016, FMEA-017, FMEA-020]

    - id: M-UI-018
      ebom_refs: [E-UI-VIEWER-024]
      artifact:
        path: src/ViewPrism2.App/(Views/ViewerWindow.axaml 拡張, ViewModels/ViewerViewModel.cs 拡張, Views/Viewer/ 各モードビュー)
        type: avalonia-app
      interface_contract:
        modes: "normal(既存 V1 表示を維持)/ scroll / spread-right / spread-left。モード描画の切替は ContentControl 等で行い、計算は M-VIEWERCORE-017 のみ経由"
        controlbar: "ビューア上部コントロールバー: モード切替+表示設定(resizeMode/alignMode/gapMode+customGapPx 数値入力・ページ送りモード・空白ページ開始)。細部レイアウトは K-DESIGN 範囲で製造判断(golden G-8 で承認)"
        scroll: >-
          **仮想化必須(V2 Run2 改訂 — ItemsControl 直置き禁止。K-AVALONIA v2.0/Run2 参照)**: VirtualizingStackPanel を
          備えた ListBox(行リスト・選択視覚なし)または ItemsRepeater を ScrollViewer 相当に載せ、画面外アイテムを
          実体化しない。各 ViewerImage は可視(実体化中)の間のみ SourcePath を持ち、非可視化/リサイクルで SourcePath=null
          にして Bitmap を Dispose(描画から外した後)・進行中ロードをキャンセルする。これによりメモリは画面内+先読みに
          比例し総枚数に比例しない(REQ-055「全件一括読み込みしない」の充足 — V2 Run1 で未達)。
          停止検出後に ScrollPositionTracker(OC-11)で現在位置更新。キーは Right/PageDown=次・Left/PageUp=前(対象画像へスクロール)。
          読み込みウィンドウ・先読み枚数の具体定数は実装定数(固定オラクル合否対象外)だが、「全件一括でない=総枚数非比例メモリ」は
          REQ-055 の要求であり Run2 収束の合格条件(P-05 再測定で確認)。
        spread: "2 列 Grid(1fr/1fr)。クリックは各半面全体(余白含む)。キーは §2.9 規則(spread-right は矢印反転・Page キーは論理)。画像 2 枚は並行ロード+次ペア 2 枚を先読み(実装定数)"
        keys: "KeyBindings は ViewerViewModel の ICommand へ。モード別の解釈は ViewModel 内で M-VIEWERCORE-017 を呼ぶ(コードビハインドでの判定禁止)"
        persistence: "設定変更は即時 SettingsStore.Save。起動時に AppSettings の Viewer* から復元(REQ-059)"
        errors: "個別画像のロード失敗は当該位置にエラー表示(ファイル名+失敗の旨)し、閲覧継続(仕様 §2.9)"
        excluded: "実装しない(事前ずる列挙で慣習混入が予想される次元の明示): 仕様列挙外のキー(Home/End・数字キーのモード切替・ホイールでのページ送り — normal/spread のホイールは何もしない)/ 横長画像の自動単独配置 / Ctrl+ホイールズーム / クロスフェード等のアニメーション。必要と判断した場合はずる報告"
        resize_anchor: "ウィンドウリサイズ時: 見開き=同一ペアを保ったまま再レイアウト(仕様 §4)/ scroll=現在位置の画像を維持(画像単位アンカー)"
        memory: "scroll の Bitmap 保持は読み込みウィンドウ範囲のみ(範囲外は K-AVALONIA の手順で破棄)。normal/spread は ImageMemoryCache(REQ-045)の範囲"
      invariants:
        - 余白クリック閉じるは normal のみ(scroll=無操作 / spread=半面送り)
        - 全件一括読み込み禁止(REQ-055)
        - Esc/閉じるボタン/現在位置表示/端停止は全モード共通(REQ-044 継承)
      acceptance_refs: [CP-UI-G4, CP-UI-G8, CP-L1-SMOKE]
      fmea_refs: [FMEA-015, FMEA-016, FMEA-020]

    - id: M-UI-019
      ebom_refs: [E-UI-GRID-022, E-UI-NODEGRAPH-025, E-UI-TAGS-026]
      artifact:
        path: src/ViewPrism2.App/(Views/ 該当 axaml 改修)+ src/ViewPrism2.Core/Services/ConditionSummaryFormatter.cs
        type: avalonia-app + dotnet-classlib
      interface_contract:
        gf01: "TagEditorWindow: 高さ固定(SizeToContent=Manual 相当)。候補値リストは内部 ScrollViewer のみ伸縮"
        gf02: "グリッドの行コンテナから行選択視覚を除去(セル強調枠+選択順バッジのみ)。リスト表示の行選択視覚は変更しない"
        gf03: "ホームタグのトグル/強調アイコンを家アイコンへ変更(K-DESIGN のアイコン規定)"
        gf04: "タグパレット選択行に明確な選択視覚(K-DESIGN)。階層エディタの追加ボタン文言: i18n キーで『「{tagName}」をルートに追加 / 子に追加』。パレット未選択時は非活性+選択を促す文言"
        gf05: "ConditionSummaryFormatter.Format(conditionType, conditionValueJson, ILocalizationService) → 表示文字列  // 仕様 §2.6 の条件型別 i18n テンプレート(equals/range(片側含む)/pattern/values)。格納 JSON は不変。unit 検査対象(CP-GF-015)"
      invariants:
        - 機能の意味論は不変(視覚・表示整形のみ。既存 unit 234 件と凍結オラクルの回帰ゼロが前提)
      acceptance_refs: [CP-GF-015, CP-UI-G1, CP-UI-G6]
      fmea_refs: [FMEA-019]

    - id: M-HARNESS-015        # 治具は製品と同格に管理
      ebom_refs: []
      artifact:
        path: tests/ViewPrism2.Tests
        type: dotnet-test(xunit.v3)
      verifies: [M-CORE-001, M-EVAL-002, M-GRAPH-003, M-SORT-004, M-SCAN-005, M-DB-007, M-THUMB-008, M-CACHE-009, M-SET-010, M-I18N-011, M-VIEWSVC-012, M-UI-014, M-VIEWERCORE-017, M-UI-019]
      interface_contract:
        traits: "各テストに [Trait(\"cp\", \"CP-xxx\")] を付与し Control Plan へトレース"
        fixtures: "tests/fixtures/ に画像フィクスチャ(各形式の最小画像・壊れたファイル)と DB フィクスチャビルダー"
        l2: "スキーマ同値(新規 DB vs マイグレーション適用 DB)・サムネイル出力メタデータ検査を含む"

