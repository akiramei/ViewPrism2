  - { id: FMEA-002, unit: M-UI-014,    failure_mode: "一覧端でのループ・例外(空一覧含む)",                        effect: "ビューア位置喪失/クラッシュ",          targeted_by: CP-UI-G4 }
  - { id: FMEA-003, unit: M-DB-007,    failure_mode: "タグ削除カスケード漏れ(孤児 image_tags・幽霊ノード)",        effect: "NodeGraph 構築例外・件数水増し",        targeted_by: CP-DB-006 }
  - { id: FMEA-004, unit: M-SCAN-005,  failure_mode: "リネームを新規+missing と誤判定",                            effect: "タグ関連の喪失",                        targeted_by: CP-SCAN-004 }
  - { id: FMEA-005, unit: M-DB-007,    failure_mode: "FK 無効の接続が混入",                                         effect: "カスケード不発・整合性破壊",            targeted_by: CP-DB-006 }
  - { id: FMEA-006, unit: M-EVAL-002,  failure_mode: "不正 regex・ReDoS パターンで例外/フリーズ",                   effect: "ビュー表示不能",                        targeted_by: CP-EVAL-001 }
  - { id: FMEA-007, unit: M-CACHE-009, failure_mode: "キャッシュ無制限増殖",                                        effect: "メモリ枯渇クラッシュ",                  targeted_by: CP-CACHE-008 }
  - { id: FMEA-008, unit: M-GRAPH-003, failure_mode: "循環階層・参照切れタグで無限ループ/例外",                     effect: "ビューが開けない",                      targeted_by: CP-GRAPH-002 }
  - { id: FMEA-009, unit: M-SET-010,   failure_mode: "破損 settings.json で起動不能",                               effect: "アプリ使用不能",                        targeted_by: CP-SET-009 }
  - { id: FMEA-010, unit: M-CORE-001,  failure_mode: "ID 大文字混入・日時形式揺れ(ローカル時刻/桁数)",             effect: "同一判定・時系列ソート破壊",            targeted_by: CP-UTIL-005 }
  - { id: FMEA-011, unit: M-SCAN-005,  failure_mode: "ロックファイル・ジャンクションでスキャン全体停止/無限再帰",   effect: "スキャン不能",                          targeted_by: CP-SCAN-004 }
  - { id: FMEA-012, unit: M-THUMB-008, failure_mode: "壊れた画像で例外伝播/小画像の拡大",                            effect: "一覧表示停止・画質劣化",                targeted_by: CP-THUMB-007 }
