# 沈黙次元の第2回掃討(第1回 deferred-to-phase3 を全て解消。deferred は使用不可)
silence_sweep:
  - { dimension: エラー語彙,                     decision: specified,  where: M-CORE-001 interface_contract.errors, note: "Result<T>+ErrorCode 8 種で全列挙。UI 表示文言は i18n キー error.<code>" }
  - { dimension: 並行実行(スキャン中の UI 操作), decision: specified,  where: M-SCAN-005 / M-DB-007,               note: "スキャンは同時 1 フォルダ(ScanInProgress)。UI 操作は許可され、DB アクセスは単一接続シリアル化で整合" }
  - { dimension: DB 同時アクセス(プロセス内),    decision: specified,  where: M-DB-007,                            note: "単一共有接続+SemaphoreSlim(G2' AUDIT-103 解消)" }
  - { dimension: ログ・診断,                     decision: specified,  where: procurement(Serilog),               note: "%APPDATA%/ViewPrism2/logs/app-.log 日次ローリング 7 世代。レベル: Information 以上、警告系(スキップ・無視条件)は Warning" }
  - { dimension: NodeGraph 構造変化時の選択状態,  decision: specified,  where: M-UI-013,                            note: "再構築後に旧選択ノード id が解決できなければルート選択へ(REQ-037 と同じフォールバック)— G2' AUDIT-101 解消" }
  - { dimension: リスト列幅の配分,                decision: specified,  where: M-UI-013,                            note: "width は star 値(name=2*、他=1*)。削除済みタグ列はスキップし残り列の star で全幅按分 — G2' AUDIT-102 解消" }
