bomdd:
  product: ViewPrism2
  experiment: "loop-v4-repair-lifecycle(v4.0 — M-CRITERIA-024/M-RELINK-025/M-TRASH-026/M-UI-REPAIR-027 追加・FMEA-026〜030・V4 掃討。**スキーマ変更なし**=既存列+既存 FK CASCADE で完結・procurement 新規なし。v1/v2/v3 単位の意味論は不変)。前: loop-v3-similarity(M-PHASH-020〜M-UI-SIMILARITY-023)"
  layer: M-BOM

# 受入3条件(method-v1 §3): 完全性 / 無矛盾性 / Control Plan 列
# FMEA は要求台帳の counterexamples を種に作成し、受入(CP)を狙い撃つ

mbom:
  manufacturing_units:
    - id: M-SLN-000
      ebom_refs: [E-DOMAIN-001]
      artifact:
        path: ViewPrism2.sln
        path_note: "+ Directory.Build.props / .editorconfig"
        type: dotnet-solution
      interface_contract:
        structure: "src/ViewPrism2.Core, src/ViewPrism2.Infrastructure, src/ViewPrism2.App, tests/ViewPrism2.Tests(ADR-0002)"
        tfm: net10.0(App のみ net10.0 + UseWPF/UseWindowsForms なし、Avalonia)
        nullable: enable(全プロジェクト)
        warnings: TreatWarningsAsErrors=true
        di: Microsoft.Extensions.DependencyInjection で App 起動時に合成
      invariants:
        - 依存方向 App → Infrastructure → Core のみ(逆参照・飛び越し禁止)
      acceptance_refs: [CP-L1-SMOKE]
      fmea_refs: []

    - id: M-CORE-001
      ebom_refs: [E-DOMAIN-001, E-HASH-006]
      artifact:
        path: src/ViewPrism2.Core
        path_note: "Models/, Common/"
        type: dotnet-classlib
      interface_contract:
        entities: "ImageRecord, Tag, TagType(enum Simple/Textual/Numeric), TextualTagSettings, NumericTagSettings, ImageTag, SyncFolder, View, ViewCondition, ConditionOperator(enum Exists/Equals/Between/Regexp/In), HierarchyNode, NodeGraph 型(GraphNode, NodeKind), ImageStatus(enum Normal/Missing/Deleted/Pending), ScanSummary, AppSettings"
        ids: "static IdGenerator.NewId() → Guid.NewGuid().ToString(\"D\")(小文字 36 字)"
        clock: "IClock 抽象(UtcNowIso(): string、形式 yyyy-MM-ddTHH:mm:ss.fffZ)— テストで差し替え可能に"
        hash: "FileHasher.ComputeSha256(Stream) → 小文字 hex 64 字"
        path: "PathNormalizer.ToRelative(root, fullPath) → 正規形 / PathNormalizer.Equals(a,b) → case-insensitive"
        format: "ByteSizeFormatter.Format(long) → \"1023 B\" / \"1.0 KB\"(1024 進・小数 1 桁・GB 上限)"
        errors: "Result<T> + ErrorCode(enum: DuplicateTagName, DuplicateFolderPath, ValidationError, NotFound, CircularReference, ScanInProgress, IoError, InvalidRegex)"
      invariants:
        - INV-001 / INV-002 / INV-005 / INV-007(エンティティ生成時に強制)
        - 日時文字列は IClock 経由でのみ生成(DateTime.Now 直呼び禁止)
      acceptance_refs: [CP-UTIL-005]
      fmea_refs: [FMEA-010]

    - id: M-EVAL-002
      ebom_refs: [E-EVAL-002]
      artifact:
        path: src/ViewPrism2.Core/Services/ConditionEvaluator.cs
        type: dotnet-classlib
      interface_contract:
        signature: "IReadOnlySet<string> Evaluate(IEnumerable<ImageWithTags> images, IReadOnlyList<ViewCondition> conditions)  // OC-1"
        semantics: "仕様 §2.3 演算子表+エッジケース規則の完全実装。status=Normal 以外は入力前に除外済みでも再度除外(防御)"
        warnings: "無視した条件・不正 regex は IReadOnlyList<EvalWarning> として併せて返す(UI 通知用)"
      invariants:
        - INV-007 数値比較は double.TryParse(InvariantCulture)
        - 例外を外へ漏らさない
      acceptance_refs: [CP-EVAL-001, CP-NFR-001]
      fmea_refs: [FMEA-001, FMEA-006]

    - id: M-GRAPH-003
      ebom_refs: [E-GRAPH-003]
      artifact:
        path: src/ViewPrism2.Core/Services/NodeGraphBuilder.cs
        path_note: "+ PathConditionConverter"
        type: dotnet-classlib
      interface_contract:
        build: "GraphNode BuildGraph(IReadOnlyList<HierarchyNode> hierarchy, IReadOnlyDictionary<string,Tag> tags, ITagValueSource values)  // OC-2。values は status=Normal の distinct 値のみ返す契約"
        path2cond: "IReadOnlyList<ViewCondition> BuildConditions(IReadOnlyList<GraphNode> pathFromRoot)  // OC-3"
        home: "GraphNode? ResolveHome(root, homeTagId)=既存単一node API + IReadOnlyList<GraphNode> ResolveHomePath(root, homeTagId)=ECO-063画像タブ初期ナビ用root除外path。解決不能/nullは空列(root fallback)、複製nodeは既存と同じDFS先頭"
      invariants:
        - INV-004 入力階層に循環があっても無限ループしない(検出して当該枝を打ち切り+警告)
        - INV-008 参照切れタグのノードはスキップ
        - INV-010 値抽出は ITagValueSource 契約により Normal のみ
      acceptance_refs: [CP-GRAPH-002]
      fmea_refs: [FMEA-008]

    - id: M-SORT-004
      ebom_refs: [E-SORT-004]
      artifact:
        path: src/ViewPrism2.Core/Services/ImageSorter.cs
        type: dotnet-classlib
      interface_contract:
        signature: "IReadOnlyList<ImageRecord> Sort(IEnumerable<ImageRecord> images, SortField field, SortDirection direction)  // OC-4"
        semantics: "name=OrdinalIgnoreCase / created_date・modified_date=序数(ISO 8601) / file_size=数値。二次キー id 昇順"
      invariants:
        - 安定: 同一入力で常に同一出力
      acceptance_refs: [CP-SORT-003]
      fmea_refs: []

    - id: M-SCAN-005
      ebom_refs: [E-SCAN-005, E-RELINK-007]
      artifact:
        path: src/ViewPrism2.Core/Services/ScanJudge.cs
        path_note: "+ src/ViewPrism2.Infrastructure/Scanning/ScanService.cs + RelinkService.cs"
        type: dotnet-classlib
      interface_contract:
        judge: "ScanDecision Judge(FileFacts file, DbFacts db, bool isInitialScan)  // OC-5。純粋関数(I/O なし)。Decision = Skip | UpdateMeta | AddNormal | AddPending(candidateId)"
        scan: "Task<Result<ScanSummary>> ScanAsync(string folderId, IProgress<int>? progress, CancellationToken ct, IProgress<ScanBatchCommitted>? committed=null)  // 仕様 §2.1 手順 1〜6+ECO-060 commit後公開"
        scan_batch: "IImageRepository.ApplyScanBatchAsync(ScanMutationBatch batch)  // ECO-059: bounded件数のadd/update-meta/update-status/deleteを単一transactionで適用。ScanServiceはバッチ上限到達ごとにflush"
        relink_candidates: "Task<IReadOnlyList<RelinkCandidate>> GetCandidatesAsync(string missingImageId)  // relative_path 昇順"
        relink_commit: "Task<Result> CommitRelinkAsync(string missingImageId, string pendingImageId)  // id 不変・pending 行削除"
      invariants:
        - INV-009 ファイルへ書き込まない
        - 遷移は仕様 §2.1 遷移表のみ。スキャン二重起動は ErrorCode.ScanInProgress
        - 読み取り不能ファイルはスキップ+警告(summary.skipped へ計上)
        - (ECO-059/FMEA-039) ファイル読取はHDDのランダムseekを増やさない直列+SequentialScan。列挙時のサイズ/日時を保持してFileInfo再照会を行わず、DB変更だけを有界バッチ化し、進捗通知は同じ整数百分率を重複送信しない
        - (ECO-059/GF-059-01) ScanCoreAsyncはTask.Run境界で呼出元UI threadから明示分離する。ConfigureAwait(false)だけに依存しない(同期完了awaitはthreadを切り替えないため)
        - (ECO-060/REQ-086) 初回列挙はstreaming。ApplyScanBatchAsync成功後だけnormal追加行をScanBatchCommittedで通知し、batch内/全体の取込順を保持する
      acceptance_refs: [CP-SCAN-004]
      fmea_refs: [FMEA-004, FMEA-011, FMEA-039]

    - id: M-DB-007
      ebom_refs: [E-DB-010]
      artifact:
        path: src/ViewPrism2.Infrastructure/Database
        path_note: "Schema.sql 相当の DDL 定数, MigrationRunner.cs, *Repository.cs"
        type: dotnet-classlib
      interface_contract:
        open: "DatabaseManager.Open(dbPath) — ディレクトリ作成→接続→PRAGMA→新規なら最新 DDL+全マイグレーション既適用マーク、既存なら未適用分を ID 昇順で適用(各々 1 トランザクション)"
        schema: "テーブル: images, tags, textual_tag_settings, numeric_tag_settings, image_tags, views, view_conditions, view_tag_hierarchies, sync_folders, migrations。列・FK・既定値は仕様 §2.0 準拠。path/relative_path は COLLATE NOCASE。sync_folders.path に UNIQUE"
        repositories: "IImageRepository, ITagRepository, IViewRepository, ISyncFolderRepository(インターフェースは Core 側)。タグ付与は INSERT INTO image_tags ... ON CONFLICT(image_id,tag_id) DO UPDATE SET value=excluded.value。ECO-064 startup read model=IImageRepository.GetNormalCountsByFolderAsync(集約のみ)/GetNormalByFolderAsync/CountByFolderAndStatusAsync + ITagRepository.GetImageTagsByFolderAsync(選択collection JOIN・normalのみ)、全件APIは後方互換consumer向けに維持するがstartupから呼ばない"
        scan_batch: "ImageRepository.ApplyScanBatchAsync — add/update-meta/update-status/deleteを単一明示transactionで原子適用(ECO-059)。通常の単行repository APIは非スキャンconsumer向けに維持"
        cascade: "タグ削除→image_tags/階層ノード CASCADE・view_conditions.tag_id SET NULL・子タグ parent_id SET NULL(FK で実現、アプリ側で再実装しない)"
      invariants:
        - 接続は単一共有+SemaphoreSlim シリアル化(K-SQLITE)
        - migrations テーブル契約は REQ-004 のとおり
        - (ECO-059) スキャンバッチの失敗は当該バッチを全ロールバックし、部分適用を残さない
      acceptance_refs: [CP-DB-006]
      fmea_refs: [FMEA-003, FMEA-005]

    - id: M-THUMB-008
      ebom_refs: [E-THUMB-020]
      artifact:
        path: src/ViewPrism2.Infrastructure/Imaging/ThumbnailService.cs
        path_note: "+ ExifOrientationTransform.cs / OrientedImageLoader.cs(ECO-049 — EXIF 正立の変換核とビューア向け正立ローダ)"
        type: dotnet-classlib
      interface_contract:
        get: "Task<string?> GetOrCreateAsync(string absoluteImagePath)  // 戻り値=サムネイルファイルパス、失敗時 null(キャッシュ記録なし)。(ECO-049)EXIF Orientation を適用し正立で生成(正立化は縮小後の小画像=一様スケールと D4 は可換)"
        cache_key: "MD5(absoluteImagePath.ToLowerInvariant()) の hex + '-v2'(ECO-049 生成規則世代サフィックス — 旧 {md5}.{ext} は参照しない孤児)+ 元拡張子が .png なら .png、それ以外 .jpg"
        params: "K-SKIA の定型どおり(長辺 256・inside・拡大なし・PNG/JPEG q80)"
        resolution: "Task<(int w,int h)?> GetDimensionsAsync(path)  // SKCodec、フルデコードなし。(ECO-049/REQ-085)Orientation 5〜8 は W/H 入替の実効寸法"
        exif: "(ECO-049)ExifOrientationTransform: ToUprightBgra(bgra,w,h,origin)→(bgra,w,h)= D4 添字置換の正(S-41)・ToUpright(SKBitmap)は同表へ委譲・ToEffectiveDimensions。OrientedImageLoader.LoadOrientedOrNull(path)= TopLeft/判定不能は null(従来直読の高速経路)・正立時のみ BGRA8888(Premul)ピクセル列(App は SkiaSharp 型に触れない — ADR-0002)"
      invariants:
        - INV-009 元画像へ書き込まない
        - 読み取り不能キャッシュは削除して再生成
        - since ECO-049(REQ-085) EXIF 適用は表示系のみ — pHash 入力(M-SIMSEARCH-021 系)には適用しない(P-09 世代を発動させない)
      acceptance_refs: [CP-THUMB-007]
      fmea_refs: [FMEA-012]

    - id: M-CACHE-009
      ebom_refs: [E-CACHE-011]
      artifact:
        path: src/ViewPrism2.Core/Services/ImageMemoryCache.cs
        type: dotnet-classlib
      interface_contract:
        signature: "Task<T> GetOrAddAsync<T>(string key, Func<Task<T>> loader)  // OC-6。容量 50・TTL 3 分・LRU。IClock 注入"
        metrics: "LoadCount プロパティ(受入用)"
      acceptance_refs: [CP-CACHE-008]
      fmea_refs: [FMEA-007]

    - id: M-SET-010
      ebom_refs: [E-SETTINGS-013]
      artifact:
        path: src/ViewPrism2.Infrastructure/Settings/SettingsStore.cs
        path_note: "+ Core/Models AppSettings"
        type: dotnet-classlib
      interface_contract:
        schema: >-
          AppSettings { Locale="ja", WindowX/Y=null(OS 既定), WindowWidth=1200/Height=800/IsMaximized=false,
          DisplayMode="grid"(v1.3/CR-6・画像タブ用), WorkTabDisplayMode=null(ECO-039/FL-004=D-b: 作業タブ独立・null=未保存で DisplayMode へフォールバック), LastViewId=null, LastCollectionId=null(v1.3/CR-5),
          GridColumns=4([JsonIgnore]・v1.3/CR-1 廃止プロパティの互換温存) }
          — v2.0 追加(REQ-059): ViewerMode="normal"("normal"|"scroll"|"spread-right"|"spread-left"),
          ViewerResizeMode="noResize"("matchLargerHeight"|"matchSmallerHeight"|"noResize"),
          ViewerAlignMode="middle"("top"|"middle"|"bottom"), ViewerGapMode="tight"("tight"|"loose"),
          ViewerCustomGapPx=0(int 0〜100。範囲外・型不正の保存値は既定 0 として読む),
          ViewerPageTurnMode="doublePage"("doublePage"|"singlePage"), ViewerStartWithEmptyPage=false
        io: "Load(): 破損・欠落時は既定値(例外なし、破損時はバックアップ .bak に退避して再生成)。列挙系の不正文字列も項目単位で既定値へ / Save(): インデント付き JSON・UTF-8"
        path: "%APPDATA%/ViewPrism2/settings.json"
      acceptance_refs: [CP-SET-009]
      fmea_refs: [FMEA-009, FMEA-018]

    - id: M-I18N-011
      ebom_refs: [E-I18N-014, E-I18N-ASSETS-027]
      artifact:
        path: src/ViewPrism2.Core/Services/LocalizationService.cs
        path_note: "+ src/ViewPrism2.App/Assets/i18n/{ja,en}.json"
        type: dotnet-classlib + assets
      interface_contract:
        resolve: "string T(string key, IReadOnlyDictionary<string,string>? args = null)  // OC-8。要求ロケール→ja→キー文字列"
        switch: "SetLocale(string locale) → CultureChanged イベント発火(UI が一斉再バインド)"
        assets: "K-I18N の規約・対象ネームスペースに従い原典から変換。V1 画面の新規キーは ja 正・en 併記"
      acceptance_refs: [CP-I18N-010, CP-UI-G5]
      fmea_refs: []

    - id: M-VIEWSVC-012
      ebom_refs: [E-VIEWSVC-009, E-TAGSVC-008]
      artifact:
        path: src/ViewPrism2.Core/Services
        path_note: "TagService.cs, ViewService.cs + Infrastructure のリポジトリ呼び出し"
        type: dotnet-classlib
      interface_contract:
        tags: "CRUD+Validate(color 形式・名前空白・numeric 範囲・循環)+TagImageAsync(UPSERT)+TagImagesAsync(原子バッチ)+UntagImagesAsync(冪等)+GetAllWithUsageAsync(name 昇順 OrdinalIgnoreCase+使用数)。Delete は使用中(付与 image_tags/配置 view_tag_hierarchies/条件参照 view_conditions のいずれか= GetUsageRefsAsync)を TagInUse で拒否・子タグの親は削除可=ルート化(REQ-082/ECO-045。カスケード REQ-028 は削除実行時の防御層)"
        views: "CRUD+条件/階層ノード CRUD+MoveNode(循環拒否)+TouchModified(本体・条件・階層の変更で modified_at 更新)+GetFavorites/GetRecent(limit=10 既定・同値 id 昇順)。SaveHierarchyAsync は不存在 tag_id を含むノード集合を NotFound で拒否・既存階層無傷(REQ-083/ECO-046。検証用 ITagRepository は optional 注入= production DI 必須・V4 CHEAT-01 前例)"
      invariants:
        - INV-003 / INV-004 / INV-006
      acceptance_refs: [CP-TAG-011, CP-VIEW-012]
      fmea_refs: [FMEA-002, FMEA-003]

    - id: M-UI-013
      ebom_refs: [E-UI-SHELL-021, E-UI-NODEGRAPH-025, E-UI-TAGS-026, E-DESIGN-028]   # ECO-036 第5段: 画像タブ 3 品目(BROWSE-022/AXIS-NAV-040/MODE-041)を M-UI-IMAGETAB-035 へ再帰属(catch-all 解消= scale-01 の写像二層欠陥の是正)。ImageTabView.axaml 等の表示資材は本 unit(dir)所有のまま・品目トレースは 035 経由  # E-UI-DETAIL-023 は ECO-023 で撤回
      artifact:
        path: src/ViewPrism2.App
        path_note: "Views/, ViewModels/"
        type: avalonia-app
      interface_contract:
        trace_status: "ECO-024(M4)で as-built へ同期: シェルは薄いホスト(MainWindowViewModel=タブ切替+TagsTab/ImageTab/WorkTab 保持+ローカライズ+設定確定)。原典画像タブ Grid・harness・legacy VM(Browser/Detail/Tagging/FolderPane シェル・TreeRoots)は撤去済(ImageTabView 一本化)。画像タブの表示軸/モード/選択の逐条は E-UI-BROWSE-022 / E-UI-AXIS-NAV-040 / E-UI-MODE-041(+ViewPrismUI UI-IR)が権威。ECO-010〜021 の evolved design 全面 prose 同期は継続課題"
        shell: "上部タブ『タグ(0)』『画像(1)』『作業(2)』+右端『設定』(ECO-020 で作業タブ追加)。タグタブ=3 ペイン(ビュー管理/階層エディタ(バッチ保存)/タグパレット+作成ダイアログ)。画像タブ=ImageTabView 単一 surface(コレクションペイン折り畳み+表示軸セレクタ(FS フォルダ/タグビュー)+チップ+パンくず / ツールバー(表示軸・ソート・グリッド⇔リスト・タグ編集/整理/作業/⋯)/ 中央グリッド・リスト / 文脈モード時のみ右ペイン(タグ編集 or 整理トレイ))。作業タブ=WorkTabView(E-UI-WORKSPACE-043)"
        startup: "ECO-064/REQ-088: App window.Opened→MainWindow.InitializeAsyncはImageTabのcatalog loadingを同期公開してTask.Yieldで初回shell描画を許可。DB query/materializeはTask.Run明示境界。window.ClosingはCaptureSettings後ImageTab.CancelLoadingでgeneration/cancellationを無効化"
        viewmodels: "画像タブの選択(Ctrl トグル・SHIFT 範囲・選択順)・空状態・表示軸ナビ・ノード評価呼び出し・文脈モード(タグ編集/整理/作業/削除)は ImageTabViewModel が自己完結で所有し unit 検査可能(OC 系を UI から呼ぶだけにする)。シェル(MainWindowViewModel)はタブ切替と stale 反映(TagsTab.DataChanged→ImageTab.ReloadTagCatalogAsync)のみ"
        candidate_preview: "(ECO-092/REQ-098)パレットカード候補値プレビューの容量= TagPaletteRowViewModel の折畳み状態(ChipRowOverflow 再利用・定義順維持・Loc 注入ラベル)+非対話 valueMore TextBlock+チップ幅上限 130/省略/ツールチップ。実測供給= TagsTabView.EvaluateCandidateRows(LayoutUpdated)。幅リセットはヒステリシス 24px(GF-092-02=ScrollViewer バー出没との発振防止)。IMG-023A/B(chip_strip=M-UI-016/029)とは別契約"
        design: "K-DESIGN トークンのみ使用。文言は LocalizationService 経由のみ(ImageTabViewModel の日本語ラベルは surface 内定数=モック CAD 準拠)"
        column_picker: "(ECO-025 β-2/DRY・SC-COLUMN-PICKER-001)表示列の列ピッカーは共通 VM ColumnPickerViewModel(ViewColumnModel[進化モデル=名前固定 VE-001/最大5 VE-002/タグ母集合限定/kind/display_columns 直列化]を消費・選択済み列/追加元/追加・削除・並べ替え/件数・上限バッジ/ラベル解決・編集ごとに Changed 発火)。**2 surface が同一 VM を消費しビューだけ golden 承認レイアウトを保つ**: (α)ViewEditDialog=モーダル・追加元 2 カラム(BasicSources チップ無し/TagSources チップ有り)・保存で反映(ViewEditDialogViewModel が Columns を合成)。(β-2)ファイル一覧「表示列」ポップオーバー(ColumnPickerView・モーダル型クローム/フッター無し=ライブ編集)・追加元は単一マージ(AvailableColumns・基本にも「基本」チップ)。ImageTabViewModel が view 軸+ビュー選択時のみ「表示列」ボタンを出し(CanEditColumns)、Changed→ViewService.UpdateAsync で display_columns を書き戻す(VE-003)→Recompute で列/ソート再構築(除去列がソート中なら解除)。CAD file_list.md L68 の docked フッターはモックに無く=ライブ編集のためフッター無し(CAD 是正済)"
      acceptance_refs: [CP-UI-G1, CP-UI-G2, CP-UI-G6, CP-L1-SMOKE, CP-COLPICKER-025]  # ECO-023 で CP-UI-G3(詳細パネル)retired・ECO-024 で除去・ECO-025 で CP-COLPICKER-025 追加
      fmea_refs: []

    - id: M-UI-016        # v1.2 追加(ずる裁定: タグ付与 UI)→ **superseded(ECO-036 第5段・2026-07-04)**
      # M 層 lineage の初適用: god-VM(1,765 行・scale-01 のハブ)を 3 分割+残余の複合宣言へ解体。
      # artifact.path は後継へ移譲済み(superseded unit はファイルを所有しない — 遡及採点の帰属も後継へ)。
      status: superseded
      split_by: [M-UI-TRASH-032, M-UI-WORK-033, M-UI-ORGANIZE-034, M-UI-IMAGETAB-035]
