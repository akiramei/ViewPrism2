        - サイドバー: 行カード(アイコン+名前+既定バッジ+sub+件数+リネーム鉛筆)・選択・「＋」=デフォルト回転(E-WORKSPACE-042・INV-W1)・インラインリネーム(デフォルト不可 INV-W3)・276/64 折り畳み(E-UI-SHELL-021 のコレクションペインと同骨格)
