        - since ECO-044(IMG-011 裁定③)= マージは**操作ログ**(merge_operations 1 行/マージ= sources・タグ差分=追加行+NULL補完行・実行時刻・destination/sources の**内容指紋**=status+hash+タグ集合)をマージと同一トランザクションで記録する。「取り消す」=ログに基づく**補償操作**(原子= 追加タグ行の削除+補完値のNULL復帰+sources deleted→normal+undone_at マーク)。実行可能条件= sources 行が全て存在(完全削除で不在なら不可)かつ destination/sources の現在指紋がログ指紋と一致(=マージ直後から不変)かつ未取り消し。条件判定・指紋計算・タグ差分計算は描画から独立した決定論ロジックとして unit 検査可能にする。revision カラムは新設しない(指紋突合が「変化していない」を直接検証)
