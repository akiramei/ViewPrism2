    - id: E-UI-REPAIR-039
      name: 修復ライフサイクル UI(criteria 検索フォーム+結果・relink 候補提示/確定・トラッシュ復元/完全削除・非破壊明示・候補カード表示パリティ)— v4.0 新設(ECO-003 で表示契約を補完)
      classification: surface
      rationale_type: external-knowledge
      requirement_refs: [REQ-072, REQ-068, REQ-069, REQ-070, REQ-071]
      external_source_ref: "原典 RepairModal/AdvancedRepairModal(候補カード)/TrashModal(仕様 §2.11.5)"
      kbom_refs: [K-AVALONIA, K-MVVM, K-DESIGN]
      depends_on: [E-CRITERIA-037, E-RELINK-007, E-TRASH-038, E-UI-MERGE-036, E-THUMB-020]
      invariants:
        - 完全削除は非破壊明示文言を必須(『画像ファイルは削除されません(DB から除去)』— §2.11.5/裁定 6)+実行前確認
        - 復元で物理不在→missing 化した結果が UI で分かる(『復元したのに消えた』の誤解防止)
        - relink でタグ付き候補は選べない/拒否されマージ案内(タグ損失防止 — INV-015)
        - 候補選択・確認・結果表示のロジックは ViewModel に置き unit 検査可能にする
        - 各操作は E-CRITERIA-037/E-RELINK-007/E-TRASH-038 の API のみ経由(UI 側で状態遷移を再実装しない)
        - (ECO-003) **再リンク候補は サムネイル+ファイル名+相対パス+サイズ+更新日時 を提示**し再リンク可否を判断可能にする(原典 AdvancedRepairModal カード準拠/§2.11.5 表示パリティ契約)。サムネイルは E-THUMB-020 を用い、実体が存在する候補(pending/normal)の物理パスから生成する(collection root + relative)。表示フィールドは ViewModel が公開し unit 検査可能にする(視覚描画は golden)
        - (ECO-004/DC-RELINK-001) **旧 RelinkWindow(フォルダ管理経由)の候補も同じ表示契約**(サムネイル+ファイル名+パス+サイズ+更新日時)を満たす。ECO-003 是正が RepairWindow の1経路に閉じ RelinkWindow へ波及していなかった(read-across で捕捉)。RelinkViewModel に ISyncFolderRepository 注入で AbsolutePath 供給
        - (ECO-004/DC-TRASH-001) トラッシュ項目は サムネイル+ファイル名+**サイズ** を提示する(原典 TrashModal 準拠。削除/完全削除の判断材料)
        - (ECO-005) 修復 UI は **一括自動修復「すべて自動修復(M件)」+ 単一自動修復(行内)+ 除外(missing→deleted)** の動線を持つ(原典 RepairModal 準拠)。relink/除外は core API(E-RELINK-007.CommitRelinkAsync / E-TRASH-038.ExcludeAsync)経由のみ・一括/単一の判定反復は ViewModel
      acceptance_refs: [CP-UI-G10, CP-REPAIR-CARD-021, CP-DISPLAY-PARITY-022, CP-REPAIR-AUTOALL-023]

