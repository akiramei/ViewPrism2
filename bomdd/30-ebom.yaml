        - (ECO-014/UQ-I07・IMG-005) 類似検索は独立モーダル(原典 SimilarImageSearchModal)でなく、画像タブ右ペインの**整理トレイ**(整理モード)の find として提供する。整理は「整理」ボタンで開始しタグ編集モードと排他。find「似た画像を探す」は ①類似画像検索(E-SIMSEARCH-032・pHash 閾値スライダー)②条件検索(**E-CRITERIA-037 を消費**・hash/拡張子/サイズ/名前/mtime)の2方式。**(ECO-055 as-built)条件検索の UI 意味論=「マージ先との属性一致」をトグル 5 種で選ぶ(自由入力ではない)。一致の定義(裁定 2026-07-06)= ハッシュ SHA-256/拡張子(大小無視)/サイズ(バイト)=完全一致・ファイル名=マージ先名本体(拡張子除く)の部分一致・更新日=同一日(UTC)。条件検索もマージ先必須∧条件 1 つ以上で実行可。マージ先→SearchCriteria の写像は両タブ共有の OrganizeCriteria.FromMergeTarget(転写ドリフト防止)**。**(ECO-056 as-built)検索 UI の形= トレイ下部ピンの「似た画像を探す」折りたたみ内。タブは「条件検索」「類似画像検索」の順(v1 CAD から)・切替コンテンツ 150px 固定・実行ボタンは「探す」。検索結果は中央ペインにヘッダ(「グリッドへ」戻り=結果保持・件数・方式ラベル)つきで表示(backToGrid は v1 CAD 定義=51ad8ee からの実装欠落を是正)**。検索結果は中央ペイン全面に候補+**一致率**(見比べ重視)・候補ごとに「整理対象に追加」。Core(E-SIMSEARCH-032/E-CRITERIA-037)の意味論は不変(候補=normal・同一コレクション REQ-053・閾値以上を類似度降順安定)
        - (ECO-060/REQ-086) 選択中collectionがスキャン中なら類似方式の検索を実行せず「スキャン完了後に利用できます」と理由を表示する。条件検索は公開済みnormal画像に対し利用可能
        - (ECO-062/REQ-087/IMG-018) 類似方式の候補は検索時点の閲覧文脈。FS=マージ先と同一親folder直下(タグchip非影響・subfolder除外・現folder外targetは0)、view=現在node path表示母集合、WorkTab=現workspace。Core呼出前から限定し結果後段filterだけで済ませない。条件検索は不変
        - (ECO-066/REQ-089/IMG-020) pHash類似検索は整理所有の単一session。150px固定領域をpreparing/comparing/cancellingのphase+件数+barへ置換しCTA=探す→停止→停止中。明示停止/整理終了/target・scope・mode・新検索・window終了でcancel+generation無効化。初回cancel=grid、再検索cancel=直前completed保持、途中結果非公開、正常cache保持。画像/作業タブ同一、条件検索は対象外
        - (ECO-067/REQ-090/IMG-021/GF-067-04) 利用者向け判断軸はpHash大局scoreと連続詳細scoreの小さい方N%だけ。検索しきい値も同じ軸へ適用し70%未満を70%検索へ出さない。関係分類は数値を強制しない非表示の安全判定。部分重複/類似は自動削除・重複投入なし
      acceptance_refs: [CP-SIMSESSION-029, CP-DUPQUALITY-030, CP-UI-G9]

    - id: E-UI-MERGE-036
      name: マージ UI(マージ先/元選択・統合タグプレビュー・非破壊明示)+マージ元 deleted の最小トラッシュ表示 — v3.0 新設+ECO-014(整理トレイの merge へ統合)
      classification: surface
      rationale_type: external-knowledge
      requirement_refs: [REQ-067, REQ-066]
      external_source_ref: K-ORIGIN
      external_source_note: "原典 ImageMergeModal/TrashModal(仕様 §2.10.5)。ECO-014 で独立モーダルを画像タブ整理トレイ(インペイン)へ作り直す"
      kbom_refs: [K-AVALONIA, K-MVVM, K-DESIGN]
      depends_on: [E-MERGE-034, E-UI-SIMILARITY-035, E-THUMB-020]
      invariants:
        - since ECO-052(裁定 b) 実行前はトレイのサムネイル一覧でマージ先・整理対象を視認(統合後タグの事前プレビューと非破壊の機能個別明示は提供しない — 保護は完了パネル+補償 Undo(ECO-044)・非破壊は INV-009 全体原則+L3 CP-MERGE-001 で機械実証。旧 invariant「プレビュー+非破壊明示」は ECO-014 トレイ置換時の脱落を as-built 追認して撤回)
        - トラッシュは選択中コレクションの deleted 一覧+件数のみ(復元/完全削除なし — 仕様 §2.10.5)
        - マージ実行は E-MERGE-034 の原子 API のみ経由(UI 側でタグ操作を再実装しない)
        - since ECO-056(v2 CAD 228081d 追随・A-1/A-2 裁定) トレイは **3 ゾーン固定**= マージ先(上部ピン)/整理対象リスト(唯一の内部スクロール)/アクション(下部ピン=「似た画像を探す」折りたたみ+「マージを実行」+実行不可の理由注記)— 対象を大量に積んでもマージ先と実行はスクロールアウトしない(右ペイン共通クローム原則の実体化)。**マージ先は ✕ で解除できる**(整理対象は保持・マージ先のみ未設定へ・実行/検索は不活性化 — REQ-067)。整理対象ヘッダ=件数バッジ+「すべて解除」。グリッドタイルの整理マーカー= 宛先(緑チェック+「宛先」バッジ+緑リング)/対象(青チェック+「対象」バッジ+青リング)の同型。実行ボタン文言= 実行可時「マージを実行（N枚 → 1枚）」(N=対象+マージ先)。両タブ同一部品(work_tab.md 整理節が画像タブ節を権威参照)
        - (ECO-014/UQ-I07・IMG-005) マージは独立モーダル(原典 ImageMergeModal)でなく、**整理トレイ**(整理モード右ペイン)で提供する。トレイ = マージ先(残す1枚)/ 整理対象(統合し削除対象)/ タグ統合トグル(「マージ時にタグを含める」= E-MERGE-034 のタグ union)/ マージを実行(整理対象 ≥1 で有効)。整理中のグリッドクリックはマージ先未設定→マージ先・設定後→整理対象トグル(選択でなくトレイ割当)。完了は「統合しました」+結果(何枚を1枚へ/何枚削除)+「取り消す」「別の整理を続ける」。マージ実行は E-MERGE-034 の原子 API のみ経由(タグ union・マージ先優先・source=deleted・物理非破壊 INV-009)で意味論不変
        - (ECO-014 スコープ外) **マージ実行の永続化ルール(IMG-011: 削除手段=論理/ゴミ箱・取り消し保持範囲・タグ統合の永続化単位・タグ衝突解決)と実ファイル操作は本 ECO 対象外**(後続 ECO)。整理完了の「取り消す」は affordance のみ提示し Undo 保持範囲は IMG-011 で確定する。トラッシュ復元/完全削除(E-TRASH-038)・修復(E-UI-REPAIR-039)の整理 surface への配置も後続(UQ-I07 作業/⋯・原典撤去 ECO-013 残)。詳細パネル/ノート(旧 E-UI-DETAIL-023)は ECO-023 で撤回
      acceptance_refs: [CP-UI-G9]

    # ---------- v4.0 表面(loop-v4-repair-lifecycle) ----------
    - id: E-UI-REPAIR-039
      name: 修復ライフサイクル UI(criteria 検索フォーム+結果・relink 候補提示/確定・トラッシュ復元/完全削除・非破壊明示・候補カード表示パリティ)— v4.0 新設(ECO-003 で表示契約を補完)
      classification: surface
      rationale_type: external-knowledge
      requirement_refs: [REQ-072, REQ-068, REQ-069, REQ-070, REQ-071]
      external_source_ref: K-ORIGIN
      external_source_note: "原典 RepairModal/AdvancedRepairModal(候補カード)/TrashModal(仕様 §2.11.5)"
      kbom_refs: [K-AVALONIA, K-MVVM, K-DESIGN]
      depends_on: [E-CRITERIA-037, E-RELINK-007, E-TRASH-038, E-UI-MERGE-036, E-THUMB-020]
      invariants:
        - 完全削除は非破壊明示文言を必須(『画像ファイルは削除されません(DB から除去)』— §2.11.5/裁定 6)+実行前確認
        - 復元で物理不在→missing 化した結果が UI で分かる(『復元したのに消えた』の誤解防止)
        - relink でタグ付き候補は選べない/拒否されマージ案内(タグ損失防止 — INV-015)
        - 候補選択・確認・結果表示のロジックは描画から独立した決定論的ロジックとして unit 検査可能にする
        - 各操作は E-CRITERIA-037/E-RELINK-007/E-TRASH-038 の API のみ経由(UI 側で状態遷移を再実装しない)
        - (ECO-003) **再リンク候補は サムネイル+ファイル名+相対パス+サイズ+更新日時 を提示**し再リンク可否を判断可能にする(原典 AdvancedRepairModal カード準拠/§2.11.5 表示パリティ契約)。サムネイルは E-THUMB-020 を用い、実体が存在する候補(pending/normal)の物理パスから生成する(collection root + relative)。表示フィールドは描画から独立して unit 検査可能にする(視覚描画は golden)
        - (ECO-004/DC-RELINK-001) **旧 RelinkWindow(フォルダ管理経由)の候補も同じ表示契約**(サムネイル+ファイル名+パス+サイズ+更新日時)を満たす。ECO-003 是正が RepairWindow の1経路に閉じ RelinkWindow へ波及していなかった(read-across で捕捉)
        - (ECO-004/DC-TRASH-001) トラッシュ項目は サムネイル+ファイル名+**サイズ** を提示する(原典 TrashModal 準拠。削除/完全削除の判断材料)
        - (ECO-005) 修復 UI は **一括自動修復「すべて自動修復(M件)」+ 単一自動修復(行内)+ 除外(missing→deleted)** の動線を持つ(原典 RepairModal 準拠)。relink/除外は core API(E-RELINK-007.CommitRelinkAsync / E-TRASH-038.ExcludeAsync)経由のみ・一括/単一の判定反復は描画から独立して unit 検査可能にする
        - (ECO-019) トラッシュ UI を**画像タブ内ポップアップ(中央オーバーレイ)**へ作り直す(別ウィンドウモーダルを置換)。**複数選択 + すべて選択 + 復元 + 完全削除 + ゴミ箱を空(一括完全削除)**を備える。状態遷移は E-TRASH-038(RestoreAsync/PermanentDeleteAsync)のみ経由(新規 Core なし)。選択・一覧・空状態のロジックは描画から独立して unit 検査可能にする(CP-UI-G1)
        - (ECO-019) 完全削除・ゴミ箱を空は**実行前確認**+**INV-009 非破壊明示**「画像ファイルは削除されません(DB から除去)。この操作は元に戻せません。」を必須とする。**モックの『元のファイルも削除され』(物理削除文言)は INV-009 と矛盾するため不採用**(woven 安全制約 > CAD 文言)。物理ファイルは S-26 L3 物理差分で不変を担保
        - (ECO-098) 画像タブのゴミ箱一覧は選択中collection+status=deletedをDB境界で限定し、全status行をmaterializeしてからUIで捨てない。normal 6件に対しhidden missing 262,045件を持つ実profileで全件取得が約1.1秒停止を生んだ潜伏実績をCP-UI-G1で封止する
      acceptance_refs: [CP-UI-G10, CP-REPAIR-CARD-021, CP-DISPLAY-PARITY-022, CP-REPAIR-AUTOALL-023, CP-UI-G1]

