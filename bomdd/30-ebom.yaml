bomdd:
  product: ViewPrism2
  experiment: "loop-v4-repair-lifecycle(v4.0 — E-CRITERIA-037/E-TRASH-038/E-UI-REPAIR-039 追加・E-RELINK-007 を criteria 候補+タグ安全へ拡張。v1/v2/v3 部品の意味論は不変)。前: loop-v3-similarity(E-PHASH-031〜E-UI-MERGE-036)"
  layer: E-BOM

# 規律(method-v1 §2):
#   - 核/表面で型分け。核は requirement_refs 必須、表面は external_source_ref 必須
#   - 木でなくグラフ(woven 部品に owner/consumers)
#   - 表面の変更は defect でなく知識更新

ebom:
  items:
    # ---------- 核(core) ----------
    - id: E-DOMAIN-001
      name: ドメインモデル(エンティティ・値型・エラー語彙)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-001, REQ-002, REQ-016, REQ-020]
      kbom_refs: []
      depends_on: []
      graph_edges:                    # woven: ほぼ全部品が参照する
        owner: E-DOMAIN-001
        consumers: [E-EVAL-002, E-GRAPH-003, E-SORT-004, E-SCAN-005, E-TAGSVC-008, E-VIEWSVC-009, E-DB-010, E-UI-SHELL-021]
      invariants:
        - INV-001 ID は UUIDv4 小文字・生成後不変
        - INV-002 日時は ISO 8601 UTC(ミリ秒 3 桁・literal Z)
        - INV-007 numeric タグ値は InvariantCulture 文字列で保持
      acceptance_refs: [CP-UTIL-005]

    - id: E-EVAL-002
      name: 条件評価器(演算子 5 種・AND 結合・エッジケース規則)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-031, REQ-016]
      kbom_refs: [K-REGEX]
      depends_on: [E-DOMAIN-001]
      invariants:
        - INV-007 数値比較は常に数値として行う(辞書順比較禁止)
        - INV-010 評価対象は status=normal のみ
        - 例外でクラッシュしない(不正 regex・型不一致は不成立)
      acceptance_refs: [CP-EVAL-001, CP-NFR-001]

    - id: E-GRAPH-003
      name: NodeGraph 構築器+パス→条件変換+ホームタグ解決
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-035, REQ-036, REQ-037, REQ-034]
      kbom_refs: []
      depends_on: [E-DOMAIN-001, E-EVAL-002]
      invariants:
        - INV-004 階層に循環なし(構築器は循環入力でも停止しない=検出して拒否)
        - INV-008 参照切れノードはフォールバック(ルートへ)
        - INV-010 値抽出は status=normal のみ
      acceptance_refs: [CP-GRAPH-002]

    - id: E-SORT-004
      name: 整列器(sort_field×direction・安定ソート)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-038, REQ-029, REQ-033]
      depends_on: [E-DOMAIN-001]
      invariants:
        - 同値時の二次キーは id 昇順(全ソートで安定)
        - name は OrdinalIgnoreCase
      acceptance_refs: [CP-SORT-003]

    - id: E-SCAN-005
      name: スキャン判定器+スキャンサービス+ステータス遷移
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-011, REQ-012, REQ-015, REQ-016]
      kbom_refs: [K-WINFS]
      depends_on: [E-DOMAIN-001, E-HASH-006, E-DB-010]
      invariants:
        - INV-009 画像ファイルへ書き込まない(読み取り専用)
        - 遷移は仕様 §2.1 遷移表の 6 パターンのみ
        - missing 化(§2.1 手順 4/5)は各ファイル判定(手順 3)より先に実行 — 単一スキャンのリネーム検出のため(ECO-001 で明文化)
        - スキャン二重起動禁止(同一フォルダ)
      acceptance_refs: [CP-SCAN-004]

    - id: E-HASH-006
      name: ハッシュ計算+パス正規化+サイズ整形(共通ユーティリティ)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-013, REQ-014, REQ-043]
      depends_on: []
      graph_edges:
        owner: E-HASH-006
        consumers: [E-SCAN-005, E-RELINK-007, E-THUMB-020]
      invariants:
        - INV-005 relative_path は正規形のみ・比較は case-insensitive
      acceptance_refs: [CP-UTIL-005]

    - id: E-RELINK-007
      name: 再リンク(候補検索+確定処理)— v4.0 で criteria 候補探索+タグ安全ガードへ拡張(REQ-069)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-017, REQ-069]
      depends_on: [E-DOMAIN-001, E-DB-010, E-CRITERIA-037, E-TAGSVC-008]
      invariants:
        - INV-001 missing 側 image_id 不変(タグ・関連の保全)
        - INV-015 (v4.0) 置換候補は pending ∪ untagged-normal のみ。タグ付き候補は relink 拒否→マージ案内(タグ損失防止)
        - INV-015 (v4.0) candidate_link_id は候補ヒント(非確定)。確定で候補行を削除し missing 行が当該パスを所有
        - 確定は単一トランザクション・原子(T4)。遷移表外(missing でない/別コレクション/許可外 status)は拒否
      acceptance_refs: [CP-SCAN-004, CP-RELINK-019]

    - id: E-TAGSVC-008
      name: タグ管理サービス(CRUD・UPSERT 付与・バッチ・カスケード・バリデーション)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-020, REQ-021, REQ-022, REQ-023, REQ-024, REQ-025, REQ-026, REQ-027, REQ-028, REQ-029]
      depends_on: [E-DOMAIN-001, E-DB-010]
      invariants:
        - INV-003 (image_id, tag_id) は高々 1 行
        - INV-004 タグ階層に循環なし
        - INV-006 バッチは全適用か無適用
      acceptance_refs: [CP-TAG-011]

    - id: E-VIEWSVC-009
      name: ビュー管理サービス(CRUD・modified_at 規則・お気に入り/最近・階層ノード管理)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-030, REQ-032, REQ-033, REQ-034]
      depends_on: [E-DOMAIN-001, E-DB-010]
      invariants:
        - INV-002 modified_at はビュー本体・条件・階層の変更で更新、閲覧では不変
        - INV-004 ビュー階層ノードの移動で循環を作らない
      acceptance_refs: [CP-VIEW-012]

    - id: E-DB-010
      name: 永続化層(スキーマ DDL・マイグレーションランナー・リポジトリ群)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-003, REQ-004, REQ-005, REQ-028]
      kbom_refs: [K-SQLITE]
      depends_on: [E-DOMAIN-001]
      graph_edges:                    # woven: 全サービスの土台
        owner: E-DB-010
        consumers: [E-SCAN-005, E-RELINK-007, E-TAGSVC-008, E-VIEWSVC-009]
      invariants:
        - FK 規則は仕様 §2.0 のとおり(CASCADE/SET NULL)
        - 新規 DB = 最新スキーマ+全マイグレーション既適用マーク
        - 接続ごとに PRAGMA journal_mode=WAL・foreign_keys=ON を明示発行
      acceptance_refs: [CP-DB-006]

    - id: E-CACHE-011
      name: 画像メモリキャッシュ(LRU 50 枚・TTL 3 分)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-045]
      depends_on: []
      invariants:
        - 上限超過時は最終アクセスが最古のものから破棄
      acceptance_refs: [CP-CACHE-008]

    - id: E-SETTINGS-013
      name: 設定ストア(settings.json・破損耐性)— v2.0 でビューア設定 7 項目を追加(REQ-059)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-052, REQ-059]
      depends_on: []
      invariants:
        - 破損ファイルで例外を外に漏らさない(既定値+再生成)
        - ビューア設定の範囲外値(customGapPx 等)は既定値として読む(REQ-059)
      acceptance_refs: [CP-SET-009]

    - id: E-VIEWER-CALC-030
      name: ビューア計算核(見開きペアリング・ページ送り・スクロール現在位置追跡・高さ統一・モード別位置記憶)— v2.0 新設
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-054, REQ-055, REQ-056, REQ-057, REQ-058]
      kbom_refs: []
      depends_on: [E-DOMAIN-001]
      invariants:
        - 純粋計算(I/O・UI 依存なし)。OC-9〜13 として ViewModel から呼ぶだけにする
        - 送り・ペアリングは仕様 §2.9 の規則のみ(端で停止・ループしない)
        - 高さ統一はアスペクト比を常に維持(仕様 §2.9 REQ-058)
      acceptance_refs: [CP-VIEWER-014]

    - id: E-I18N-014
      name: i18n 解決器(フォールバック・補間・動的切替通知)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-050, REQ-051]
      kbom_refs: [K-I18N]
      depends_on: []
      invariants:
        - INV-008 欠落キーで例外を投げない(ja → キー文字列の順でフォールバック)
      acceptance_refs: [CP-I18N-010]

    # ---------- v3.0 核(loop-v3-similarity) ----------
    - id: E-PHASH-031
      name: pHash 計算核(DCT 知覚ハッシュ・ハミング距離・類似度%変換)— v3.0 新設
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-061, REQ-062]
      kbom_refs: [K-PHASH, K-SKIA]
      depends_on: [E-DOMAIN-001]
      invariants:
        - INV-012 同一ピクセル内容→同一 pHash(決定的)。距離→類似度%は単調非増加・spec 固定
        - 純粋計算(ピクセル取得後は I/O・UI・DB 依存なし)。OC-14/OC-15 として直接呼べる公開 API
        - レシピは仕様 §2.10.1/ADR-0008 のみ(orthonormal DCT-II・DC 除外中央値・双線形・(int)(y+0.5))
      acceptance_refs: [CP-PHASH-016]

    - id: E-SIMSEARCH-032
      name: 類似検索エンジン(候補=normal 限定・閾値・降順安定・キャッシュ協調)— v3.0 新設
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-064]
      kbom_refs: []
      depends_on: [E-PHASH-031, E-SIMCACHE-033, E-DOMAIN-001]
      invariants:
        - 候補は status=normal のみ(基準画像・他 status を除外)。フィルタはキャッシュ参照に先行(仕様 §2.10.4)
        - 同一コレクション内(REQ-053)。閾値以上(≧)を類似度降順・同値 id 昇順で安定
        - 検索は UI をブロックしない(非同期・進捗通知可)
      acceptance_refs: [CP-SIM-017]

    - id: E-SIMCACHE-033
      name: 特徴量・類似度の永続化と無効化(image_features / image_similarity)— v3.0 新設
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-063]
      kbom_refs: [K-SQLITE]
      depends_on: [E-DB-010, E-PHASH-031]
      graph_edges:
        owner: E-SIMCACHE-033
        consumers: [E-SIMSEARCH-032, E-MERGE-034]
      invariants:
        - ペアは id1<id2 正規化・cache_key={id1}-{id2}(モード接尾辞なし)。(A,B)=(B,A)
        - 無効化は内容ベースのみ(file_size/modified_date/hash 変化で再計算)。時間失効は不採用
        - 特徴量再計算時はその画像が関与する image_similarity 行を連鎖削除する
        - 画像削除時は FK CASCADE で両テーブルの関連行を削除
      acceptance_refs: [CP-SIM-017, CP-DB-006]

    - id: E-MERGE-034
      name: マージ計算+マージサービス(タグ union・マージ先優先・status=deleted・原子・物理非破壊)— v3.0 新設
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-066]
      kbom_refs: []
      depends_on: [E-DOMAIN-001, E-TAGSVC-008, E-DB-010, E-SIMCACHE-033]
      invariants:
        - INV-011 タグ union・衝突=マージ先優先(マージ先 NULL/空ならマージ元値)・多元 id 昇順先勝ち・simple は存在 union
        - マージ元 status=deleted の論理操作のみ。image_tags は削除しない。全工程は原子(失敗時全ロールバック・INV-006)
        - INV-009 物理画像ファイルを移動・削除・変更しない(L3 物理差分 CP-MERGE-001 で実証)
      acceptance_refs: [CP-MERGE-018, CP-MERGE-001]

    # ---------- v4.0 核(loop-v4-repair-lifecycle) ----------
    - id: E-CRITERIA-037
      name: criteria 条件検索(hash/名前/拡張子/mtime 範囲/サイズ範囲 AND・status 用途別・安定順)— v4.0 新設
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-068]
      kbom_refs: []
      depends_on: [E-DOMAIN-001, E-DB-010]
      graph_edges:
        owner: E-CRITERIA-037
        consumers: [E-RELINK-007, E-UI-REPAIR-039, E-UI-SIMILARITY-035]   # (ECO-014) 整理トレイの条件検索 find
      invariants:
        - 指定条件のみ AND 結合・同一コレクション内。対象 status は呼び出し用途で固定(単体=normal / relink 候補=pending∪normal)
        - 結果は安定順(relative_path 昇順・同値 id 昇順)。条件が 1 つも未指定なら非実行(全件を返さない)
        - 純粋な絞り込みロジックは ViewModel/サービスから unit 検査可能(OC-19)
      acceptance_refs: [CP-CRITERIA-019]

    - id: E-TRASH-038
      name: トラッシュ復元(存在分岐 T6/T7)+完全削除(T8・CASCADE・物理非破壊)+除外(T9・missing→deleted)— v4.0 新設(ECO-005 で T9 追加)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-070, REQ-071, REQ-073]
      kbom_refs: [K-WINFS, K-SQLITE]
      depends_on: [E-DOMAIN-001, E-DB-010]
      invariants:
        - INV-013 復元は deleted→normal を物理存在時のみ・不在は deleted→missing(幽霊 normal 防止)
        - INV-014 完全削除は images 行削除のみ(image_tags/features/similarity は FK CASCADE)・deleted 限定
        - INV-009 物理画像ファイルへ触れない(復元の存在確認は読み取りのみ・L3 物理差分 S-26/CP-TRASH-020 で実証)
        - 層規律: 物理存在確認(File.Exists 相当)は Infrastructure。状態遷移判断は Core(bool 存在を受けて分岐)
        - (ECO-005/T9) 除外は **missing→deleted のみ**(missing 以外は ValidationError)。status 更新のみ・物理非破壊(INV-009)。タグ/ID/特徴量不変。復元(T6/T7)で戻せる可逆操作
      acceptance_refs: [CP-TRASH-020, CP-TRASH-001, CP-TRASH-021]

    # ---------- 表面(surface) ----------
    - id: E-THUMB-020
      name: サムネイル生成サービス
      classification: surface
      rationale_type: external-knowledge
      requirement_refs: [REQ-040]
      external_source_ref: K-SKIA
      kbom_refs: [K-SKIA]
      depends_on: [E-HASH-006]
      invariants:
        - INV-009 元画像へ書き込まない
        - 失敗時もスキャン・一覧を停止させない
      acceptance_refs: [CP-THUMB-007]

    - id: E-UI-SHELL-021
      name: シェル UI(メインウィンドウ・タブナビゲーション(タグ/画像+設定)・コレクション選択スコープ(一覧=名前+画像数+スキャン中)・スキャン実行/結果表示)— v1.3 コレクションファースト(ECO-002 CR-2/5/8)
      classification: surface
      rationale_type: external-knowledge
      requirement_refs: [REQ-010, REQ-015, REQ-052, REQ-053]
      external_source_ref: K-AVALONIA
      kbom_refs: [K-AVALONIA, K-MVVM, K-DESIGN]
      depends_on: [E-SCAN-005, E-SETTINGS-013, E-I18N-014]
      invariants:
        - 多重起動禁止(2 つ目は既存をアクティブ化)
        - (ECO-012/I03) 画像タブのコレクションペインは折り畳み可(展開 276px / rail 64px)。コレクション行はパスを tooltip 表示し、行は名前+件数に簡潔化(CR-8 踏襲・タグタブ UQ-E1 の行簡潔方針と整合)
        - (ECO-013/IMG-009) コレクションペインの「追加(+)」(展開ヘッダ「コレクション」見出し右 + 折り畳みレール)は**コレクション管理(追加・スキャン・削除)ビューを開く単一入口**。原典 view-prism の行別スキャン(⟳)・独立「管理」導線は本入口へ集約する(モック準拠・VP-UI-006)。コレクション行は閲覧(選択)に専念しクロムを静かに保つ。削除は同期フォルダ登録の解除のみで実ファイル非破壊(INV-009)
        - (ECO-013) 画像タブ surface を新 ImageTabView 一本へ統合し、原典 MainWindow の画像タブ Grid・harness トグル・legacy 画像タブ VM ロジックを撤去する。これに伴い**コレクション選択スコープ(REQ-053・コレクションファースト/横断なし)・選択コレクションと表示モードの永続化と復元(REQ-052 CR-5/CR-6)・未選択プロンプト・保存コレクション消失時の未選択フォールバック**は新 ImageTabViewModel が担う(原典と等価維持・golden 承認済 REQ-053 を退行させない)。CP-UI-G1(REQ-053 カバレッジ)は新 VM 契約へ移行
      acceptance_refs: [CP-UI-G1, CP-L1-SMOKE]

    - id: E-UI-GRID-022
      name: グリッド/リスト表示(レスポンシブ自動列・仮想化・選択(Ctrl トグル/SHIFT 範囲 union)・空状態)— v1.3 改訂(ECO-002 CR-1/3/6)+v2.0 GF-02 是正+ECO-010(画像タブ 二軸ブラウズ ナビ移管・グリッドセル size 撤回)+ECO-011(表示軸モデル確定・FS フォルダ軸/全画像入口)
      classification: surface
      rationale_type: external-knowledge
      requirement_refs: [REQ-041, REQ-042, REQ-060]
      external_source_ref: K-AVALONIA
      kbom_refs: [K-AVALONIA, K-MVVM, K-DESIGN]
      depends_on: [E-SORT-004, E-THUMB-020, E-EVAL-002, E-VIEWSVC-009]
      invariants:
        - 選択ロジックは ViewModel に置き unit 検査可能にする(OC 系)
        - 列数はコンテンツ幅から自動算出(clamp(⌊幅/220px⌋,2,8))。固定列数セレクタを置かない(v1.3)
        - SHIFT 範囲選択は union(置換しない)・選択順は index 昇順で末尾へ追番(v1.3)
        - グリッドの選択視覚はセル強調枠+バッジのみ。行背景の選択視覚を出さない(v2.0/GF-02。リスト表示の行選択視覚は正)
        - (ECO-010/DC-GRID-001 改訂) グリッドセルは サムネイル+ファイル名 を提示する。**ファイルサイズはグリッドセルから除去**(リスト列でのみ提示)。閲覧時はタグ色ドット(最大3・左下)を重畳。ECO-004 で原典準拠に復活させた size を新 CAD(画像タブモック)準拠で差し戻す(画像が主役・セル下 size は視覚ノイズ・size はリスト/詳細で担保)
        - (ECO-010/I01) 画像タブのタグビュー軸ナビゲーションは**左 NodeGraph ツリーでなく**、ブラウズ領域の**チップ+パンくず+表示軸セレクタ**で行う(FS 軸と同一の『チップで潜る・パンくずで戻る』操作)。ビュー階層は E-VIEWSVC-009 を消費
