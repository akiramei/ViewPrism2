        - (ECO-021/β-1) 作業モード=選択して別スペースへ移動(E-WORKSPACE-042.MoveImages・INV-W5)を配線。タグドット/絞り込みチップ・選択機構(Shift/Ctrl・選択順バッジ・その場マーカー更新)を再利用。画像タブ(golden 済み)に触れず作業タブ側でオーケストレート(UQ-W06=B 隔離方式)。Core サービス・末端 VM・DS を再利用し新 Core 意味論なし
        - (ECO-021/β-2) タグ編集モードを E-UI-TAGASSIGN-029 から再利用配線(現在のタグ/タグ追加=シンプル/テキスト/数値・インライン値・数値セル。since ECO-041: タグ追加検索も再利用範囲=画像タブと同一意味論 — β-2 時点の宣言転記漏れの補完・mock 作業タブにも同一検索あり)。付与/削除は TagService(TagImagesAsync/UntagImagesAsync)経由で Core 意味論不変。作業と排他(`inSelect=editMode||workMode` で選択機構共有)。ECO-014§8 排他隠し規律を作業タブへ拡張(モード中は他モード入口を隠す `ShowEditEntry`/`ShowWorkEntry`)。連番別アクション(UQ-I02b)はモック作業タブに無いため非搭載
        - (ECO-021/β-3) 整理モード(類似+マージ整理トレイ)を E-UI-SIMILARITY-035 + E-UI-MERGE-036 から再利用配線。マージ先/整理対象の割当(グリッドクリック分岐・マージ先リング/整理対象チェック)・似た画像を探す(条件=CriteriaMatcher 純粋関数で現スペース内絞り込み / 類似=FindSimilarAsync 結果を workspace に限定)・マージ=MergeService(E-MERGE-034・原子・タグ union・source=deleted・物理非破壊 INV-009)。タグ編集・作業・整理の3モード排他(ECO-014§8 排他隠し)。Core 意味論不変・新 Core/DS なし。タグ統合 OFF/取り消しは IMG-011(別 ECO)
        - (ECO-021/β-4) ⋯メニュー(削除/ゴミ箱)を E-TRASH-038 / E-UI-REPAIR-039 から再利用配線。削除モード=4つ目の排他文脈モード(⋯から入る)→「ゴミ箱へ移動」=DeleteToTrashAsync(normal→deleted ソフト削除・物理非破壊 INV-009)。ゴミ箱 in-tab popup(ECO-019 再利用・複数選択/すべて選択/復元 RestoreAsync/完全削除 PermanentDeleteAsync/空・確認文言は INV-009 忠実)。**修復はコレクションスコープで作業スペースに対応しないため作業タブ ⋯ から非搭載**(設計判断)。ゴミ箱は workspace スコープ(workspace_images × images status=deleted・E-WORKSPACE-042.GetDeletedImagesAsync 読み取りクエリ追加=新状態遷移なし)。完全削除は FK CASCADE で workspace_images も消滅。**ECO-β 完了**(β-1〜β-4)
      acceptance_refs: [CP-WORKSPACE-028, CP-L1-SMOKE, CP-UI-G1]

