    - id: E-SNAPSHOT-045
      name: カタログDBスナップショット(作成器=VACUUM INTO+.partial検証確定・一覧・復元前検証・復元予約・復元ブートストラップ=起動時差し替え)— ECO-072 新設
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-092]
      kbom_refs: [K-SQLITE, K-WINFS]
      depends_on: [E-DOMAIN-001, E-DB-010]
      invariants:
        - 作成は .partial → quick_check+foreign_key_check → SHA-256 → アトミックリネームの順。中断・検証失敗で不完全ファイルが正式名にならず .partial を残さない(SS-005)
        - 検証済み(サイドカーメタ存在+サイズ一致)のみ復元可。メタ欠落・不一致は「検証待ち」=復元不可
        - 復元前検証は integrity_check+foreign_key_check+migrations部分集合判定(未知ID=より新しいアプリ由来を拒否)。復元直前に省略しない
        - 復元予約は一回限り(読取時に削除)。失敗時に起動のたび再試行しない
        - ブートストラップはDB接続確立前に実行(単一共有接続 M-DB-007 と両立)。差し替え前に現行DBの安全スナップショットを作成し、失敗時は退避DBへ戻して通常起動を継続する
        - 復元後の前進互換は既存 MigrationRunner(REQ-004)に委譲(スナップショットは migrations テーブルを内包)
        - INV-009 画像実体・サムネイルへ触れない(DBファイルのみ)。検証用接続は Pooling=False でハンドルを残さない
      acceptance_refs: [CP-SNAPSHOT-031]

