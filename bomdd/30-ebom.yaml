bomdd:
  product: ViewPrism2
  experiment: "loop-v4-repair-lifecycle(v4.0 + ECO-016 surface 部品体系化 — 旧 E-UI-GRID-022 を E-UI-BROWSE-022 / E-UI-AXIS-NAV-040 / E-UI-MODE-041 へ追跡付き再分割。core 意味論と v1/v2/v3 部品の意味論は不変)"
  layer: E-BOM

# 規律(method-v1 §2):
#   - 核/表面で型分け。核は requirement_refs 必須、表面は external_source_ref 必須
#   - 木でなくグラフ(woven 部品に owner/consumers)
#   - 表面の変更は defect でなく知識更新

ebom:
  items:
    # ---------- 核(core) ----------
    - id: E-DOMAIN-001
      name: ドメインモデル(エンティティ・値型・エラー語彙)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-001, REQ-002, REQ-016, REQ-020]
      kbom_refs: []
      depends_on: []
      graph_edges:                    # woven: ほぼ全部品が参照する
        owner: E-DOMAIN-001
        consumers: [E-EVAL-002, E-GRAPH-003, E-SORT-004, E-SCAN-005, E-TAGSVC-008, E-VIEWSVC-009, E-DB-010, E-UI-SHELL-021]
      invariants:
        - INV-001 ID は UUIDv4 小文字・生成後不変
        - INV-002 日時は ISO 8601 UTC(ミリ秒 3 桁・literal Z)
        - INV-007 numeric タグ値は InvariantCulture 文字列で保持
      acceptance_refs: [CP-UTIL-005]

    - id: E-EVAL-002
      name: 条件評価器(演算子 5 種・AND 結合・エッジケース規則)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-031, REQ-016]
      kbom_refs: [K-REGEX]
      depends_on: [E-DOMAIN-001]
      invariants:
        - INV-007 数値比較は常に数値として行う(辞書順比較禁止)
        - INV-010 評価対象は status=normal のみ
        - 例外でクラッシュしない(不正 regex・型不一致は不成立)
      acceptance_refs: [CP-EVAL-001, CP-NFR-001]

    - id: E-GRAPH-003
      name: NodeGraph 構築器+パス→条件変換+ホームタグ解決
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-035, REQ-036, REQ-037, REQ-034]
      kbom_refs: []
      depends_on: [E-DOMAIN-001, E-EVAL-002]
      invariants:
        - INV-004 階層に循環なし(構築器は循環入力でも停止しない=検出して拒否)
        - INV-008 参照切れノードはフォールバック(ルートへ)
        - INV-010 値抽出は status=normal のみ
      acceptance_refs: [CP-GRAPH-002]

    - id: E-SORT-004
      name: 整列器(sort_field×direction・安定ソート)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-038, REQ-029, REQ-033]
      depends_on: [E-DOMAIN-001]
      invariants:
        - 同値時の二次キーは id 昇順(全ソートで安定)
        - name は OrdinalIgnoreCase
      acceptance_refs: [CP-SORT-003]

    - id: E-SCAN-005
      name: スキャン判定器+スキャンサービス+ステータス遷移
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-011, REQ-012, REQ-015, REQ-016]
      kbom_refs: [K-WINFS]
      depends_on: [E-DOMAIN-001, E-HASH-006, E-DB-010]
      invariants:
        - INV-009 画像ファイルへ書き込まない(読み取り専用)
        - 遷移は仕様 §2.1 遷移表の 6 パターンのみ
        - missing 化(§2.1 手順 4/5)は各ファイル判定(手順 3)より先に実行 — 単一スキャンのリネーム検出のため(ECO-001 で明文化)
        - スキャン二重起動禁止(同一フォルダ)
      acceptance_refs: [CP-SCAN-004]

    - id: E-HASH-006
      name: ハッシュ計算+パス正規化+サイズ整形(共通ユーティリティ)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-013, REQ-014, REQ-043]
      depends_on: []
      graph_edges:
        owner: E-HASH-006
        consumers: [E-SCAN-005, E-RELINK-007, E-THUMB-020]
      invariants:
        - INV-005 relative_path は正規形のみ・比較は case-insensitive
      acceptance_refs: [CP-UTIL-005]

    - id: E-RELINK-007
      name: 再リンク(候補検索+確定処理)— v4.0 で criteria 候補探索+タグ安全ガードへ拡張(REQ-069)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-017, REQ-069]
      depends_on: [E-DOMAIN-001, E-DB-010, E-CRITERIA-037, E-TAGSVC-008]
      invariants:
        - INV-001 missing 側 image_id 不変(タグ・関連の保全)
        - INV-015 (v4.0) 置換候補は pending ∪ untagged-normal のみ。タグ付き候補は relink 拒否→マージ案内(タグ損失防止)
        - INV-015 (v4.0) candidate_link_id は候補ヒント(非確定)。確定で候補行を削除し missing 行が当該パスを所有
        - 確定は単一トランザクション・原子(T4)。遷移表外(missing でない/別コレクション/許可外 status)は拒否
      acceptance_refs: [CP-SCAN-004, CP-RELINK-019]

    - id: E-TAGSVC-008
      name: タグ管理サービス(CRUD・UPSERT 付与・バッチ・カスケード・バリデーション・使用中削除ガード)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-020, REQ-021, REQ-022, REQ-023, REQ-024, REQ-025, REQ-026, REQ-027, REQ-028, REQ-029, REQ-082]
      depends_on: [E-DOMAIN-001, E-DB-010]
      invariants:
        - INV-003 (image_id, tag_id) は高々 1 行
        - INV-004 タグ階層に循環なし
        - INV-006 バッチは全適用か無適用
        - since ECO-045(TAG-008 裁定 2026-07-05)= **使用中タグ定義の削除は拒否**(REQ-082) — 付与(image_tags)・配置(view_tag_hierarchies)・条件参照(view_conditions)のいずれかがあれば TagInUse・定義と参照は無傷。子タグの親は削除可(ルート化)。REQ-028 カスケードは削除実行時の防御層として存続。無効化/非推奨化は別操作(未導入)。権威= review_points.md TAG-008/tag_tab.md(ViewPrismUI 63d09bc)
        - since ECO-047(TAG-009 裁定 2026-07-05・現状追認)= **タグ定義階層(tags.parent_id)は UI 非露出** — Core 制約(REQ-022)として維持するが現リリースの製品概念として不採用(編集・表示 UI を提供しない)。階層分類はビュー階層(E-VIEWSVC-009/E-UI-NODEGRAPH-025)で表現・意味分類の主要モデルとはしない(意味情報は将来の辞書タグ属性の方向=未定義)。権威= review_points.md TAG-009(ViewPrismUI 7ffd423)
      acceptance_refs: [CP-TAG-011]

    - id: E-VIEWSVC-009
      name: ビュー管理サービス(CRUD・modified_at 規則・お気に入り/最近・階層ノード管理・表示列 display_columns 所有)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-030, REQ-032, REQ-033, REQ-034, REQ-079, REQ-083]
      depends_on: [E-DOMAIN-001, E-DB-010]
      invariants:
        - INV-002 modified_at はビュー本体・条件・階層の変更で更新、閲覧では不変
        - INV-004 ビュー階層ノードの移動で循環を作らない
        - (ECO-025/VE-003) 表示列 display_columns は**ビュー定義が所有**する順序付き列配列(基本情報 name/size/modified_date ∪ 当該ビューのタグ階層メンバーのタグ)。コレクション×ビューのローカル上書きを持たない。ファイル一覧の「表示列」編集も同一の display_columns を書き戻す(別コレクションで同ビューを開いても同一列構成)。display_columns 変更でも modified_at を更新する(INV-002 の一部・閲覧では不変)
        - (ECO-025/VE-001) columns[0] は常に name(c_name)。先頭固定・削除/移動不可(名前不在の列構成は保存不可)。両画面(ビュー編集・ファイル一覧)共通
        - (ECO-025/VE-002) 列数は 1 ≤ N ≤ 最大(標準 5・固定で先行)。名前固定により下限は常に 1 以上。DC プロップの可変レンジ(min2/max8・min3/max7)は製造仕様でない
        - (ECO-025) タグ列候補の母集合は当該ビューのタグ階層メンバーシップに限る。各列は kind∈{basic,num,text,simple}(basic=name/size/date、タグ列は タグ型→num/text/simple に射影)を持ちセル描画/ソート(E-UI-BROWSE-022)を規定する。Ver1「種類(kind)」列は廃止(列ソースは基本情報とタグのみ)
        - since ECO-043(VE-004 裁定 2026-07-05・現状追認)= **ビュー名は必須** — 空白のみの名前は作成・更新とも ValidationError で拒否(UI はエラーメッセージ表示)。spec §2.5「名前(必須)」既記載・Core 実装済みの明文確定。権威= review_points.md VE-004/view_edit.md「バリデーション」(ViewPrismUI 85d1f57)
        - since ECO-046(TAG-008 U-a 裁定 2026-07-05)= **階層一括保存の参照切れ耐性**(REQ-083) — SaveHierarchyAsync は不存在 tag_id を含むノード集合を NotFound の Result で拒否(FK 例外の未処理伝播にしない)・既存階層は無傷。検証用 ITagRepository は optional 注入(V4 CHEAT-01 前例・production DI は必ず注入。未注入は FK が最後の砦=旧テスト互換の縮退)。権威= docs/decisions/TAG-008-tag-definition-deletion.md U-a 追補(ViewPrismUI d386471)
      acceptance_refs: [CP-VIEW-012]

    - id: E-DB-010
      name: 永続化層(スキーマ DDL・マイグレーションランナー・リポジトリ群)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-003, REQ-004, REQ-005, REQ-028]
      kbom_refs: [K-SQLITE]
      depends_on: [E-DOMAIN-001]
      graph_edges:                    # woven: 全サービスの土台
        owner: E-DB-010
        consumers: [E-SCAN-005, E-RELINK-007, E-TAGSVC-008, E-VIEWSVC-009, E-WORKSPACE-042]
      invariants:
        - FK 規則は仕様 §2.0 のとおり(CASCADE/SET NULL)
        - 新規 DB = 最新スキーマ+全マイグレーション既適用マーク
        - 接続ごとに PRAGMA journal_mode=WAL・foreign_keys=ON を明示発行
        - (ECO-020) マイグレーション 004-workspaces で workspaces / workspace_images を追加。is_default の部分 UNIQUE 索引でデフォルト高々 1 件を担保(INV-W1)。両 FK→CASCADE(workspace 削除・画像の完全削除で所属消滅)。LatestDdl 末尾と列順・索引名を揃えスキーマ同値(CP-DB-006)を保つ
        - (ECO-025・現状追認) 表示列 display_columns は既存 views.display_columns TEXT(JSON)へ格納=**マイグレーション不要**(ECO-020 の workspaces 追加と対照)。ECO-025 の進化モデル(順序・kind・名前固定・最大5)は同一 TEXT 列へ前方互換に直列化する。スキーマ同値(CP-DB-006)不変
        - since ECO-044: マイグレーション 005-merge-operations で merge_operations(マージ操作ログ・IMG-011 裁定③)を追加。target_id FK→images CASCADE(destination 完全削除でログ消滅=自然に取り消し不可)。source_ids はログ内 JSON(FK なし — sources の完全削除は Undo 時の行不在で検出)。LatestDdl 末尾と列順・索引名を揃えスキーマ同値(CP-DB-006)を保つ(ECO-020 前例)
      acceptance_refs: [CP-DB-006]

    - id: E-CACHE-011
      name: 画像メモリキャッシュ(LRU 50 枚・TTL 3 分)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-045]
      depends_on: []
      invariants:
        - 上限超過時は最終アクセスが最古のものから破棄
      acceptance_refs: [CP-CACHE-008]

    - id: E-SETTINGS-013
      name: 設定ストア(settings.json・破損耐性)— v2.0 でビューア設定 7 項目を追加(REQ-059)+ ECO-022 でタグ制御設定(enableTagControl+action→tag_id 6個)を追加(REQ-077)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-052, REQ-059, REQ-077]
      depends_on: []
      invariants:
        - 破損ファイルで例外を外に漏らさない(既定値+再生成)
        - ビューア設定の範囲外値(customGapPx 等)は既定値として読む(REQ-059)
        - "タグ制御: enableTagControl 既定 OFF・action→tag_id 既定すべて未割り当て。不正/欠損/未知値は安全な既定へ正規化(REQ-077)。現存しない tag_id を指すマッピングは永続値を保持してよいが解決時は未割り当て扱い"
      acceptance_refs: [CP-SET-009]

    - id: E-VIEWER-CALC-030
      name: ビューア計算核(見開きペアリング・ページ送り・スクロール現在位置追跡・高さ統一・モード別位置記憶)— v2.0 新設
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-054, REQ-055, REQ-056, REQ-057, REQ-058]
      kbom_refs: []
      depends_on: [E-DOMAIN-001]
      invariants:
        - 純粋計算(I/O・UI 依存なし)。OC-9〜13 として UI 側から呼ぶだけにする
        - 送り・ペアリングは仕様 §2.9 の規則のみ(端で停止・ループしない)
        - 高さ統一はアスペクト比を常に維持(仕様 §2.9 REQ-058)
      acceptance_refs: [CP-VIEWER-014]

    - id: E-VIEWER-TAGCTRL-044
      name: タグ制御配置核(アクション解決・タグ制御ページプラン構築・タグ制御ナビゲーション)— ECO-022 新設・仕様 §2.12
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-076]
      kbom_refs: [K-DESIGN]
      depends_on: [E-DOMAIN-001, E-VIEWER-CALC-030]
      invariants:
        - 純粋計算(I/O・UI・DB 依存なし)。OC-23/24/25 として UI 側から呼ぶだけにする(コードビハインド判定禁止 — K-AVALONIA)
        - 競合解決は全順序 skip>spread>forceLeftPage>forceRightPage>leftPageEmpty>rightPageEmpty で支配 1 つ(仕様 §2.12.1)
        - "OFF-identity: アクション無しのページプランは E-VIEWER-CALC-030 の SpreadPairCalculator と全位置一致(回帰保証・固定オラクル S-32 基底)"
        - 両面空白の見開きは構築上生じない(空白開始 seed 抑止+空白は実画像の相方 emit — 仕様 §2.12.2 不変条件)。canonical 現在画像は常に一意
        - "ナビゲーションはプラン見開き単位(cur±1 クランプ)。SHIFT/pageTurnMode は固定プランに非適用(仕様 §2.12.4)"
      acceptance_refs: [CP-TAGCTRL-024]

    - id: E-I18N-014
      name: i18n 解決器(フォールバック・補間・動的切替通知)
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-050, REQ-051]
      kbom_refs: [K-I18N]
      depends_on: []
      invariants:
        - INV-008 欠落キーで例外を投げない(ja → キー文字列の順でフォールバック)
      acceptance_refs: [CP-I18N-010]

    # ---------- v3.0 核(loop-v3-similarity) ----------
    - id: E-PHASH-031
      name: pHash 計算核(DCT 知覚ハッシュ・ハミング距離・類似度%変換・8 オリエンテーション変種)— v3.0 新設
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-061, REQ-062, REQ-084]
      kbom_refs: [K-PHASH, K-SKIA]
      depends_on: [E-DOMAIN-001]
      invariants:
        - INV-012 同一ピクセル内容→同一 pHash(決定的)。距離→類似度%は単調非増加・spec 固定
        - 純粋計算(ピクセル取得後は I/O・UI・DB 依存なし)。OC-14/OC-15 として直接呼べる公開 API
        - レシピは仕様 §2.10.1/ADR-0008 のみ(orthonormal DCT-II・DC 除外中央値・双線形・(int)(y+0.5))
        - since ECO-048(REQ-084) 8 オリエンテーション変種は 32×32 格子の添字置換のみ(D4・順序 §2.10.1a 固定)。[0]=identity はレシピ pHash と一致(S-40)
      acceptance_refs: [CP-PHASH-016]

    - id: E-SIMSEARCH-032
      name: 類似検索エンジン(候補=normal 限定・閾値・降順安定・キャッシュ協調)— v3.0 新設
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-064, REQ-084]
      kbom_refs: []
      depends_on: [E-PHASH-031, E-SIMCACHE-033, E-DOMAIN-001]
      invariants:
        - 候補は status=normal のみ(基準画像・他 status を除外)。フィルタはキャッシュ参照に先行(仕様 §2.10.4)
        - 同一コレクション内(REQ-053)。閾値以上(≧)を類似度降順・同値 id 昇順で安定
        - 検索は UI をブロックしない(非同期・進捗通知可)
        - since ECO-048(REQ-084) ペア距離=小 id の identity × 大 id の全変種の最小(対称・決定的・単調拡張)。変種なし特徴量とは identity 同士のみ(後方互換)
      acceptance_refs: [CP-SIM-017]

    - id: E-SIMCACHE-033
      name: 特徴量・類似度の永続化と無効化(image_features / image_similarity)— v3.0 新設
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-063, REQ-084]
      kbom_refs: [K-SQLITE]
      depends_on: [E-DB-010, E-PHASH-031]
      graph_edges:
        owner: E-SIMCACHE-033
        consumers: [E-SIMSEARCH-032, E-MERGE-034]
      invariants:
        - ペアは id1<id2 正規化・cache_key={id1}-{id2}(モード接尾辞なし)。(A,B)=(B,A)
        - 無効化は内容ベース(file_size/modified_date/hash)+adapter 世代(P-09)+変種欠落(since ECO-048/REQ-084 — 現行 reader が変種対応で phash_variants NULL は stale)。時間失効は不採用
        - 特徴量再計算時はその画像が関与する image_similarity 行を連鎖削除する
        - 画像削除時は FK CASCADE で両テーブルの関連行を削除
        - since ECO-048(REQ-084) phash_variants 列(migration 006)= 8 変種 pHash の ',' 連結 TEXT・NULL=旧レコード。hash_adapter は世代交代しない(identity 値不変)
        - since ECO-054 production adapter= skia-scaled-decode-v2(経路一貫性= K-SKIA v4.1 の一様中間段。世代交代は P-09 の正規伝搬=旧特徴量の自動再計算・連鎖無効化・this-build golden 再凍結手続き)
      acceptance_refs: [CP-SIM-017, CP-DB-006]

    - id: E-MERGE-034
      name: マージ計算+マージサービス(タグ union・マージ先優先・status=deleted・原子・物理非破壊)— v3.0 新設
      classification: core
      rationale_type: requirement
      requirement_refs: [REQ-066]
      kbom_refs: []
      depends_on: [E-DOMAIN-001, E-TAGSVC-008, E-DB-010, E-SIMCACHE-033]
      invariants:
        - INV-011 タグ union・衝突=マージ先優先(マージ先 NULL/空ならマージ元値)・多元 id 昇順先勝ち・simple は存在 union
        - マージ元 status=deleted の論理操作のみ。image_tags は削除しない。全工程は原子(失敗時全ロールバック・INV-006)
        - INV-009 物理画像ファイルを移動・削除・変更しない(L3 物理差分 CP-MERGE-001 で実証)
        - since ECO-044(IMG-011 裁定①②)= タグ統合は**常時 ON**(v1 に OFF 選択肢は無い — UI にトグルを置かない)。裁定①は本 unit の従来意味論(union・原子・deleted)の追認
