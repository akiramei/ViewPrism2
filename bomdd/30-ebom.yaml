      classification: surface
      rationale_type: external-knowledge
      requirement_refs: [REQ-067, REQ-066]
      external_source_ref: K-ORIGIN
      external_source_note: "原典 ImageMergeModal/TrashModal(仕様 §2.10.5)。ECO-014 で独立モーダルを画像タブ整理トレイ(インペイン)へ作り直す"
      kbom_refs: [K-AVALONIA, K-MVVM, K-DESIGN]
