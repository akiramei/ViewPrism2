        - コレクション管理は左「追加(+)」(ECO-013)に集約済で `⋯` に重複させない。詳細パネル/ノート(旧 E-UI-DETAIL-023)は ECO-023 で撤回(REQ-043 リバース誤り)=新 surface に配置しない
        - since ECO-027(IMG-014): モード中に残すツールバー項目は「表示軸・ソート・グリッド/リスト・当該モードの終了(+モード固有操作)」**だけ**とし、`表示列`(E-UI-BROWSE-022/ECO-025)も隠す(CAD image_tab.md「ツールバー」準拠。列編集はモードを抜けてから)。ECO-014 §8 の「他モード入口・作業・⋯ を隠す」規律に表示列を追加。モード突入時に開いていた列ピッカーは閉じる(プレースメント対象消失の浮き残り防止)
        - since ECO-027(IMG-014): ツールバーの**狭幅レスポンシブ収納**。判定はビューポート幅でなく**ツールバー実測幅**(左ペイン折り畳み・右ペイン開閉で使える幅が変わるため)。段階=①入口ボタンのラベルをアイコン化(<約820px・ToolTip 維持)→②「整理」を`⋯`へ退避(<約640px)→③回り込み(左右クラスタが単一行に収まらない時に右クラスタを2段目へ・左クラスタも極狭では内部折り返し)。確定契約(px 値でなく挙動)=①どの幅でも重ならない/潜り込まない ②畳む順序(ラベル→退避→回り込み) ③離脱/実行ボタンのラベルは狭幅でも維持(モード中の可視ボタン=終了/実行はラベルを畳まない)。判定/回り込みの状態計算は描画から独立して unit 検査可能(実測供給は View 責務)
