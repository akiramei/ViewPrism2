bomdd:
  product: ViewPrism2
  experiment: loop-v1-core
  layer: Exploratory Probes    # ★設計者のみ。製造装置に渡さない

# 規律: 合否を出さない。沈黙次元(32-mbom.yaml silence_sweep の exploratory 行)の値・分散を観測して記録するだけ。

exploratory_probes:
  - id: P-01
    scenario: "ダミー画像 10,000 件(DB 直接投入+実サムネイル 500 件)でグリッド表示・スクロール・列数切替・ビュー切替を操作"
    dimension: 大規模ライブラリでの UI 応答性(初期表示時間・スクロール体感・メモリ使用量)
    sweep_ref: "silence_sweep: グリッド性能(1 万件)"
    observed:
      factory-01: ~
  - id: P-02
    scenario: "キーボードのみで主要操作(フォルダ登録→スキャン→ノード選択→画像選択→ビューア)を試みる"
    dimension: アクセシビリティ(フォーカス遷移・操作可能性)
    sweep_ref: "silence_sweep: アクセシビリティ"
    observed:
      factory-01: ~
  - id: P-03
    scenario: "スキャン実行中にタグ付け・ビュー編集・グリッド操作を並行して行う"
    dimension: 並行操作時の体感(ブロッキング・遅延)と整合性(specified の範囲外の観測)
    sweep_ref: "silence_sweep: 並行実行"
    observed:
      factory-01: ~
  - id: P-04
    scenario: "エラー通知(不正 regex・スキャンスキップ)の表示形態を観察"
    dimension: 通知 UI の形態・文言(BOM は『非モーダル+ログ』までしか固定していない)
    sweep_ref: "20-spec.md §2.3(通知形態の詳細は未固定)"
    observed:
      factory-01: ~
  # ---- v2.0 追加(loop-v2-viewer) ----
  - id: P-05
    scenario: "実画像 1,000 枚のコレクションで scroll モードを先頭→末尾までスクロールし、spread で 100 ページ送る(メモリ使用量・体感・Bitmap 破棄の効き)"
    dimension: ビューア大量画像の応答性とメモリ(読み込みウィンドウ・先読み定数は実装定数 — 合否にしない)
    sweep_ref: "32-mbom silence_sweep: スクロール大量画像の体感"
    observed:
      factory-02:
        method: "コード解析(ViewerWindow.axaml ScrollItems / ViewerImage.cs / ViewerViewModel.Items)+ デコードメモリ算術。1,000 枚実起動は OOM 破壊的のため未実施"
        finding: |
          scroll = ScrollViewer > ItemsControl(Avalonia 既定 = 非仮想化 StackPanel)に Items(=_ordered 全件)を
          バインド。表示時に全件の ViewerImage がマウントされ、各 ViewerImage は SourcePath バインドで即
          new Bitmap(path)(フルサイズデコード)。_bitmap の Dispose は SourcePath 変更時のみで、静的リストの
          scroll 中は不変 → スクロール中に破棄が一度も起きず、全件のフルサイズ Bitmap が常駐。
          常駐メモリ ≈ Σ(w×h×4)。1920×1080 で 1 枚 ≈ 8.3MB → 1,000 枚 ≈ 8.3GB、12MP 写真なら ≈ 48GB。
        verdict: "FMEA-016(全件一括読み込み/ウィンドウ外未破棄)が顕在化。CHEAT-03 の friction 自己評価は過小。"
        feeds: "CHEAT-03 裁定の判断材料(P-05 先行 — 2026-06-13)。spread の Bitmap 破棄(対象変更時)は正常に効く"
      factory-03:
        method: "Run2(scroll 仮想化収束再製造)後のコード解析。ViewerWindow.axaml(ScrollList=ListBox+VirtualizingStackPanel)/ ViewerWindow.axaml.cs(ContainerClearing→Release)/ ViewerImage.cs(Release())"
        finding: |
          scroll を ListBox+VirtualizingStackPanel に置換。実体化されるのは可視+キャッシュ分のコンテナのみで、
          画面外アイテムは ItemTemplate(ViewerImage)が生成されず SourcePath バインドも評価されない(ロード未発生)。
          ContainerClearing で ViewerImage.Release() を呼び、CTS キャンセル→Source=null(描画除外)→Bitmap.Dispose(外した後)
          →SourcePath=null の順で実行。よって常駐 Bitmap 総量 = 同時実体化コンテナ数 × 1 枚分で頭打ち、総枚数 N に非依存。
        verdict: "FMEA-016 解消。REQ-055「全件一括読み込みしない」充足。メモリ総枚数非比例(Run2 収束の合格条件)を構造的に達成。描画中 Dispose 回避(K-AVALONIA)も Release() 順序で担保。"
        note: "1,000 枚実起動の数値測定は OOM 破壊回避のため未実施だが、実体化数定数化+画面外即解放の構造により総枚数比例は構造的に断たれている。実機での体感・上限の数値確認は golden G-8(承認者)で最終確認。build 警告0・unit 290/290・V1 オラクル 20/20 回帰ゼロ(設計者実測)。"
  - id: P-06
    scenario: "ビューアのコントロールバーを一通り操作(モード切替・設定 Flyout・ギャップ Slider・クリック送り連打・キーリピート押しっぱなし)"
    dimension: 操作感(クリック判定閾値・キーリピート・設定 UI の使い勝手 — exploratory 宣言次元)
    sweep_ref: "32-mbom silence_sweep: クリック判定の移動閾値・キーリピート"
    observed:
      factory-01: ~
  # ---- v3.0 追加(loop-v3-similarity)→ v3.1 で「観測のみ」から「target + 片側 Cpk」に格上げ ----
  - id: P-07
    scenario: "実画像 1,000 枚のコレクションで類似検索を実行。特性 C1=cold 初回(全件 decode+pHash 計算)を反復測定、C2=warm 再検索(キャッシュ済み)を参考測定。レイテンシ・メモリを採取"
    dimension: 大規模類似検索の応答性とメモリ(原典は 1,000 枚で約 1.1 秒・5,000 枚でフリーズ感の既知 UX 課題 — 2025-05-28 issue)
    sweep_ref: "32-mbom silence_sweep: 大規模類似検索の応答性 / 20-spec §2.10.4"
    # ---- 工程能力指数(Cpk)の試行(2026-06-14)----
    capability:
      characteristic: "C1 cold 初回検索レイテンシ(1,000 枚 decode+pHash)。fresh DB=空特徴量で反復・先頭 1 本はディスク温めとして σ から除外"
      spec_limit: "片側 USL(上限)= 3000ms(暫定 UX 目標: 1,000 枚の類似検索 初回 ≤ 3s)"
      index: "片側 Cpk_upper = (USL − μ) / (3σ)"
      gate_policy: "**ゲートにしない・報告する**(少数サンプル・環境ノイズ・偽精度回避)。Cpk は『崖っぷち/不安定』の警告灯として使う(Cpk<1.33 で要注意)"
      harness: "tests/ViewPrism2.Oracle/P07CapabilityProbe.cs(設計者側・工場非開示)。実行: 環境変数 VP_RUN_P07=1 で明示実行(通常回帰では skip)"
      ab_use: "A/B 生産技術の判定関数。固定オラクル(正しさ)は両工場とも緑で序列化不能 → capability で序列化。**μ=速度フロンティア(A/B 選択の主指標)、Cpk=堅牢性ゲート(低 σ=安定・高 σ=GC/メモリ圧の警告)**。統合はコード結合でなく勝ち技術を K-BOM へ織り込み fresh 再製造(ずる→BOM→再走の一般化)"
    observed:
      factory-04-baseline:
        date: 2026-06-14
        result: "C1 cold: n=5・μ=1633ms・σ=18.1ms・min1617/max1654。USL=3000ms → **Cpk_upper=25.1(capable)**。C2 warm 再検索=11.5ms(キャッシュ効果で桁違い)。メモリ=3.7MB。結果 7 件"
        finding: |
          ①cold 1.6s は原典 1.1s と同オーダー(SkiaSharp decode+自作 DCT×1000)。USL 3s に対し μ は 55%・σ は 1.1% と
          極小 → Cpk は σ の小ささに支配され高く出る(決定的計算は σ が小さい)。
          ②教訓: 決定的計算特性では Cpk はほぼ常に capable に出る → **A/B 選択の実効指標は μ(速度)**、Cpk は
          『不安定(高 σ=GC/メモリ圧)・崖っぷち(μ≈USL)』を弾く資格ゲート。最初に置いた warm の USL=250ms は
          Cpk=31 を出し『測る特性/上限が不適』を自己暴露 → cold を主特性に是正(能力設計そのものが学習対象)。
          ③メモリ 3.7MB=検索は画像を保持しない(ビューア scroll のメモリ問題=FMEA-016 とは別系)。
        carryover: "A/B を実走するなら『factory-04-baseline=A』に対し別方針工場(並列 decode・DecodeToWidth・pHash SIMD 等)=B を同ハーネスで μ 比較。5,000/10,000 枚で σ・メモリの能力が割れる帯を観測"
