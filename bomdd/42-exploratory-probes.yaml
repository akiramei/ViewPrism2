bomdd:
  product: ViewPrism2
  experiment: loop-v1-core
  layer: Exploratory Probes    # ★設計者のみ。製造装置に渡さない

# 規律: 合否を出さない。沈黙次元(32-mbom.yaml silence_sweep の exploratory 行)の値・分散を観測して記録するだけ。

exploratory_probes:
  - id: P-01
    scenario: "ダミー画像 10,000 件(DB 直接投入+実サムネイル 500 件)でグリッド表示・スクロール・列数切替・ビュー切替を操作"
    dimension: 大規模ライブラリでの UI 応答性(初期表示時間・スクロール体感・メモリ使用量)
    sweep_ref: "silence_sweep: グリッド性能(1 万件)"
    observed:
      factory-01: ~
  - id: P-02
    scenario: "キーボードのみで主要操作(フォルダ登録→スキャン→ノード選択→画像選択→ビューア)を試みる"
    dimension: アクセシビリティ(フォーカス遷移・操作可能性)
    sweep_ref: "silence_sweep: アクセシビリティ"
    observed:
      factory-01: ~
  - id: P-03
    scenario: "スキャン実行中にタグ付け・ビュー編集・グリッド操作を並行して行う"
    dimension: 並行操作時の体感(ブロッキング・遅延)と整合性(specified の範囲外の観測)
    sweep_ref: "silence_sweep: 並行実行"
    observed:
      factory-01: ~
  - id: P-04
    scenario: "エラー通知(不正 regex・スキャンスキップ)の表示形態を観察"
    dimension: 通知 UI の形態・文言(BOM は『非モーダル+ログ』までしか固定していない)
    sweep_ref: "bomdd/20-spec.md#2.3"
    sweep_note: "通知形態の詳細は未固定"
    observed:
      factory-01: ~
  # ---- v2.0 追加(loop-v2-viewer) ----
  - id: P-05
    scenario: "実画像 1,000 枚のコレクションで scroll モードを先頭→末尾までスクロールし、spread で 100 ページ送る(メモリ使用量・体感・Bitmap 破棄の効き)"
    dimension: ビューア大量画像の応答性とメモリ(読み込みウィンドウ・先読み定数は実装定数 — 合否にしない)
    sweep_ref: "32-mbom silence_sweep: スクロール大量画像の体感"
    observed:
      factory-02:
        method: "コード解析(ViewerWindow.axaml ScrollItems / ViewerImage.cs / ViewerViewModel.Items)+ デコードメモリ算術。1,000 枚実起動は OOM 破壊的のため未実施"
        finding: |
          scroll = ScrollViewer > ItemsControl(Avalonia 既定 = 非仮想化 StackPanel)に Items(=_ordered 全件)を
          バインド。表示時に全件の ViewerImage がマウントされ、各 ViewerImage は SourcePath バインドで即
          new Bitmap(path)(フルサイズデコード)。_bitmap の Dispose は SourcePath 変更時のみで、静的リストの
          scroll 中は不変 → スクロール中に破棄が一度も起きず、全件のフルサイズ Bitmap が常駐。
          常駐メモリ ≈ Σ(w×h×4)。1920×1080 で 1 枚 ≈ 8.3MB → 1,000 枚 ≈ 8.3GB、12MP 写真なら ≈ 48GB。
        verdict: "FMEA-016(全件一括読み込み/ウィンドウ外未破棄)が顕在化。CHEAT-03 の friction 自己評価は過小。"
        feeds: "CHEAT-03 裁定の判断材料(P-05 先行 — 2026-06-13)。spread の Bitmap 破棄(対象変更時)は正常に効く"
      factory-03:
        method: "Run2(scroll 仮想化収束再製造)後のコード解析。ViewerWindow.axaml(ScrollList=ListBox+VirtualizingStackPanel)/ ViewerWindow.axaml.cs(ContainerClearing→Release)/ ViewerImage.cs(Release())"
        finding: |
          scroll を ListBox+VirtualizingStackPanel に置換。実体化されるのは可視+キャッシュ分のコンテナのみで、
          画面外アイテムは ItemTemplate(ViewerImage)が生成されず SourcePath バインドも評価されない(ロード未発生)。
          ContainerClearing で ViewerImage.Release() を呼び、CTS キャンセル→Source=null(描画除外)→Bitmap.Dispose(外した後)
          →SourcePath=null の順で実行。よって常駐 Bitmap 総量 = 同時実体化コンテナ数 × 1 枚分で頭打ち、総枚数 N に非依存。
        verdict: "FMEA-016 解消。REQ-055「全件一括読み込みしない」充足。メモリ総枚数非比例(Run2 収束の合格条件)を構造的に達成。描画中 Dispose 回避(K-AVALONIA)も Release() 順序で担保。"
        note: "1,000 枚実起動の数値測定は OOM 破壊回避のため未実施だが、実体化数定数化+画面外即解放の構造により総枚数比例は構造的に断たれている。実機での体感・上限の数値確認は golden G-8(承認者)で最終確認。build 警告0・unit 290/290・V1 オラクル 20/20 回帰ゼロ(設計者実測)。"
  - id: P-06
    scenario: "ビューアのコントロールバーを一通り操作(モード切替・設定 Flyout・ギャップ Slider・クリック送り連打・キーリピート押しっぱなし)"
    dimension: 操作感(クリック判定閾値・キーリピート・設定 UI の使い勝手 — exploratory 宣言次元)
    sweep_ref: "32-mbom silence_sweep: クリック判定の移動閾値・キーリピート"
    observed:
      factory-01: ~
  # ---- v3.0 追加(loop-v3-similarity)→ v3.1 で「観測のみ」から「target + 片側 Cpk」に格上げ ----
  - id: P-07
    scenario: "実画像 1,000 枚のコレクションで類似検索を実行。特性 C1=cold 初回(全件 decode+pHash 計算)を反復測定、C2=warm 再検索(キャッシュ済み)を参考測定。レイテンシ・メモリを採取"
    dimension: 大規模類似検索の応答性とメモリ(原典は 1,000 枚で約 1.1 秒・5,000 枚でフリーズ感の既知 UX 課題 — 2025-05-28 issue)
    sweep_ref: "32-mbom silence_sweep: 大規模類似検索の応答性 / 20-spec §2.10.4"
    # ---- 工程能力指数(Cpk)の試行(2026-06-14)----
    capability:
      characteristic: "C1 cold 初回検索レイテンシ(1,000 枚 decode+pHash)。fresh DB=空特徴量で反復・先頭 1 本はディスク温めとして σ から除外"
      spec_limit: "片側 USL(上限)= 3000ms(暫定 UX 目標: 1,000 枚の類似検索 初回 ≤ 3s)"
      index: "片側 Cpk_upper = (USL − μ) / (3σ)"
      gate_policy: "**ゲートにしない・報告する**(少数サンプル・環境ノイズ・偽精度回避)。Cpk は『崖っぷち/不安定』の警告灯として使う(Cpk<1.33 で要注意)"
      harness: "tests/ViewPrism2.Oracle/P07CapabilityProbe.cs(設計者側・工場非開示)。実行: 環境変数 VP_RUN_P07=1 で明示実行(通常回帰では skip)"
      ab_use: "A/B 生産技術の判定関数。固定オラクル(正しさ)は両工場とも緑で序列化不能 → capability で序列化。**μ=速度フロンティア(A/B 選択の主指標)、Cpk=堅牢性ゲート(低 σ=安定・高 σ=GC/メモリ圧の警告)**。統合はコード結合でなく勝ち技術を K-BOM へ織り込み fresh 再製造(ずる→BOM→再走の一般化)"
    observed:
      factory-04-baseline:
        date: 2026-06-14
        result: "C1 cold: n=5・μ=1633ms・σ=18.1ms・min1617/max1654。USL=3000ms → **Cpk_upper=25.1(capable)**。C2 warm 再検索=11.5ms(キャッシュ効果で桁違い)。メモリ=3.7MB。結果 7 件"
        finding: |
          ①cold 1.6s は原典 1.1s と同オーダー(SkiaSharp decode+自作 DCT×1000)。USL 3s に対し μ は 55%・σ は 1.1% と
          極小 → Cpk は σ の小ささに支配され高く出る(決定的計算は σ が小さい)。
          ②教訓: 決定的計算特性では Cpk はほぼ常に capable に出る → **A/B 選択の実効指標は μ(速度)**、Cpk は
          『不安定(高 σ=GC/メモリ圧)・崖っぷち(μ≈USL)』を弾く資格ゲート。最初に置いた warm の USL=250ms は
          Cpk=31 を出し『測る特性/上限が不適』を自己暴露 → cold を主特性に是正(能力設計そのものが学習対象)。
          ③メモリ 3.7MB=検索は画像を保持しない(ビューア scroll のメモリ問題=FMEA-016 とは別系)。
        carryover: "A/B を実走するなら『factory-04-baseline=A』に対し別方針工場(並列 decode・DecodeToWidth・pHash SIMD 等)=B を同ハーネスで μ 比較。5,000/10,000 枚で σ・メモリの能力が割れる帯を観測"
  # ---- v3.1 実 A/B 生産技術(2026-06-14): P-07 の carryover を実走 ----
  - id: P-08
    scenario: "decode 戦略の実 A/B。同一最終レシピ(32×32 双線形→PerceptualHash)で **decode 経路だけ**異なる 2 工場を、代表ワークロード(大判 JPEG 写真)で μ 対決。factory-A=PHashImageReader(SKBitmap.Decode フル解像度→Resize)/ factory-B=PHashImageReaderScaledDecode(SKCodec scaled-decode 早期縮小)。factory-B は別エージェント(Codex)が隔離製造=真の別工場"
    dimension: "A/B 生産技術(select/synthesize/defer/tension の実走)。μ=選択の主レバー・Cpk=安定性の番兵・固定オラクルは序列化不能を capability で序列化"
    sweep_ref: P-07   # ECO-029: 合成値を分離(参照欄は単一 ID・注記は note へ)
    sweep_note: "P-07 carryover(DecodeToWidth 早期縮小)の実走。併読: capability-discipline.md §A/B・bomdd/20-spec.md#2.10.4"
    harness: "tests/ViewPrism2.Oracle/ABDecodeStrategyProbe.cs(設計者側・工場非開示)。同等性ゲート(両工場 EQ-RANK)=常時実行 / μ 対決=VP_RUN_AB=1 で明示実行(~11s)"
    correctness_gate:
      contract: "EQ-RANK(順位等価・threshold 非依存): 近傍=同一構造の JPEG 再エンコードが無関係より厳密に上位。絶対閾値メンバーシップ(threshold:70)は factory-04 固有較正=this-build なので緩め(threshold:1)て純粋順位で検査"
      workload: "代表サイズ 1280×960(factory-B の早期縮小が実際に engage する大きさ。64px 極小では engage せず B の本質挙動を試せない)"
      result: "**両工場とも緑**(factory-A/factory-B とも近傍 3 枚が無関係 5 枚より厳密上位)。回帰: 既存オラクル 59/59 緑(S-19b 単色含む)"
    observed:
      ab-decode-strategy:
        date: 2026-06-14
        workload: "40 photos 2000×1500 jpeg q85 / batch=全40枚 pHash / n=5(ABBA・warmup 除外)/ USL=1600ms(40ms/枚)"
        factory_A_full_decode: "μ=506.2ms σ=12.3 min=492/max=522 Cpk=29.5"
        factory_B_scaled_decode: "μ=80.4ms σ=5.1 min=75/max=87 Cpk=98.6"
        result: "**SPEEDUP μ_A/μ_B = 6.29×**(10.6ms/枚 改善)。correctness null_A=0/null_B=0(両工場全枚数で有効 hash)。adapter drift = A↔B ハミング平均 16.6・max 28 / 64bit(値は大きく異なるが順位は保存=CPOL-103 preserve_with_adapter の実証)。stability guard: σ_B=5.1 < σ_A=12.3 で B はむしろ安定(σ 崩壊なし)"
        finding: |
          ①factory-B は早期縮小で decode 画素を桁で削る(2000×1500=3M px → JPEG DCT スケール ~1/8 で ~250×188 へ縮小デコード後に
          32×32 へ)。フル解像度 decode→縮小(factory-A)に対し 6.29× 高速・σ も小。**μ=選択の主レバー**(P-07 の方法論的発見)が実証された。
          ②Cpk は両工場とも巨大(σ 小=決定的計算)で序列化に無力 → 予告どおり **Cpk は『B が σ を膨らませていないか』の番兵**として
          機能(σ_B<σ_A で健全)。番兵としてのみ価値があるという P-07 教訓が A/B で確認された。
          ③adapter drift 16.6/64 が大きいことが重要: 早期縮小は**異なる画素を標本化**するため絶対 pHash 値・絶対距離は移動する。
          よって絶対閾値は工場間で非可搬で、**横断契約は順位ベース(EQ-RANK)でなければならない** → step 1 の cross-factory/this-build
          分離(絶対閾値を this-build へ寄せた判断)の正しさが A/B で裏取りされた。
        verdict: |
          **select = factory-B 技術を採用**。Pareto 支配(μ・tail・安定性すべて B 優位)・correctness 保存・**tension なし**
          (latency 勝因が memory/安定性を犠牲にせず、むしろ両方改善 — 早期縮小は decode 画素自体が減るため)。
          synthesize 不要: factory-B は factory-A のパイプライン(最終 32×32 双線形・DCT レシピ)を完全内包し decode 前段だけ
          差し替えた上位互換で、A 側に B が欠く勝ち技術は無い(A の優位は『現行 this-build 値の incumbency』のみで技術ではない)。
        codify: "K-SKIA v3.1 へ『pHash 用 decode は SKCodec scaled-decode で早期縮小』を勝ち技術として織り込み(コード結合でなく fresh 再製造で native 採用)"
        adoption_note: |
          本ループ(V3)は G4 クローズ済みのため、ここでは『判定+K-BOM lesson 化』までを scope とする(remembered task に忠実)。
          実 production 採用(App の DI を factory-B へ差し替え)は別判断: this-build pHash 値が drift 16.6 で移動するため
          S-19b(単色)等 this-build オラクルの再凍結が要る。単色は scale 不変で S-19b は緑のままだが、再製造時に再凍結を確認すること。
        limits: "EQ-RANK は再エンコード/品質違いの近傍で検証。crop/rotate 等の広い近傍種に対する scaled-decode の頑健性は未網羅(factory-A も同様に未網羅)→ defer(将来 near-dup 種拡張時に両工場で再評価)"
  # ---- v3.1/P-09: A/B の最後の一周 = production adapter 世代交代として採用(2026-06-14) ----
  - id: P-09
    scenario: "P-08 の select(factory-B)を production へ接続。単なる DI 差し替えでなく『scaled-decode pHash adapter を production adapter v2 として採用し、this-build oracle / golden / cache / index を再整備する』adapter 世代交代として実施(maintainer 指示)"
    dimension: "A/B 生産技術が production の意味論(永続化・golden・cache/index・adapter version)を壊さず接続できるか=lesson 化の最後の一周"
    harness: "ソリューション全体(src + tests/ViewPrism2.Tests + tests/ViewPrism2.Oracle)。adapter 識別子・schema migration・freshness・2 層オラクル・latency guard を実装し全緑で確認"
    design:
      adapter_version: "IPHashImageReader.AdapterId を追加(full-decode=skia-full-decode-v1 / scaled-decode=skia-scaled-decode-v1)。production DI を scaled-decode へ差し替え(App.axaml.cs)"
      persistence: "image_features に hash_adapter 列(migration 003 + LatestDdl 末尾・スキーマ同値維持)。freshness=内容ベース+adapter 一致。adapter 不一致は stale→再計算→連鎖無効化で旧類似度 purge。A/B 値の検索空間混在を構造的に禁止(旧 DB の NULL は必ず再計算)"
      two_layer_oracle: "横断(scope=cross-factory・EQ-RANK=S-19/S-25/AB ゲート・adapter をまたいで守る)/ this-build(scope=this-build・S-19b core + 新設 ThisBuildGoldenTests=production adapter の exact 値)。threshold は横断契約でなく this-build(P-08 発見)"
      latency_guard: "PHashLatencyGuardTests(default-on・軽量): production scaled-decode が full-decode より相対 ≥2× 速いことを machine 非依存比で守る(full-decode への退行検出)"
    acceptance:
      result: "**全緑**(Tests 347 / Oracle 63=+4・skip 2)。回帰ゼロ"
      checks:
        - "S-19b 緑(core 単色 0x8000…・adapter 非依存=production core 不変)"
        - "this-build golden 凍結: production adapter id=skia-scaled-decode-v1 / 単色を実 decode 経路で 0x8000… / 構造フィクスチャ(512 jpeg q90 pattern3)=b7ff8800d0de12d5(SkiaSharp 3.119.4)"
        - "EQ-RANK 緑(両工場・代表サイズ。adapter をまたぐ順位契約)"
        - "旧 cache/index 無効化確認(CpSim017: 旧 adapter feature+類似度を仕込み→検索で再計算・adapter 更新・旧ペア無効化)"
        - "schema 同値(S-05 / CP-DB-006: migration 003 適用 DB = 新規 LatestDdl)"
        - "latency 退行ガード緑(scaled-decode ≥2× full-decode)"
    lesson: |
      A/B の最後の一周(lesson 化→production adoption→oracle/golden/cache 移行)を実走できた。最大の生産技術知見:
      ①**adapter version を成果物に刻む**と、性能改善(値が動く)を golden/cache を壊さず投入できる。pHash 系は
        decode/補間/色変換/ライブラリ差で絶対値が動くため、検索体験の契約(順位)と this-build の値を**最初から分離**しておくと
        世代交代が安全になる(step 1 の同等性契約分離が P-09 で効いた)。
      ②**freshness に adapter 一致を足す**だけで「旧値の自動無効化+混在禁止」が連鎖無効化と合わさって成立する(専用の
        big-bang re-index 不要・lazy 再計算で UI フリーズも無い)。
      ③オラクルを横断(順位)/ this-build(値)の 2 層で CI に残すと、今後 decode 経路や SIMD を変えても『仕様違反』と
        『this-build 再凍結対象』を機械的に切り分けられる。
      ④latency は相対比ガードにすると machine 非依存で退行(full-decode 復帰)を確実に検出できる。Cpk は小 n で出さない。
