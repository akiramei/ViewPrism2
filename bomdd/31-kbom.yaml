bomdd:
  product: ViewPrism2
  experiment: "loop-v3-similarity(v3.0 — K-PHASH 新設・K-SKIA にピクセルアクセス追補・K-DESIGN に類似検索/マージ UI 追補。pHash の決定性に関わる技術判断を固定)"
  layer: K-BOM

# 製造装置が参照する外部/設計知識。K-BOM に無い判断で埋めた箇所は CHEAT として報告対象。

kbom:
  - id: K-SQLITE
    category: external_tool_convention
    subject: Microsoft.Data.Sqlite + Dapper の使用規約
    managed_knowledge:
      - "接続文字列: Data Source=<dbPath>。接続確立ごとに必ず PRAGMA journal_mode=WAL; PRAGMA foreign_keys=ON; を発行する(バンドル既定値に依存しない)"
      - "接続戦略: アプリ全体で単一の SqliteConnection を共有し、SemaphoreSlim(1,1) でシリアル化する(ADR-0003)"
      - "トランザクション: connection.BeginTransaction() を使い、バッチ操作・マイグレーションは必ず 1 トランザクション"
      - "パラメータは常に名前付きバインド(@name)。文字列連結による SQL 組み立て禁止"
      - "relative_path・path 列の case-insensitive 比較は列定義に COLLATE NOCASE を付けて実現する(クエリ毎の LOWER() ではなく)"
      - "BOOLEAN は INTEGER 0/1 で格納。Dapper のマッピングは bool ⇔ INTEGER で自動"
      - "日時は TEXT(ISO 8601 UTC)で格納し、DateTime 型へはマップしない(文字列のまま保持し、表示層でのみパース)— 形式の往復劣化防止"
      - "スキーマ同値検査は PRAGMA table_info / index_list / foreign_key_list で行う"
    risk_if_implicit: |
      PRAGMA を接続毎に発行しないと FK が無効な接続が混入し、カスケード(REQ-028)が静かに壊れる。
      日時を DateTime にマップすると ToString() の文化圏依存で INV-002 が壊れる。
    source_reference: "https://learn.microsoft.com/dotnet/standard/data/sqlite/ / ADR-0003"

  - id: K-SKIA
    category: external_tool_command
    subject: SkiaSharp によるデコード・リサイズ・エンコードの定型
    managed_knowledge:
      - "デコード: SKBitmap.Decode(stream)。null が返ったら『壊れた画像』として扱う(例外を投げない)"
      - "解像度取得(REQ-043): SKCodec.Create(path) → codec.Info.Width/Height(フルデコード不要)"
      - "inside-fit 縮小: scale = Min(1.0, 256.0/width, 256.0/height)。scale==1.0 なら原寸のまま再エンコード(拡大禁止)"
      - "リサイズ: bitmap.Resize(new SKImageInfo(newW, newH), SKSamplingOptions(SKFilterMode.Linear, SKMipmapMode.Linear))。newW/newH は Round half away from zero で整数化し最小 1px"
      - "エンコード: SKImage.FromBitmap(...).Encode(SKEncodedImageFormat.Png, 100) / (SKEncodedImageFormat.Jpeg, 80)"
      - "GIF/WebP/BMP も SKBitmap.Decode で先頭フレームがデコードされる。アニメーション対応は不要"
      - "EXIF Orientation は適用しない(仕様 §4 で宣言済み。SKCodec の origin を無視してよい)"
      - "SKBitmap/SKImage/SKData は IDisposable。using で確実に破棄(ネイティブメモリ)"
      # ---- v3.0 追補(pHash のピクセル取得) ----
      - "(v3.0) pHash 用ピクセル取得: 32×32 への縮小は bitmap.Resize(new SKImageInfo(32,32, SKColorType.Bgra8888, SKAlphaType.Unpremul), new SKSamplingOptions(SKFilterMode.Linear, SKMipmapMode.None))。**SKFilterMode.Linear(双線形)を明示**(決定性 — ADR-0008)。Mipmap は使わない(品質揺れ回避)"
      - "(v3.0) ピクセル読み出しは GetPixel(x,y) のループではなく、resized.GetPixelSpan()(または GetPixels ポインタ)で一括取得し BGRA 各バイトから輝度を計算する(GetPixel は遅く 1024px で実用外)。アルファは無視"
      - "(v3.0) pHash は描画系と独立(Image.Source へは渡さない)。SKBitmap は using で破棄。SkiaSharp 版差で縮小結果が変わり得るため版は exact ピン(3.119.4)— pHash 値の決定性は版に紐づく(S-19 系の再凍結判断は版更新時)"
      # ---- v3.1 追補(実 A/B P-08 で実証した勝ち技術 — DecodeToWidth 早期縮小) ----
      - "(v3.1/P-08 勝ち技術) pHash 用 decode は **SKCodec の scaled-decode で早期縮小**する(フル解像度 decode→Resize を避ける)。手順: SKCodec.Create(stream)(null=壊れた画像)→ 長辺を ~64px 付近へ落とすスケール(各辺 32px 未満にしない・拡大しない)を codec.GetScaledDimensions(scale) で codec サポート寸法に丸め → new SKBitmap(SKImageInfo(w,h,Bgra8888,Unpremul)) へ codec.GetPixels(info, bmp.GetPixels())(結果 Success/IncompleteInput 以外は null)→ **最終 32×32 双線形(Linear/Mipmap None)の処理ステップは v3.0 と共通**で PerceptualHash.Compute(GetPixelSpan())。codec が各辺 32 を割る寸法しか返さない場合は原寸 decode へ安全側フォールバック。**注: 処理ステップは共通だが入力画素が early-shrink で異なるため出力 pHash 値は full-decode と一致しない(adapter drift)**"
      - "(v3.1) 効果(P-08 実測 2026-06-14・2000×1500 jpeg 40 枚): フル解像度 decode(factory-A μ=506ms)に対し早期縮小(factory-B μ=80ms)で **6.29× 高速・σ も縮小(5.1<12.3)**。JPEG は DCT ベースで 1/2,1/4,1/8 を native サポートし decode 画素を桁で削るため。大判写真ほど効く(64px 以下の小画像は原寸 decode に縮退=オーバーヘッドのみ)"
      - "(v3.1/重要) 早期縮小は**異なる画素を標本化**するため pHash の絶対値・絶対距離が移動する(P-08: A↔B ハミング平均 16.6/64)。CPOL-103(preserve_with_adapter)で許容されるが、**順位等価(EQ-RANK)は保存される=検索体験は同等**。横断オラクルは絶対値でなく順位で書く(step 1 で分離済み)"
      # ---- v3.1/P-09 追補(production adapter 世代交代として採用 — 2026-06-14) ----
      - "(v3.1/P-09) scaled-decode を **production adapter v2 として採用**(App DI を PHashImageReaderScaledDecode へ)。pHash adapter は世代識別子 IPHashImageReader.AdapterId を持つ(full-decode=skia-full-decode-v1 / scaled-decode=skia-scaled-decode-v1)。**decode 経路/レシピ/SkiaSharp 版が pHash 値を動かす変更時は必ず新 id を採番する**"
      - "(v3.1/P-09) 永続化特徴量は image_features.hash_adapter(migration 003)に世代を刻む。**freshness 判定は内容ベース(file_size/modified_date/hash)に加えて adapter 一致を要求**し、不一致は内容が同じでも stale=再計算。これで adapter 世代交代時に旧値を自動無効化し連鎖無効化で旧類似度キャッシュも purge→**A/B 値の検索空間混在を構造的に禁止**(混在は drift 16.6 でランキング/threshold を壊す)。旧 DB の NULL は空=必ず再計算"
      - "(v3.1/P-09) オラクルは 2 層: **横断(cross-factory)=EQ-RANK(順位・adapter をまたいで守る)** と **this-build golden=現 production adapter の exact 値(decode 経路/版の回帰を検出・adapter 世代交代ごとに再凍結)**。trait scope=cross-factory / this-build で CI 分離。threshold(絶対閾値)は横断契約ではなく this-build(P-08/P-09 で確定した設計判断)"
      - "(v3.1/P-09) latency 退行ガード(default-on・軽量): production scaled-decode が full-decode より相対 ≥2× 速いことを machine 非依存の比で守る(production reader を誤って full-decode へ戻すと検出)。μ=主・Cpk は出さない(小 n)。P-08 観測 6.29× に対し広い余裕"
    risk_if_implicit: |
      フィットの丸め方式・最小 1px・拡大禁止を規定しないと工場ごとに寸法が 1px ずれて L2 検査が不安定になる。
      Dispose 漏れはネイティブメモリリーク(大量サムネイル生成でクラッシュ)。
      v3.0: リサイズ補間方式(双線形)を明示しないと工場ごとに pHash が変わり固定オラクル(S-19)が不安定になる。
    source_reference: "https://learn.microsoft.com/dotnet/api/skiasharp / ADR-0004 / ADR-0008"

  - id: K-PHASH
    category: algorithm_convention
    subject: 知覚ハッシュ(DCT-pHash)・ハミング距離・類似度%変換の実装規約
    managed_knowledge:
      - "pHash レシピ(仕様 §2.10.1/ADR-0008 を実装規約化): ①32×32 双線形グレースケール(輝度 y=0.299R+0.587G+0.114B を (int)(y+0.5) で 8bit 化。.NET 既定 Math.Round は ToEven=銀行丸めなので使わない) ②orthonormal 2 次元 DCT-II ③左上 8×8=64 係数 ④DC[0,0] を除く 63 係数の中央値 m ⑤各係数 c に bit=(c>m)?1:0 を行優先で 64bit ⑥最上位ビットから 16hex 小文字"
      - "2 次元 DCT-II は**行方向→列方向の 2 パス**(各 1 次元 DCT を行列に適用)で O(N^3)。直接 4 重ループ(O(N^4))にしない。N=32"
      - "1 次元 DCT-II(orthonormal): X[k] = α(k)·Σ_{n=0..N-1} x[n]·cos(π(2n+1)k/(2N))、α(0)=√(1/N)、α(k>0)=√(2/N)。**cos 値は (n,k) ごとに事前計算した固定 double[N,N] テーブル**を使う(毎回 Math.Cos を呼ばない=性能+決定性)"
      - "中央値: 63 要素(DC 除外)を昇順ソートし中央(31 番目、0 起点)を m とする。偶数個でないので平均を取る分岐は不要。c==m は bit=0(>判定)"
      - "(v3.0/CHEAT-01 codify)浮動小数のサブ ULP ノイズ量子化: cos 固定表+2 パス DCT では単色画像でも非 DC 係数が数学上の 0 から ±1e-14 程度ぶれ、c>m の符号ノイズで仕様 §2.10.1 の縮退規則(全係数が等しい場合 c=m→bit=0、単色=0x8000000000000000)が成立しない。**左上 8×8 ブロックの各係数を Math.Round(c, 6, MidpointRounding.AwayFromZero) で量子化してから中央値・ビット化する**。入力はグレースケール 8bit 整数で有意係数は O(1) 以上のため 6 桁(1e-6)丸めはサブ ULP ノイズのみを 0 へ畳み込み実構造に無影響(縮退で c=m=0・bit=0 が成立)。固定オラクル S-19(単色)が検査"
      - "ハミング距離: ulong xor=h1^h2; popcount(System.Numerics.BitOperations.PopCount(xor))。0〜64"
      - "類似度%変換(仕様 §2.10.2): ブレークポイント (0,100)(5,90)(10,70)(15,50)(20,30)(25,10)(64,0)。区間線形 raw=s_lo+(s_hi-s_lo)*(d-d_lo)/(d_hi-d_lo)、sim=(int)Math.Floor(raw+0.5)、[0,100] クランプ。期待値: d=0→100,3→94,5→90,7→82,10→70,12→62,15→50,20→30,25→10,26→10,27→9,40→6,64→0"
      - "公開 API は純粋計算(OC-14: byte[] or ピクセル → 16hex / ulong、OC-15: int 距離 → int %)。DB・SkiaSharp デコード・UI に依存しない関数として Core に置き、固定オラクル(S-19/S-20)が直接呼ぶ"
      - "16hex は小文字・64bit を上位から。原典 sharp 実装とのビット一致は不要(CPOL-103 adapter)。当方レシピを正準として S-19 系で凍結"
    risk_if_implicit: |
      補間方式・グレースケール丸め(ToEven 罠)・DCT 正規化/符号規約・cos の事前計算・中央値の DC 除外を
      固定しないと、工場ごとに pHash 値がぶれて固定オラクル(S-19)が不安定になり、決定性(INV-012)が崩れる。
      2D DCT を O(N^4) で書くと 32×32 でも無駄に重い(2 パスで O(N^3))。
    source_reference: "ADR-0008 / 仕様 §2.10.1-2 / 原典 phash-utils.ts・similarity-evaluator.ts(工場非開示)"

  - id: K-AVALONIA
    category: external_tool_convention
    subject: Avalonia 12 の実装イディオム
    managed_knowledge:
      - "プロジェクト: Avalonia / Avalonia.Desktop / Avalonia.Themes.Fluent / Avalonia.Fonts.Inter。AppBuilder.Configure<App>().UsePlatformDetect()"
      - "バインディング: x:DataType を指定したコンパイル済みバインディングを既定とする(typo の実行時検出漏れ防止)"
      - "グリッド仮想化: ListBox + ItemsPanel に WrapPanel ではなく、ItemsControl では仮想化されない。仮想化が必要な一覧は ListBox(VirtualizingStackPanel 既定)を行単位で使うか ItemsRepeater を使う。グリッドは『1 行 = N セル』の行リスト化で VirtualizingStackPanel に載せる方式を既定とする"
      - "キーボード: Window.KeyBindings + KeyGesture(例 Escape, Right, Left, PageUp, PageDown)。ViewModel の ICommand に結線"
      - "画像表示: Avalonia.Media.Imaging.Bitmap をファイル/ストリームから生成し Image.Source へ。UI スレッド外でのデコードは Task.Run、Source 代入は Dispatcher.UIThread 経由"
      - "ダイアログ: Window.ShowDialog<TResult>(owner)。ファイル/フォルダ選択は StorageProvider.OpenFolderPickerAsync"
      - "ウィンドウ状態の保存: Window.Position/ClientSize/WindowState を Closing で読み settings.json へ(REQ-052)"
      - "多重起動防止: 名前付き Mutex(Global\\ViewPrism2)で判定し、2 つ目はプロセス終了(既存アクティブ化は V1 ではベストエフォート)"
      - "動的 i18n: 文言は LocalizationService 経由のバインディング。XAML 直書き文字列禁止。罠(v1.3/ECO-002 DF-3): コンパイル済みバインディングはインデクサ('Item[]')の PropertyChanged 通知では再評価されない事例を確認 — 文言は名前付きプロパティ経由で公開する(またはロケール切替時に明示的に再バインド)。言語切替で全ラベル・ボタンが実際に切り替わることを L1 スモークで確認する(CP-L1-SMOKE)"
      - "罠(v1.3/ECO-002 DF-4): PointerPressedEventArgs.ClickCount によるダブルクリック判定は環境依存で 2 にならない事例がある — DoubleClickDetector(時間+座標の自前判定)で補完する(V1 実装済み。再利用)"
      # ---- v2.0 追補(ビューア拡張 — 事前ずる列挙で分散が確認された技術判断) ----
      - "(v2.0) ScrollViewer はカーソルキー・PageUp/Down を自分で消費する — ビューアのキーボードは Window レベルの AddHandler(KeyDownEvent, handler, RoutingStrategies.Tunnel) で受けて e.Handled=true にし、ScrollViewer の既定キー処理に渡さない(scroll モードのキー移動も ViewModel 経由で明示スクロール)"
      - "(v2.0) フォーカス管理: ビューア本体領域を Focusable=true にし、ウィンドウ表示時と設定 Flyout クローズ時にフォーカスを戻す(矢印キーが効かなくなる事故の定番予防)"
      - "(v2.0) scroll モードの画像は原寸デコードしない: Bitmap.DecodeToWidth(表示幅 × TopLevel.RenderScaling) を Task.Run 内で実施(高 DPI のぼやけ防止に RenderScaling を忘れない)。normal/spread はフルサイズ表示のため従来どおり ImageMemoryCache(REQ-045)経由"
      - "(v2.0/Run2 必須 — V2 Run1 で違反した中核罠): scroll は **ItemsControl 直置き禁止**。これは V1 グリッドの仮想化罠(本 K-BOM 冒頭・FMEA-013)とまったく同型で、ビューア scroll にも等しく適用される。Avalonia の ItemsControl 既定パネルは非仮想化 StackPanel のため全件が実体化し、各アイテムがフルサイズ Bitmap をロード・常駐 → 1,000 枚で 8〜48GB 常駐し確実にフリーズ/OOM(P-05 で実証、FMEA-016)。**必ず VirtualizingStackPanel を備えた ListBox(SelectionMode=単一/無効・行リスト)または ItemsRepeater を使い、画面外アイテムを実体化しない**。各 ViewerImage は **可視(仮想化で実体化中)の間のみ SourcePath を持ち、非可視化/コンテナリサイクル時に SourcePath=null にして Bitmap を Dispose(描画から外した後)し、進行中ロードを CancellationToken でキャンセルする**。結果としてメモリは『画面内+先読みウィンドウ』に比例し、総枚数に比例して増えてはならない(Run2 収束の合格条件 — P-05 再測定で確認)"
      - "(v2.0) Bitmap の破棄: 読み込みウィンドウ外へ出た scroll の Bitmap は破棄するが、必ず Image.Source から外した後に Dispose(描画中 Dispose はネイティブクラッシュ)"
      - "(v2.0) モード切替の View 構造: ContentControl+DataTemplate(モードごとに UserControl 分割)。非表示モードの視覚ツリーは保持しない(切替時に破棄)"
      - "(v2.0/Run3 — GF-02) グリッドの行リスト ListBox の行 ListBoxItem は『仮想化のための内部投影』であり表示専用。行選択視覚を一切持たせない: (1)セルの PointerPressed ハンドラで e.Handled=true にし行選択のバブリングを止める (2):pointerover/:selected の行背景は Fluent テーマがテンプレート部品(PART_ContentPresenter)に適用する(テンプレート定義値より Style が高優先)ため、アプリスコープの 'ListBox.plain ListBoxItem:pointerover/:selected /template/ ContentPresenter#PART_ContentPresenter' スタイルで Background=Transparent を上書きする。結果、ホバー・選択はセル(cellFrame の枠+バッジ)のみ反応(エクスプローラー特大アイコン表示と同じ)。リスト表示モードの行選択視覚は子 Border.listRow.selected が担うため不変"
      - "(注意・2026-06-13 maintainer 確認) Avalonia.Controls.ItemsRepeater は Avalonia 12 ではコア非同梱の別 NuGet パッケージ(最新 12.0.0)で『retired / archived after 12.0 release』。本プロジェクトの 12.0.4 本体 XML にも公開型として出ない。よって本ループでは採用しない(グリッド/スクロールとも行リスト ListBox+VirtualizingStackPanel が既定)。真のアイコンビュー(UniformGridLayout・行概念なし)が必要なら『ItemsRepeater 採用可否スパイク』(12.0.4/net10.0 でビルド・実行・1 万件仮想化・golden 通過を先に実証)を経てから BOM 昇格すること — V3 申し送り。出典: NuGet Avalonia.Controls.ItemsRepeater / GitHub README"
    risk_if_implicit: |
      仮想化の実現方式は Avalonia では自明でなく、工場ごとに ItemsControl 直置き(仮想化なし)を選んで
      1 万件で UI が固まる事故が典型(REQ-041 の中核リスク)。
      v2.0: ScrollViewer のキー消費・Bitmap の描画中 Dispose・原寸デコードによるメモリ膨張は
      ビューア拡張の典型事故(事前ずる列挙 #4/#56/#6 で慣習分散を確認)。
    source_reference: "https://docs.avaloniaui.net/(Avalonia 12)/ ADR-0001"

  - id: K-MVVM
    category: design_system
    subject: CommunityToolkit.Mvvm + DI の定型
    managed_knowledge:
      - "ViewModel は ObservableObject 継承、状態は [ObservableProperty]、操作は [RelayCommand](非同期は async Task メソッドに付与)"
      - "DI: Microsoft.Extensions.DependencyInjection。App 起動時に ServiceCollection へ Core サービス(シングルトン)と ViewModel(トランジェント)を登録"
      - "ViewModel から View への参照禁止。ダイアログ表示は IDialogService 抽象を介す"
      - "コレクションは ObservableCollection<T>(差分更新)。一覧全置換は AvaloniaList でも可"
      - "I/O を伴う処理は ViewModel から async で呼び、UI スレッドをブロックしない(ConfigureAwait は App 層では既定のまま)"
    risk_if_implicit: "INPC 手書き・コードビハインド肥大・UI スレッドブロックなど工場ごとの我流が混入する。"
    source_reference: "https://learn.microsoft.com/dotnet/communitytoolkit/mvvm/ / ADR-0005"

  - id: K-REGEX
    category: external_tool_convention
    subject: .NET Regex の使用規約と JS 方言差
    managed_knowledge:
      - "生成: new Regex(pattern, RegexOptions.None, TimeSpan.FromSeconds(1))。大文字小文字は区別(原典 JS RegExp の既定と同じ)"
      - "判定: regex.IsMatch(value)(部分一致。アンカーはパターン側の責任)"
      - "ArgumentException(不正パターン)と RegexMatchTimeoutException は捕捉し『条件不成立+警告』に変換(REQ-031)"
      - "JS→.NET 方言差(タグ値検索で実用上影響する範囲): JS の (?<name>) は .NET でも同義 / JS の \\d \\w は .NET では Unicode 既定(RegexOptions.ECMAScript は使わない。V1 は .NET 既定セマンティクスを正とする)"
      - "パターン長上限 1024 文字。超過は入力時に拒否"
    risk_if_implicit: "ReDoS パターンで UI フリーズ。タイムアウト未設定が典型事故。"
    source_reference: "https://learn.microsoft.com/dotnet/standard/base-types/regular-expressions"

  - id: K-I18N
    category: design_system
    subject: 翻訳リソースの形式と原典資産の変換規則
    managed_knowledge:
      - "ファイル: src/ViewPrism2.App/Assets/i18n/ja.json・en.json。UTF-8(BOM なし)"
      - "形式: フラットな { \"namespace.key\": \"文言\" }。原典のネスト JSON はドット連結でフラット化して変換"
      - "プレースホルダ: {name} 形式を維持。解決器は string.Replace ベースで {key} を引数辞書から置換(未指定プレースホルダはそのまま残す)"
      - "V1 で取り込む原典ネームスペース: common / navigation / toolbar / tag / image / collection / view / directory / settings / sort / file / modals / error / success(viewer 拡張系・workspace 系は V2 以降)"
      - "フォールバック実装: 要求ロケール → ja → キー文字列(REQ-050)。en に無いキーは ja を表示してよい(エラーにしない)"
      - "新規キー(V1 で新設する文言: 空状態・再リンクダイアログ等)は ja を正とし en を併記。キーは <画面>.<要素> 規約"
    risk_if_implicit: "キー体系・プレースホルダ構文が工場ごとに分岐し、資産変換が手作業化する。"
    source_reference: "原典 view-prism/messages/ja.json・en.json / ADR-0006"

  - id: K-WINFS
    category: external_tool_convention
    subject: Windows ファイルシステムの取り扱い
    managed_knowledge:
      - "列挙: new EnumerationOptions { RecurseSubdirectories = include_subfolders, IgnoreInaccessible = true, AttributesToSkip = FileAttributes.ReparsePoint }(リパースポイント=ジャンクション/シンボリックリンクを辿らない — 仕様 §4)"
      - "タイムスタンプ: FileInfo.LastWriteTimeUtc / CreationTimeUtc を使用し、ToString(\"yyyy-MM-ddTHH:mm:ss.fffZ\") ではなく共通フォーマッタ(E-DOMAIN-001)で ISO 8601 化"
      - "読み取り: FileStream(path, FileMode.Open, FileAccess.Read, FileShare.ReadWrite | FileShare.Delete) — 他プロセスのロックと共存"
      - "IOException / UnauthorizedAccessException はファイル単位で捕捉してスキップ+警告ログ(スキャン全体を落とさない)"
      - "長パス: .NET の長パスサポートに依存(Windows 10 1607+ / .NET Core 系は既定対応)。それでも失敗するパスはスキップ+警告"
      - "パス結合・正規化は Path.GetFullPath / Path.GetRelativePath を使い、表示・格納時に '\\' → '/' 置換(INV-005)"
    risk_if_implicit: "ジャンクション再帰で無限ループ、ロック競合でスキャン全体クラッシュ、が典型事故。"
    source_reference: "https://learn.microsoft.com/dotnet/api/system.io"

  - id: K-DESIGN
    category: design_system
    subject: デザイントークン(V1 最小セット)
    managed_knowledge:
      - "テーマ: Fluent(ライトのみ。ダーク不要 — 仕様 §4)"
      - "アクセント色: #3B82F6 / 危険操作: #DC2626 / 警告: #D97706 / テキスト主: #1F2937 / テキスト弱: #6B7280 / 境界線: #E5E7EB / 背景: #FFFFFF / パネル背景: #F9FAFB"
      - "余白: 4px グリッド(4/8/12/16/24)。ウィンドウ既定 1200×800・最小 900×600"
      - "グリッドセル: 正方形、列数 3/4/5/6(既定 4)、セル間ギャップ 8px。ファイル名はセル下部 1 行・中央寄せ・溢れは末尾省略(…)"
      - "選択表示: アクセント色の 2px 枠+右上に選択順バッジ(アクセント色円形・白文字・1 起点)"
      - "空状態: 中央配置・テキスト弱色・アイコンなしで可"
      - "プレースホルダサムネイル: パネル背景色+'?' グリフ(テキスト弱色)"
      - "フォント: Inter(同梱)/ 本文 14px / 見出し 16px / キャプション 12px"
      - "タグ色見本: 16px 円形スウォッチ。color=NULL のタグは境界線色のリング表示"
      # ---- v2.0 追補(ビューア拡張+GF 是正のデザイン規定) ----
      - "(v2.0/Run3 改訂 — golden GF-V2-01) ビューアコントロールバー: ウィンドウ上部に常設。モード切替=view-prism 準拠の上位 4 トグル(単一/縦スクロール/右開き/左開き)。仕様 ViewerMode 4 値(normal/scroll/spread-right/spread-left)に直接対応し『見開き』抽象は置かない(Run1 の見開き+サブトグルは廃止)。active な 1 つだけ filled(アクセント背景+白文字)で現在モード=開き方向が一目瞭然(view-prism は active 方向ボタンが filled = 原典準拠)。表示設定=歯車ボタン→Flyout(縦並び: リサイズ/揃え/ギャップ/ページ送り/空白開始)、右端に位置表示+閉じるボタン"
      - "(v2.0) ギャップ入力: Slider(0〜100px)+現在値の数値表示(REQ-059 の範囲と一致)"
      - "(v2.0) アイコンは PathIcon+StreamGeometry 直書き(フォントアイコン依存禁止)。モード: 単一=矩形 1 / スクロール=縦 3 連矩形 / 見開き=左右 2 矩形。開き方向: 本+矢印。ホームタグ=家形シルエット(GF-03 — ★は不可)"
      - "(v2.0) タグパレットの選択中タグ行: アクセント色 12% 不透明の背景+左端 3px アクセントバー(GF-04 — 選択が一目で判別できる強さにする)"
      - "(v2.0) ビューア位置表示: normal/scroll=「n / total」、見開き=「n-m / total」(1 起点の表示番号。単独ページ時は n / total)"
      - "(v2.0) 空白ページ(見開き): 背景と同系の無地。枠・アイコン・文言を置かない(仕様 §2.9)"
      - "(v2.0) scroll の未ロードプレースホルダ: パネル背景色+小スピナー。寸法不明時の仮高さは 300px(ロード後に実寸へ)"
      # ---- v3.0 追補(類似検索・マージ UI) ----
      - "(v3.0) 類似検索 UI: モーダルダイアログ。上部に閾値スライダー(50〜100・整数・現在値数値表示・既定 70)+検索ボタン。精度モード切替は置かない(pHash のみ — 仕様 §2.10.4)。結果は各画像をサムネイル+類似度%(右上バッジ、アクセント色)で類似度降順グリッド表示。検索中は進捗バー、0 件は空状態(中央テキスト弱色)"
      - "(v3.0) マージ UI: 類似検索結果または複数選択から起動。マージ先 1 枚を明示強調(アクセント枠+『保持』ラベル)、マージ元は通常枠(『統合』ラベル)。実行前プレビュー領域に統合後タグ一覧と『物理ファイルは削除されません(DB 上の統合のみ)』の注記(テキスト弱色)。実行ボタンは危険色でなくアクセント色(非破壊のため)"
      - "(v3.0) トラッシュ表示: deleted 画像の一覧(サムネイル+ファイル名・件数ヘッダ)。閲覧のみ(復元/完全削除ボタンは置かない — 後続ループ)。空時は『ゴミ箱は空です』(テキスト弱色)"
      - "(v3.0) 類似検索/マージの入口: グリッドの選択コンテキスト(右クリックメニューまたはツールバー)に『類似画像を検索』『マージ』。アイコンは PathIcon+StreamGeometry(類似=重なる 2 円/マージ=2→1 の矢印)"
    risk_if_implicit: "工場が『自然な寸法・配色』を独自に埋め、golden 承認のたびに微妙なズレの指摘往復が発生する(BomDD Loop3/4 の実証どおり)。v2.0: コントロールバー形態・モードアイコン・選択強調は事前ずる列挙(#19-27)で慣習分散を確認済み — 固定して golden 往復を抑止する。v3.0: マージ先/元の視覚区別・非破壊の明示・類似度バッジは golden G-9 の往復を抑止するため固定。"
    source_reference: "ADR-0001 / 原典 UI(Tailwind 系の慣用値を踏襲)"
